<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DSA Study</title>
<meta name="description" content="Free DSA interview-prep study tool — lessons, quizzes, spaced-repetition flashcards, and in-browser Python.">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DSA Study">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }

  :root {
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --bg-softer: #f5f5f5;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-dim: #9a9a9a;
    --border: #ececec;
    --border-strong: #d4d4d4;
    --accent: #1a1a1a;
    --accent-soft: #f3f3f3;
    --danger: #b91c1c;
    --good: #15803d;
    --radius: 8px;
    --radius-sm: 4px;
    --radius-lg: 14px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  button {
    font: inherit;
    color: inherit;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  button:hover { background: var(--bg-soft); border-color: var(--border-strong); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:disabled:hover { background: transparent; border-color: var(--border); }
  button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  button.primary:hover { background: #000; }
  button.ghost { border-color: transparent; color: var(--text-muted); }
  button.ghost:hover { background: var(--bg-soft); color: var(--text); }
  button.danger { color: var(--danger); }
  button.danger:hover { background: #fef2f2; border-color: var(--danger); }
  button.icon { padding: 4px 8px; font-size: 14px; }
  button.toggle.active { background: var(--accent-soft); border-color: var(--border-strong); color: var(--text); }

  input, textarea, select {
    font: inherit;
    color: inherit;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    width: 100%;
    transition: border-color 0.12s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--text); }
  textarea { resize: vertical; min-height: 80px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }

  body { display: flex; flex-direction: column; }
  .topbar {
    display: flex;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    gap: 32px;
    background: var(--bg);
  }
  .title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .tabs { display: flex; gap: 4px; }
  .tab { border: none; padding: 6px 12px; color: var(--text-muted); border-radius: var(--radius-sm); }
  .tab.active { color: var(--text); background: var(--accent-soft); }
  /* Curriculum progress — connected dots (one per chapter, larger at each phase start) */
  .syllabus-progress { flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0; }
  .sp-dots { position: relative; flex: 1; display: flex; align-items: center; justify-content: space-between; min-width: 160px; height: 16px; }
  .sp-dots::before, .sp-dots::after { content: ""; position: absolute; top: 50%; transform: translateY(-50%); height: 2px; border-radius: 2px; }
  .sp-dots::before { left: 5px; right: 5px; background: var(--border); }                         /* full track */
  .sp-dots::after  { left: 5px; width: var(--sp-fill, 0px); background: var(--good); }            /* filled track */
  .sp-dot { position: relative; z-index: 1; width: 7px; height: 7px; flex: 0 0 auto; border-radius: 50%; background: var(--bg); border: 1.5px solid var(--border); box-sizing: border-box; }
  .sp-dot.done { background: var(--good); border-color: var(--good); }
  .sp-dot.major { width: 12px; height: 12px; border-width: 2px; }
  .sp-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  /* Plan / Job Search Roadmap page */
  .plan-intro { font-size: 13px; color: var(--text-muted); margin: 0 0 20px; max-width: 720px; }
  .plan-tier { margin-bottom: 24px; max-width: 720px; }
  .plan-tier-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 4px; }
  .plan-tier-head h2 { font-size: 16px; font-weight: 600; }
  .plan-ready { font-size: 12px; font-weight: 600; color: var(--good); white-space: nowrap; }
  .plan-brief { font-size: 13px; color: var(--text-muted); margin: 0 0 10px; }
  .plan-jobs { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .plan-jobs li { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; font-size: 14px; }
  .plan-jobs .pj-title { color: var(--text); }
  .plan-jobs .pj-title em { color: var(--text-muted); font-style: normal; font-size: 12px; }
  .plan-jobs .pj-pay { color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .plan-notes { margin: 4px 0 0; padding-left: 18px; font-size: 14px; color: var(--text); }
  .plan-notes li { margin-bottom: 4px; }

  main { flex: 1; display: flex; overflow: hidden; }
  .view { flex: 1; display: none; overflow: hidden; }
  .view.active { display: flex; }

  .pane {
    border-right: 1px solid var(--border);
    background: var(--bg-soft);
    width: 280px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .pane-header h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; }
  .pane-list { flex: 1; overflow-y: auto; padding: 8px; list-style: none; }
  .pane-list li {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    user-select: none;
  }
  .pane-list li:hover { background: var(--bg); }
  .pane-list li.active { background: var(--bg); border: 1px solid var(--border); }
  .pane-list li[draggable="true"] { cursor: grab; }
  .pane-list li.dragging { opacity: 0.4; }
  .pane-list .name { flex: 1; }
  .pane-list .count { font-size: 12px; color: var(--text-dim); }
  .pane-list .pin-btn {
    border: none;
    background: transparent;
    padding: 2px 6px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
    cursor: pointer;
    line-height: 1;
  }
  .pane-list li:hover .pin-btn,
  .pane-list li.pinned .pin-btn { opacity: 1; }
  .pane-list li.pinned .pin-btn { color: var(--text); }
  .pane-list .pin-btn:hover { color: var(--text); }

  .main-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .main-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .main-controls { display: flex; gap: 8px; align-items: center; }
  .main-body { flex: 1; overflow-y: auto; padding: 24px 32px; }

  .placeholder { color: var(--text-dim); text-align: center; padding: 64px 16px; font-size: 14px; }
  .empty-state { color: var(--text-dim); text-align: center; padding: 32px 16px; font-size: 14px; }

  /* Collapsible overview / quick add */
  details.collapsible {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-soft);
    margin-bottom: 24px;
    overflow: hidden;
  }
  details.collapsible[open] { background: var(--bg); }
  details.collapsible > summary {
    list-style: none;
    cursor: pointer;
    padding: 12px 16px;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  details.collapsible > summary::-webkit-details-marker { display: none; }
  details.collapsible > summary::before {
    content: "›";
    display: inline-block;
    transition: transform 0.15s;
    color: var(--text-dim);
    font-size: 16px;
  }
  details.collapsible[open] > summary::before { transform: rotate(90deg); }
  details.collapsible > .collapsible-content { padding: 0 16px 16px; }
  .quick-add-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .quick-add-row:last-child { margin-bottom: 0; }
  .quick-add-row label { margin: 0; flex-shrink: 0; min-width: 80px; }

  /* Flashcards */
  .flashcards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 16px;
  }
  .flashcards-single {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 16px 0;
  }
  .flashcards-single .flashcard-wrap { max-width: 960px; width: 100%; }
  .single-nav {
    display: flex;
    gap: 16px;
    align-items: center;
    color: var(--text-muted);
    font-size: 14px;
  }
  .single-nav .index-label { min-width: 80px; text-align: center; }

  .flashcard-wrap { position: relative; }
  .flashcard {
    perspective: 1400px;
    width: 100%;
    aspect-ratio: 3 / 2;
    cursor: pointer;
    user-select: none;
  }
  .flashcard.editing { cursor: default; }
  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flashcard-face {
    position: absolute;
    inset: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg);
    box-shadow: var(--shadow-card);
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    white-space: pre-wrap;
    overflow: hidden;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .flashcard-front .face-content { font-weight: 500; font-size: 16px; }
  .flashcard-back .face-content { font-size: 14px; color: var(--text-muted); }
  .face-content { width: 100%; word-break: break-word; }
  .face-content code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg-soft);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 0.9em;
  }
  /* Multi-line code / diagram box: left-aligned, real indentation, scrolls instead of jumbling */
  .flashcard-face:has(.card-code) { align-items: stretch; justify-content: flex-start; text-align: left; }
  .face-content.has-code { width: 100%; display: flex; flex-direction: column; gap: 8px; align-items: stretch; text-align: left; }
  .face-content .face-text { text-align: left; white-space: pre-wrap; line-height: 1.4; }
  .face-content .card-code {
    margin: 0;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
    white-space: pre;
    overflow-x: auto;
    overflow-y: hidden;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px;
    line-height: 1.45;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text);
    -webkit-overflow-scrolling: touch;
  }
  .flashcard-back { transform: rotateY(180deg); background: var(--bg-softer); }
  .flashcard:not(.editing):hover .flashcard-face { box-shadow: var(--shadow-card-hover); border-color: var(--border-strong); }

  /* tiny corner label */
  .face-corner {
    position: absolute;
    top: 10px;
    left: 14px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .queue-indicator {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 14px;
    color: var(--text);
    pointer-events: none;
    line-height: 1;
  }

  /* Edit mode */
  .flashcard.editing .flashcard-face { background: var(--bg); }
  .flashcard.editing .flashcard-back { background: var(--bg-softer); }
  .flashcard.editing .face-edit {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    resize: none;
    text-align: center;
    font: inherit;
    color: inherit;
    padding: 8px;
    outline: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .flashcard.editing .flashcard-front .face-edit { font-weight: 500; font-size: 16px; }
  .flashcard.editing .flashcard-back .face-edit { font-size: 14px; color: var(--text-muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .flashcard-controls {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
  }
  .flashcard-controls button { font-size: 12px; padding: 4px 10px; }

  /* Ask Claude integration */
  .card-foot {
    display: flex;
    justify-content: center;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .flashcard-wrap:hover .card-foot,
  .flashcards-single .card-foot,
  .card-foot.always-show { opacity: 1; pointer-events: auto; }
  .ask-claude-btn {
    font-size: 12px;
    padding: 4px 10px;
    color: var(--text-dim);
    border-color: transparent;
  }
  .ask-claude-btn:hover {
    color: var(--text);
    background: var(--bg-soft);
    border-color: var(--border);
  }
  .context-preview {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    max-height: 220px;
    overflow-y: auto;
    margin-bottom: 12px;
  }

  /* Quizzes (unchanged) */
  .quiz-question {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .q-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .q-prompt { font-size: 16px; margin-bottom: 16px; white-space: pre-wrap; }
  .q-options { display: flex; flex-direction: column; gap: 8px; }
  .q-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .q-option:hover { border-color: var(--border-strong); }
  .q-option.selected { border-color: var(--text); background: var(--accent-soft); }
  .q-option input { width: auto; }
  .q-result { margin-top: 12px; padding: 12px 14px; border-radius: var(--radius-sm); font-size: 14px; }
  .q-result.correct { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--good); }
  .q-result.incorrect { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); }
  .q-result.recorded { background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-muted); }
  .q-override { margin-top: 8px; }
  .q-override-btn { font-size: 12px; padding: 4px 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); border-radius: var(--radius-sm); cursor: pointer; }
  .q-override-btn:hover { border-color: var(--border-strong); }
  .q-override-btn.active { background: #f0fdf4; border-color: #bbf7d0; color: var(--good); }
  .q-actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .q-answer {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--bg-soft);
    border: 1px solid var(--border);
    font-size: 14px;
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .q-answer-label {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .q-answer-label.spaced { margin-top: 14px; }
  .q-why {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    white-space: pre-wrap;
    color: var(--text);
  }
  .q-visual {
    margin: 12px 0 0;
    padding: 0;
    background: none;
    border: 0;
    white-space: pre;
    overflow-x: auto;
    line-height: 1.4;
  }
  .q-rate {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .q-rate-buttons { display: flex; gap: 4px; }
  .q-rate button {
    min-width: 36px;
    padding: 4px 8px;
    font-size: 13px;
  }
  .q-rate button.selected {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .q-rate-scale {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
  }
  .q-note { margin-top: 10px; }
  .q-note label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .q-note textarea {
    min-height: 60px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
  }

  /* Lessons */
  .lesson-meta-inline {
    font-size: 13px;
    color: var(--text-muted);
  }
  .lesson-section { margin-bottom: 28px; }
  .lesson-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .section-header .lesson-section-label { margin-bottom: 0; }
  .flashcard-from-btn {
    font-size: 11px;
    padding: 3px 8px;
    color: var(--text-dim);
    border-color: transparent;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
  }
  .lesson-section:hover .flashcard-from-btn,
  .exercise:hover .flashcard-from-btn,
  .flashcard-from-btn:focus {
    opacity: 1;
  }
  .flashcard-from-btn:hover {
    color: var(--text);
    background: var(--bg-soft);
    border-color: var(--border);
  }
  .exercise-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .exercise-header h3 { margin: 0; }
  .lesson-summary {
    font-size: 15px;
    margin-bottom: 8px;
  }
  .session-notes {
    background: var(--bg-soft);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--border-strong);
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
    white-space: pre-wrap;
  }
  .lesson-intro {
    font-size: 14px;
    color: var(--text-muted);
    white-space: pre-wrap;
  }
  .body-block { margin-bottom: 12px; }
  .body-block.prose {
    font-size: 14px;
    color: var(--text);
    white-space: pre-wrap;
    line-height: 1.55;
  }
  .body-block.code, .body-block.diagram {
    background: var(--bg-soft);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    white-space: pre;
    overflow-x: auto;
    line-height: 1.5;
  }
  .body-block.diagram { color: var(--text-muted); }
  .body-block-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;

<script>
"use strict";

/* ===== state + persistence ===== */
const STORAGE_KEY = "study-tool-state-v1";
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn("Failed to load state", e); }
  return { version: 1, categories: [], cards: [], reviewQueue: [], quizzes: [], sessions: [], lessons: [] };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn("Failed to save state", e); }
}
const state = loadState();

// UI prefs (persisted separately so they stay machine-local on import)
const PREFS_KEY = "study-tool-prefs-v1";
let prefs = {};
try { prefs = JSON.parse(localStorage.getItem(PREFS_KEY) || "{}"); } catch (e) { prefs = {}; }
function savePrefs() {
  try { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); } catch (e) {}
}

let activeCategoryId = null;
let activeQuizId = null;
let activeLessonId = null;
let activeSession = null;

// UI state (not persisted)
let viewMode = "grid";       // "grid" | "single"
let editMode = false;
let singleIdx = 0;
let cardFlippedState = {};   // cardId → bool (which face is showing)

function uid() { return Math.random().toString(36).slice(2, 10); }

// Coarse check used to avoid burning ~10 MB of mobile data preloading Pyodide.
function isLikelyMobile() {
  if (navigator.connection && navigator.connection.saveData) return true;
  return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent || "");
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 1800);
}

/* =====================================================================
   File System Access API — sync lessons + quizzes to JSON files on disk
   ===================================================================== */

const fs = {
  dirHandle: null,
  connected: false,
  readonly: false,          // true when content came from fetch() (deployed/any device)
  manifestLoaded: false,
  lessons: new Map(),       // id -> lesson data
  quizzes: new Map(),       // id -> quiz definition
  quizDirs: new Map(),      // quizId -> directory handle
  attempts: new Map(),      // quizId -> [attempt, ...]
};

const fsm = {
  IDB_NAME: "study-tool-fs",
  IDB_STORE: "handles",
  IDB_KEY: "rootDir",

  openIDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.IDB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(this.IDB_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },

  async saveHandle(handle) {
    const db = await this.openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.IDB_STORE, "readwrite");
      tx.objectStore(this.IDB_STORE).put(handle, this.IDB_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },

  async loadHandle() {
    const db = await this.openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.IDB_STORE, "readonly");
      const req = tx.objectStore(this.IDB_STORE).get(this.IDB_KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },

  async clearHandle() {
    const db = await this.openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.IDB_STORE, "readwrite");
      tx.objectStore(this.IDB_STORE).delete(this.IDB_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },

  async verifyPermission(handle, requestIfNeeded = true) {
    const opts = { mode: "readwrite" };
    if ((await handle.queryPermission(opts)) === "granted") return true;
    if (requestIfNeeded && (await handle.requestPermission(opts)) === "granted") return true;
    return false;
  },

  async connect() {
    if (!window.showDirectoryPicker) {
      alert("Your browser doesn't support the File System Access API. Use Chrome, Edge, or another Chromium-based browser.");
      return false;
    }
    try {
      const handle = await window.showDirectoryPicker({ mode: "readwrite", startIn: "documents" });
      const ok = await this.verifyPermission(handle, true);
      if (!ok) { toast("Permission denied"); return false; }
      await this.saveHandle(handle);
      fs.dirHandle = handle;
      fs.connected = true;
      await this.loadAll();
      updateConnectionUI();
      toast(`Connected to "${handle.name}"`);
      return true;
    } catch (e) {
      if (e.name !== "AbortError") console.error(e);
      return false;
    }
  },

  async tryReconnect() {
    try {
      const handle = await this.loadHandle();
      if (!handle) return false;
      // Without requesting, just check — silent reconnect is best-effort.
      const granted = await this.verifyPermission(handle, false);
      if (!granted) {
        // We have a remembered handle but need user gesture for permission.
        // Mark as "remembered but locked" — user must click Connect.
        fs.dirHandle = handle;
        fs.connected = false;
        return false;
      }
      fs.dirHandle = handle;
      fs.connected = true;
      await this.loadAll();
      return true;
    } catch (e) {
      console.warn("Reconnect failed:", e);
      return false;
    }
  },

  async loadAll() {
    fs.readonly = false;   // connected to a real folder → author mode (read + write)
    fs.lessons.clear();
    fs.quizzes.clear();
    fs.quizDirs.clear();
    fs.attempts.clear();

    // Lessons
    try {
      const lessonsDir = await fs.dirHandle.getDirectoryHandle("lessons", { create: true });
      for await (const [name, handle] of lessonsDir.entries()) {
        if (handle.kind === "file" && name.endsWith(".json")) {
          try {
            const file = await handle.getFile();
            const data = JSON.parse(await file.text());
            data._filename = name;
            fs.lessons.set(data.id, data);
          } catch (e) { console.warn("Bad lesson file:", name, e); }
        }
      }
    } catch (e) { console.warn("Lessons dir error:", e); }

    // Quizzes (each quiz is its own subdirectory)
    try {
      const quizzesDir = await fs.dirHandle.getDirectoryHandle("quizzes", { create: true });
      for await (const [name, handle] of quizzesDir.entries()) {
        if (handle.kind !== "directory") continue;
        try {
          const defHandle = await handle.getFileHandle("definition.json");
          const file = await defHandle.getFile();
          const def = JSON.parse(await file.text());
          def._dirName = name;
          fs.quizzes.set(def.id, def);
          fs.quizDirs.set(def.id, handle);

          const attempts = [];
          for await (const [fname, fhandle] of handle.entries()) {
            if (fhandle.kind === "file" && fname.startsWith("attempt_") && fname.endsWith(".json")) {
              try {
                const af = await fhandle.getFile();
                const at = JSON.parse(await af.text());
                at._filename = fname;
                attempts.push(at);
              } catch (e) { console.warn("Bad attempt file:", fname, e); }
            }
          }
          attempts.sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
          fs.attempts.set(def.id, attempts);
        } catch (e) { console.warn("Bad quiz dir:", name, e); }
      }
    } catch (e) { console.warn("Quizzes dir error:", e); }

    // Syllabus progress (Phase 1 checkboxes) — optional; bar hides if absent.
    fs.syllabusProgress = null;
    try {
      const sh = await fs.dirHandle.getFileHandle("SYLLABUS.md");
      const text = await (await sh.getFile()).text();
      fs.syllabusProgress = parseSyllabusChapters(text);
    } catch (e) { /* no SYLLABUS.md — leave null */ }
    renderSyllabusProgress();
  },

  // Read-only content load over HTTP — works on every device (no File System Access API).
  // The browser can't list a directory over HTTP, so we read manifest.json first.
  async loadFromManifest() {
    fs.lessons.clear();
    fs.quizzes.clear();
    fs.quizDirs.clear();
    fs.attempts.clear();

    let manifest;
    try {
      const res = await fetch("manifest.json", { cache: "no-cache" });
      if (!res.ok) throw new Error(`manifest ${res.status}`);
      manifest = await res.json();
    } catch (e) {
      console.warn("No content manifest available:", e);
      return false;
    }

    const fetchJSON = async (path) => (await (await fetch(path)).json());

    await Promise.all((manifest.lessons || []).map(async (path) => {
      try {
        const data = await fetchJSON(path);
        data._filename = path.split("/").pop();
        data._readonly = true;
        fs.lessons.set(data.id, data);
      } catch (e) { console.warn("Bad lesson:", path, e); }
    }));

    // Quiz definitions only — attempt history is per-user (Firebase, a later phase).
    await Promise.all((manifest.quizzes || []).map(async (path) => {
      try {
        const def = await fetchJSON(path);
        def._dirName = path.split("/").slice(-2, -1)[0];
        def._readonly = true;
        fs.quizzes.set(def.id, def);
        fs.attempts.set(def.id, []);
      } catch (e) { console.warn("Bad quiz:", path, e); }
    }));

    // Auto-load flashcard decks on a fresh device (don't clobber local edits/progress).
    if (!(state.cards && state.cards.length)) {
      for (const deck of (manifest.flashcardDecks || [])) {
        try { mergeFlashcardDeck(await fetchJSON(deck)); }
        catch (e) { console.warn("Bad deck:", deck, e); }
      }
    }

    fs.readonly = true;
    fs.manifestLoaded = true;
    renderSyllabusProgress();
    return true;
  },

  lessonFilename(lesson) {
    if (lesson._filename) return lesson._filename;
    const m = (lesson.title || "").match(/^([\d.]+)/);
    const num = m ? m[1] : (lesson.id || "untitled").replace(/[^\w.]/g, "_");
    return `Lesson_${num}.json`;
  },

  async writeLesson(lesson) {
    if (!fs.connected) throw new Error("Not connected");
    const lessonsDir = await fs.dirHandle.getDirectoryHandle("lessons", { create: true });
    const filename = this.lessonFilename(lesson);
    const fh = await lessonsDir.getFileHandle(filename, { create: true });
    const w = await fh.createWritable();
    const toWrite = { ...lesson };
    delete toWrite._filename;
    await w.write(JSON.stringify(toWrite, null, 2) + "\n");
    await w.close();
    lesson._filename = filename;
  },

  async reloadLesson(lessonId) {
    if (!fs.connected) return null;
    const lessonsDir = await fs.dirHandle.getDirectoryHandle("lessons");
    const lesson = fs.lessons.get(lessonId);
    const filename = lesson ? this.lessonFilename(lesson) : null;
    if (!filename) return null;
    try {
      const fh = await lessonsDir.getFileHandle(filename);
      const file = await fh.getFile();
      const data = JSON.parse(await file.text());
      data._filename = filename;
      fs.lessons.set(data.id, data);
      return data;
    } catch (e) {
      console.warn("Reload lesson failed:", e);
      return null;
    }
  },

  async writeQuiz(quiz) {
    if (!fs.connected) throw new Error("Not connected");
    const quizzesDir = await fs.dirHandle.getDirectoryHandle("quizzes", { create: true });
    const dirName = quiz._dirName || quiz.id.replace(/^quiz-/, "").replace(/[^\w-]/g, "-");
    const quizDir = await quizzesDir.getDirectoryHandle(dirName, { create: true });
    const fh = await quizDir.getFileHandle("definition.json", { create: true });
    const w = await fh.createWritable();
    const toWrite = { ...quiz };
    delete toWrite._dirName;
    await w.write(JSON.stringify(toWrite, null, 2) + "\n");
    await w.close();
    quiz._dirName = dirName;
    fs.quizDirs.set(quiz.id, quizDir);
  },

  async writeAttempt(quizId, attempt) {
    if (!fs.connected) throw new Error("Not connected");
    const quizDir = fs.quizDirs.get(quizId);
    if (!quizDir) throw new Error("Quiz directory not loaded");
    const filename = attempt._filename || `attempt_${(attempt.timestamp || "").slice(0, 10)}_${attempt.id.slice(0, 6)}.json`;
    const fh = await quizDir.getFileHandle(filename, { create: true });
    const w = await fh.createWritable();
    const toWrite = { ...attempt };
    delete toWrite._filename;
    await w.write(JSON.stringify(toWrite, null, 2) + "\n");
    await w.close();
    attempt._filename = filename;
  },

  async reloadAttempt(quizId, attemptId) {
    if (!fs.connected) return null;
    const quizDir = fs.quizDirs.get(quizId);
    if (!quizDir) return null;
    const attempts = fs.attempts.get(quizId) || [];
    const att = attempts.find(a => a.id === attemptId);
    if (!att || !att._filename) return null;
    try {
      const fh = await quizDir.getFileHandle(att._filename);
      const file = await fh.getFile();
      const data = JSON.parse(await file.text());
      data._filename = att._filename;
      const idx = attempts.findIndex(a => a.id === attemptId);
      if (idx >= 0) attempts[idx] = data;
      return data;
    } catch (e) {
      console.warn("Reload attempt failed:", e);
      return null;
    }
  },

  async deleteAttempt(quizId, attemptId) {
    if (!fs.connected) return false;
    const quizDir = fs.quizDirs.get(quizId);
    if (!quizDir) return false;
    const attempts = fs.attempts.get(quizId) || [];
    const att = attempts.find(a => a.id === attemptId);
    if (!att || !att._filename) return false;
    try {
      await quizDir.removeEntry(att._filename);
      fs.attempts.set(quizId, attempts.filter(a => a.id !== attemptId));
      return true;
    } catch (e) { console.warn("Delete attempt failed:", e); return false; }
  },

  async deleteQuiz(quizId) {
    if (!fs.connected) return false;
    const quizzesDir = await fs.dirHandle.getDirectoryHandle("quizzes");
    const def = fs.quizzes.get(quizId);
    if (!def) return false;
    const dirName = def._dirName;
    if (!dirName) return false;
    try {
      await quizzesDir.removeEntry(dirName, { recursive: true });
      fs.quizzes.delete(quizId);
      fs.quizDirs.delete(quizId);
      fs.attempts.delete(quizId);
      return true;
    } catch (e) { console.warn("Delete quiz failed:", e); return false; }
  },
};

/* =====================================================================
   Pyodide — lazy-loaded Python execution in the browser
   ===================================================================== */

let pyodide = null;
let pyodideLoadPromise = null;

function pyodideAvailable() { return true; }  // we always offer the UI; loading happens on click

async function loadPyodideIfNeeded(statusEl) {
  if (pyodide) return pyodide;
  if (pyodideLoadPromise) return pyodideLoadPromise;
  if (statusEl) statusEl.textContent = "Loading Python… (~10 MB, first time only)";
  pyodideLoadPromise = (async () => {
    if (!window.loadPyodide) {
      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js";
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }
    pyodide = await window.loadPyodide({
      indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.0/full/"
    });
    return pyodide;
  })();
  return pyodideLoadPromise;
}

async function runPython(code) {
  const py = await loadPyodideIfNeeded();
  py.runPython(`
import sys, io
_stdout_buf = io.StringIO()
_stderr_buf = io.StringIO()
sys.stdout = _stdout_buf
sys.stderr = _stderr_buf
  `);
  let error = null, value;
  try {
    value = py.runPython(code);
  } catch (e) {
    error = (e && e.message) || String(e);
  }
  py.runPython(`
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
  `);
  const stdout = py.runPython("_stdout_buf.getvalue()");
  const stderr = py.runPython("_stderr_buf.getvalue()");
  return { stdout, stderr, value, error };
}

// Reset interpreter state between runs to avoid stale definitions
async function resetPythonNamespace() {
  const py = await loadPyodideIfNeeded();
  py.runPython(`
import sys
_keep = {"__name__", "__doc__", "__builtins__", "__loader__", "__spec__",
         "__package__", "sys", "io"}
for _k in list(globals().keys()):
    if _k not in _keep and not _k.startswith("_"):
        del globals()[_k]
  `);
}

/**
 * Attach a code runner UI (buttons + output panel) below a parent element.
 *   parentEl: where to append
 *   getCode: () => string — the user's code to run
 *   getTests: () => string[] | null — array of test assertion snippets (optional)
 *   setupCode: string | null — code to run BEFORE user code (e.g., _build helpers)
 *   runnerId: unique identifier
 */
// Make Tab insert spaces (and Shift+Tab dedent) inside a code textarea, instead of
// moving focus. Handles multi-line selections; preserves native undo for the common case.
function enableTabIndent(ta) {
  const INDENT = "    "; // 4 spaces (Python)
  ta.addEventListener("keydown", e => {
    if (e.key !== "Tab") return;
    e.preventDefault();
    const start = ta.selectionStart, end = ta.selectionEnd, val = ta.value;
    if (start === end && !e.shiftKey) {
      // Simple cursor insert — use execCommand so Ctrl/Cmd+Z still works.
      if (document.execCommand && document.execCommand("insertText", false, INDENT)) return;
      ta.value = val.slice(0, start) + INDENT + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + INDENT.length;
      ta.dispatchEvent(new Event("input", { bubbles: true }));
      return;
    }
    // Indent/dedent every line touched by the selection.
    const lineStart = val.lastIndexOf("\n", start - 1) + 1;
    const lines = val.slice(lineStart, end).split("\n");
    let newStart, newEnd, newBlock;
    if (e.shiftKey) {
      let removedFirst = 0, removedTotal = 0;
      newBlock = lines.map((ln, idx) => {
        const m = ln.match(/^( {1,4}|\t)/);
        const rem = m ? m[0].length : 0;
        if (idx === 0) removedFirst = rem;
        removedTotal += rem;
        return ln.slice(rem);
      }).join("\n");
      newStart = Math.max(lineStart, start - removedFirst);
      newEnd = end - removedTotal;
    } else {
      newBlock = lines.map(ln => INDENT + ln).join("\n");
      newStart = start + INDENT.length;
      newEnd = end + INDENT.length * lines.length;
    }
    ta.value = val.slice(0, lineStart) + newBlock + val.slice(end);
    ta.selectionStart = newStart;
    ta.selectionEnd = newEnd;
    ta.dispatchEvent(new Event("input", { bubbles: true }));
  });
}

function attachCodeRunner(parentEl, getCode, getTests, runnerId, setupCode) {
  const panel = document.createElement("div");
  panel.className = "code-runner";
  panel.dataset.runnerId = runnerId;
  const hasTests = typeof getTests === "function" && (getTests() || []).length > 0;
  panel.innerHTML = `
    <div class="code-runner-controls">
      <button data-act="run">▶ Run</button>
      ${hasTests ? `<button data-act="test">✓ Run tests</button>` : ""}
      <span class="code-runner-status"></span>
    </div>
    <div class="code-runner-output" hidden></div>
  `;
  parentEl.appendChild(panel);

  const status = panel.querySelector(".code-runner-status");
  const output = panel.querySelector(".code-runner-output");

  const showOutput = (text, kind) => {
    output.textContent = text;
    output.className = "code-runner-output" + (kind ? " " + kind : "");
    output.hidden = false;
  };

  panel.querySelector('[data-act="run"]').onclick = async () => {
    status.textContent = "Running…";
    output.hidden = true;
    try {
      await loadPyodideIfNeeded(status);
      await resetPythonNamespace();
      const setup = setupCode || "";
      const full = setup + "\n" + getCode();
      const result = await runPython(full);
      status.textContent = "";
      if (result.error) {
        showOutput(result.stdout + result.stderr + "\n" + result.error, "error");
      } else {
        const body = (result.stdout || "") + (result.stderr || "");
        showOutput(body || "(no output)", body ? null : null);
      }
    } catch (e) {
      status.textContent = "";
      showOutput("Loader error: " + e.message, "error");
    }
  };

  const testBtn = panel.querySelector('[data-act="test"]');
  if (testBtn) {
    testBtn.onclick = async () => {
      status.textContent = "Running tests…";
      output.hidden = true;
      try {
        await loadPyodideIfNeeded(status);
        await resetPythonNamespace();
        const setup = setupCode || "";
        // Run setup + user code first
        const setupResult = await runPython(setup + "\n" + getCode());
        if (setupResult.error) {
          status.textContent = "";
          showOutput("Setup / your code failed:\n" + setupResult.stderr + "\n" + setupResult.error, "error");
          return;
        }
        // Run each test independently and collect results
        const tests = getTests();
        const lines = [];
        let passed = 0, failed = 0;
        for (let i = 0; i < tests.length; i++) {
          const t = tests[i];
          const result = await runPython(t);
          if (result.error) {
            failed++;
            lines.push(`FAIL  ${shortTestLabel(t)}`);
            lines.push(`      ${result.error.split("\n").pop()}`);
          } else {
            passed++;
            lines.push(`pass  ${shortTestLabel(t)}`);
          }
        }
        status.textContent = "";
        const summary = `${passed} passed, ${failed} failed\n\n` + lines.join("\n");
        showOutput(summary, failed === 0 ? "success" : "error");
      } catch (e) {
        status.textContent = "";
        showOutput("Loader error: " + e.message, "error");
      }
    };
  }
  return panel;
}

function shortTestLabel(testCode) {
  const firstLine = testCode.trim().split("\n")[0];
  return firstLine.length > 60 ? firstLine.slice(0, 57) + "…" : firstLine;
}

// Collect every chapter across all phases in document order, in syllabus checkbox lines
// like "- [x] 1.1 ..." / "- [ ] 6.3 ...". Marks the first chapter of each phase (phaseStart).
function parseSyllabusChapters(md) {
  const items = [];
  let curPhase = null, firstInPhase = false;
  for (const line of md.split("\n")) {
    const h2 = line.match(/^##\s+(.*)$/);
    if (h2) {
      const ph = h2[1].match(/^(Phase \d+)\b/);
      if (ph) { curPhase = ph[1]; firstInPhase = true; }
      else { curPhase = null; } // left the phases region (Session Log, etc.)
      continue;
    }
    if (!curPhase) continue;
    const m = line.match(/^\s*-\s+\[([ xX])\]\s*(.*)$/);
    if (m) {
      items.push({ done: m[1].toLowerCase() === "x", phase: curPhase, title: (m[2] || "").trim(), phaseStart: firstInPhase });
      firstInPhase = false;
    }
  }
  return items.length ? items : null;
}

function renderSyllabusProgress() {
  const dots = document.getElementById("spDots");
  const label = document.getElementById("spLabel");
  const items = fs.syllabusProgress;
  if (!items || !items.length) { dots.hidden = true; label.hidden = true; return; }
  const total = items.length;
  const done = items.filter(x => x.done).length;
  let lastDone = -1;
  items.forEach((x, i) => { if (x.done) lastDone = i; });
  const fillPct = (lastDone >= 0 && total > 1) ? (lastDone / (total - 1)) * 100 : 0;

  dots.innerHTML = "";
  items.forEach(x => {
    const d = document.createElement("div");
    d.className = "sp-dot" + (x.done ? " done" : "") + (x.phaseStart ? " major" : "");
    d.title = `${x.phase} · ${x.title}${x.done ? " ✓" : ""}`;
    dots.appendChild(d);
  });
  dots.style.setProperty("--sp-fill", fillPct + "%");

  const pct = Math.round((done / total) * 100);
  label.textContent = `${done}/${total} · ${pct}%`;
  document.getElementById("syllabusProgress").title = `Curriculum progress — ${done} of ${total} chapters complete (from SYLLABUS.md)`;
  dots.hidden = false;
  label.hidden = false;
}

/* ===== clipboard + Ask Claude ===== */
async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); ta.remove(); return true; }
    catch (err) { ta.remove(); return false; }
  }
}

function shortQuizSlug(title) {
  const first = String(title || "").trim().split(/\s+/)[0] || "quiz";
  return first.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 12);
}

function buildReviewPy() {
  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) return "";
  const date = new Date(activeSession ? activeSession.timestamp : Date.now());
  const lines = [];

  lines.push(`"""`);
  lines.push(`Quiz Review — ${quiz.title}`);
  lines.push(`Date: ${date.toISOString().slice(0, 10)}`);
  lines.push(`Generated: ${date.toLocaleString()}`);
  lines.push(`Source: study-tool (auto-exported)`);
  lines.push(``);
  lines.push(`Mirrors the website layout per question:`);
  lines.push(`  prompt → my answer → auto-grade → self-rate → note → expected answer`);
  lines.push(`"""`);
  lines.push(``);
  lines.push(`# =============================================================================`);
  lines.push(`# ${quiz.title}`);
  lines.push(`# =============================================================================`);
  lines.push(``);

  quiz.questions.forEach((q, i) => {
    const r = activeSession ? activeSession.responses[i] : null;
    const typeName = q.type === "mc" ? "multiple choice" : q.type === "text" ? "text" : "code";

    lines.push(`# -----------------------------------------------------------------------------`);
    lines.push(`# Q${i + 1}. ${q.prompt}`);
    lines.push(`# Type: ${typeName}`);
    lines.push(`# -----------------------------------------------------------------------------`);
    lines.push(``);

    if (q.type === "mc") {
      lines.push(`# Options:`);
      (q.options || []).forEach((opt, oi) => {
        const marker = q.correct === oi ? "   <- correct" : "";
        lines.push(`#   [${oi}] ${opt}${marker}`);
      });
      lines.push(``);
    }

    if (r === null || r === undefined) {
      lines.push(`# MY ANSWER: (not submitted)`);
    } else if (q.type === "mc") {
      const mark = r.correct === true ? "   [correct]" : r.correct === false ? "   [incorrect]" : "";
      const val = r.value !== null && r.value !== undefined
        ? `[${r.value}] ${q.options[r.value]}`
        : "(none chosen)";
      lines.push(`# MY ANSWER: ${val}${mark}`);
    } else if (q.type === "text") {
      const mark = r.correct === true ? (r.override ? "   [self-marked correct]" : "   [correct]") : r.correct === false ? "   [incorrect]" : "";
      lines.push(`# MY ANSWER: ${r.value || "(empty)"}${mark}`);
    } else if (q.type === "code") {
      lines.push(`# MY ANSWER:`);
      const codeLines = (r.value || "").split("\n");
      if (codeLines.length === 0 || (codeLines.length === 1 && !codeLines[0])) {
        lines.push(`#   (empty)`);
      } else {
        codeLines.forEach(cl => lines.push(`#   ${cl}`));
      }
    }

    if (r && r.correct === true) lines.push(`# AUTO-GRADE: correct${r.override ? " (self-marked)" : ""}`);
    else if (r && r.correct === false) lines.push(`# AUTO-GRADE: incorrect`);
    else if (r && r.correct === null && (q.type === "mc" || (q.type === "text" && q.answer))) {
      // null in a normally-graded type means not yet submitted via the grader path
    }

    lines.push(`# SELF-RATE: ${r && r.selfRating ? r.selfRating + "/5" : "—"}`);

    if (r && r.note) {
      lines.push(`# NOTE:`);
      r.note.split("\n").forEach(nl => lines.push(`#   ${nl}`));
    } else {
      lines.push(`# NOTE: —`);
    }

    lines.push(``);

    const expected = q.type === "mc"
      ? (typeof q.correct === "number" ? `[${q.correct}] ${q.options[q.correct]}` : "(no correct option set)")
      : (q.answer || "(no reference answer set)");
    lines.push(`# +-- EXPECTED ANSWER ----------------------------------------------------------`);
    expected.split("\n").forEach(el => lines.push(`# | ${el}`));
    lines.push(`# +-----------------------------------------------------------------------------`);
    lines.push(``);
    lines.push(``);
  });

  return lines.join("\n");
}

function downloadReviewPy() {
  if (!activeQuizId) return;
  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) return;
  const content = buildReviewPy();
  const date = new Date(activeSession ? activeSession.timestamp : Date.now()).toISOString().slice(0, 10);
  const filename = `Review_${date}_${shortQuizSlug(quiz.title)}.py`;
  const blob = new Blob([content], { type: "text/x-python" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Saved ${filename}`);
}

async function sendSessionToClaude() {
  if (!activeQuizId || !activeSession) return;
  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) return;
  const lines = [
    `Please review my quiz session for "${quiz.title}" (${new Date(activeSession.timestamp).toLocaleString()}):`,
    ""
  ];
  quiz.questions.forEach((q, i) => {
    lines.push(`--- Q${i + 1} (${q.type}) ---`);
    lines.push(`Prompt: ${q.prompt}`);
    if (q.type === "mc") {
      q.options.forEach((opt, oi) => lines.push(`  ${oi}: ${opt}${q.correct === oi ? "  [correct]" : ""}`));
    } else if (q.answer) {
      lines.push(`Expected: ${q.answer}`);
    }
    const r = activeSession.responses[i];
    if (r === null || r === undefined) {
      lines.push(`My answer: (skipped)`);
    } else if (q.type === "mc") {
      const mark = r.correct === true ? " [✓]" : r.correct === false ? " [✗]" : "";
      lines.push(`My answer: ${r.value !== null && r.value !== undefined ? q.options[r.value] : "(none chosen)"}${mark}`);
    } else {
      lines.push(`My answer:`);
      lines.push((r.value || "").split("\n").map(l => "  " + l).join("\n"));
      if (r.correct === true) lines.push(r.override ? `Self-marked: correct` : `Auto-graded: correct`);
      else if (r.correct === false) lines.push(`Auto-graded: incorrect`);
    }
    if (r && r.selfRating) lines.push(`Self-rate: ${r.selfRating}/5`);
    if (r && r.note) lines.push(`Note: ${r.note}`);
    lines.push("");
  });
  lines.push("Please go through each one and tell me what I got right, what to revisit, and any patterns in my misses.");
  const ok = await copyToClipboard(lines.join("\n"));
  if (ok) toast("Session copied. Paste in Claude Code chat.");
  else toast("Copy failed — see console");
}

/* ===== modal helper ===== */
function modal(contentHtml, onMount) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `<div class="modal">${contentHtml}</div>`;
  document.body.appendChild(backdrop);
  backdrop.addEventListener("click", e => { if (e.target === backdrop) backdrop.remove(); });
  if (onMount) onMount(backdrop);
  const firstInput = backdrop.querySelector("input, textarea, select");
  if (firstInput) firstInput.focus();
  return backdrop;
}

/* ===== flashcard face rendering ===== */
function escapeHtml(s) {
  return (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
// Multi-line content (code / diagrams) → left-aligned monospace box with real
// indentation. Single-line content → centered prose, with `inline code` styled.
function appendProse(el, t) {
  t = t.replace(/^\n+|\n+$/g, "");
  if (!t) return;
  const div = document.createElement("div");
  div.className = "face-text";
  div.innerHTML = escapeHtml(t).replace(/`([^`]+)`/g, "<code>$1</code>");
  el.appendChild(div);
}
function appendCode(el, code) {
  code = code.replace(/^\n+/, "").replace(/\n+$/, "");
  if (!code) return;
  const pre = document.createElement("pre");
  pre.className = "card-code";
  pre.textContent = code;
  el.appendChild(pre);
}
function setFaceContent(el, text) {
  text = text || "";
  el.classList.remove("has-code");
  if (text.includes("```")) {
    // Fenced: ``` blocks → left-aligned code boxes; everything else → prose.
    el.classList.add("has-code");
    el.innerHTML = "";
    text.split("```").forEach((part, i) => (i % 2 === 1 ? appendCode(el, part) : appendProse(el, part)));
  } else {
    // No fences → prose (line breaks preserved by the face's pre-wrap). Only fenced
    // ``` blocks become monospace code boxes.
    el.innerHTML = escapeHtml(text).replace(/`([^`]+)`/g, "<code>$1</code>");
  }
}

/* ===== categories ===== */
function getCategorySorted() {
  return [...state.categories].sort((a, b) => a.order - b.order);
}
function getCardsForCategory(catId) {
  return state.cards.filter(c => c.categoryId === catId).sort((a, b) => a.order - b.order);
}

function renderCategories() {
  const list = document.getElementById("categoriesList");
  list.innerHTML = "";

  // Always-present Review Queue pseudo-category at the top
  const queueCount = (state.reviewQueue || []).length;
  const queueLi = document.createElement("li");
  queueLi.dataset.id = "__queue__";
  queueLi.classList.toggle("active", activeCategoryId === "__queue__");
  queueLi.classList.toggle("pinned", prefs.pinnedCategoryId === "__queue__");
  const queuePinned = prefs.pinnedCategoryId === "__queue__";
  queueLi.innerHTML = `
    <span class="name">★ Review queue</span>
    <button class="pin-btn" title="${queuePinned ? "Unpin" : "Pin as default"}">${queuePinned ? "●" : "○"}</button>
    <span class="count">${queueCount}</span>
  `;
  queueLi.addEventListener("click", () => selectCategory("__queue__"));
  queueLi.querySelector(".pin-btn").addEventListener("click", e => {
    e.stopPropagation();
    if (prefs.pinnedCategoryId === "__queue__") delete prefs.pinnedCategoryId;
    else prefs.pinnedCategoryId = "__queue__";
    savePrefs();
    renderCategories();
  });
  list.appendChild(queueLi);

  const cats = getCategorySorted();
  if (cats.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.innerHTML = `No categories yet.<br>Click + to add one.`;
    list.appendChild(empty);
    return;
  }
  cats.forEach(cat => {
    const count = state.cards.filter(c => c.categoryId === cat.id).length;
    const isPinned = prefs.pinnedCategoryId === cat.id;
    const li = document.createElement("li");
    li.dataset.id = cat.id;
    li.draggable = true;
    li.classList.toggle("active", cat.id === activeCategoryId);
    li.classList.toggle("pinned", isPinned);
    li.innerHTML = `
      <span class="name"></span>
      <button class="pin-btn" title="${isPinned ? "Unpin (was set as default)" : "Pin as default — opens on refresh"}">${isPinned ? "●" : "○"}</button>
      <span class="count">${count}</span>
    `;
    li.querySelector(".name").textContent = cat.name;
    li.addEventListener("click", () => selectCategory(cat.id));
    li.querySelector(".pin-btn").addEventListener("click", e => {
      e.stopPropagation();
      if (prefs.pinnedCategoryId === cat.id) delete prefs.pinnedCategoryId;
      else prefs.pinnedCategoryId = cat.id;
      savePrefs();
      renderCategories();
    });
    attachDrag(li, "category");
    list.appendChild(li);
  });
}

function selectCategory(id) {
  activeCategoryId = id;
  singleIdx = 0;
  editMode = false;
  prefs.lastCategoryId = id;
  savePrefs();
  renderCategories();
  renderCardsBody();
}

function renderCardsBody() {
  const body = document.getElementById("cardsBody");
  const title = document.getElementById("currentCatTitle");
  const addBtn = document.getElementById("addCardBtn");
  const renameBtn = document.getElementById("renameCatBtn");
  const deleteBtn = document.getElementById("deleteCatBtn");
  const viewBtn = document.getElementById("viewModeBtn");
  const editBtn = document.getElementById("editModeBtn");

  if (!activeCategoryId) {
    title.textContent = "—";
    [addBtn, renameBtn, deleteBtn, viewBtn, editBtn].forEach(b => b.hidden = true);
    body.innerHTML = `<div class="placeholder">Pick or create a category to add flashcards.</div>`;
    return;
  }

  const isQueue = activeCategoryId === "__queue__";
  let cards = [];

  if (isQueue) {
    title.textContent = "★ Review queue";
    // Queue: no rename/delete/add-card. Keep view + edit toggles.
    addBtn.hidden = true;
    renameBtn.hidden = true;
    deleteBtn.hidden = true;
    viewBtn.hidden = false;
    editBtn.hidden = false;
    cards = (state.reviewQueue || [])
      .map(cardId => state.cards.find(c => c.id === cardId))
      .filter(Boolean);
  } else {
    const cat = state.categories.find(c => c.id === activeCategoryId);
    if (!cat) { activeCategoryId = null; renderCardsBody(); return; }
    title.textContent = cat.name;
    [addBtn, renameBtn, deleteBtn, viewBtn, editBtn].forEach(b => b.hidden = false);
    cards = getCardsForCategory(activeCategoryId);
  }

  viewBtn.textContent = viewMode === "grid" ? "Single" : "Grid";
  viewBtn.classList.toggle("active", viewMode === "single");
  editBtn.textContent = editMode ? "Done" : "Edit";
  editBtn.classList.toggle("active", editMode);

  body.innerHTML = "";

  if (!isQueue) {
    // Collapsible overview + quick add (not for the queue)
    const cat = state.categories.find(c => c.id === activeCategoryId);
    const collapsible = document.createElement("details");
    collapsible.className = "collapsible";
    collapsible.open = !!cat.summary || cards.length === 0;
    collapsible.innerHTML = `
      <summary>Overview &amp; Quick add</summary>
      <div class="collapsible-content">
        <div class="quick-add-row">
          <label>Overview</label>
          <input id="catSummaryInput" placeholder="Optional summary for this category">
        </div>
        <div class="quick-add-row">
          <label>Quick add</label>
          <input id="qaFront" placeholder="Front">
          <input id="qaBack" placeholder="Back">
          <button id="qaSubmit" class="primary">Add</button>
        </div>
      </div>
    `;
    body.appendChild(collapsible);

    collapsible.querySelector("#catSummaryInput").value = cat.summary || "";
    collapsible.querySelector("#catSummaryInput").addEventListener("change", e => {
      cat.summary = e.target.value;
      saveState();
      toast("Summary saved");
    });
    collapsible.querySelector("#qaSubmit").addEventListener("click", quickAddCard);
    collapsible.querySelector("#qaBack").addEventListener("keydown", e => {
      if (e.key === "Enter") quickAddCard();
    });
  }

  if (cards.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.innerHTML = isQueue
      ? `Review queue is empty.<br>Add cards by clicking <strong>+ Queue</strong> on any flashcard, quiz question, or lesson exercise.`
      : `No cards yet. Use Quick add above or click "+ Card".`;
    body.appendChild(empty);
    return;
  }

  if (viewMode === "grid") {
    const grid = document.createElement("div");
    grid.className = "flashcards-grid";
    cards.forEach(card => grid.appendChild(renderFlashcard(card)));
    body.appendChild(grid);
  } else {
    if (singleIdx >= cards.length) singleIdx = cards.length - 1;
    if (singleIdx < 0) singleIdx = 0;
    const wrap = document.createElement("div");
    wrap.className = "flashcards-single";
    wrap.appendChild(renderFlashcard(cards[singleIdx]));

    const nav = document.createElement("div");
    nav.className = "single-nav";
    nav.innerHTML = `
      <button id="prevCard">‹ Prev</button>
      <span class="index-label">${singleIdx + 1} / ${cards.length}</span>
      <button id="nextCard">Next ›</button>
    `;
    wrap.appendChild(nav);
    body.appendChild(wrap);

    document.getElementById("prevCard").disabled = singleIdx === 0;
    document.getElementById("nextCard").disabled = singleIdx === cards.length - 1;
    document.getElementById("prevCard").onclick = () => { if (singleIdx > 0) { singleIdx--; renderCardsBody(); } };
    document.getElementById("nextCard").onclick = () => { if (singleIdx < cards.length - 1) { singleIdx++; renderCardsBody(); } };
  }
}

function renderFlashcard(card) {
  const wrap = document.createElement("div");
  wrap.className = "flashcard-wrap";

  const flipped = !!cardFlippedState[card.id];
  const cls = "flashcard" + (flipped ? " flipped" : "") + (editMode ? " editing" : "");

  const frontHtml = editMode
    ? `<textarea class="face-edit" data-side="front" placeholder="Front"></textarea>`
    : `<div class="face-content"></div>`;
  const backHtml = editMode
    ? `<textarea class="face-edit" data-side="back" placeholder="Back"></textarea>`
    : `<div class="face-content"></div>`;

  const inQueue = (state.reviewQueue || []).includes(card.id);

  wrap.innerHTML = `
    <div class="${cls}" data-id="${card.id}" draggable="${!editMode}">
      <div class="flashcard-inner">
        <div class="flashcard-face flashcard-front">
          <div class="face-corner">Front</div>
          ${inQueue ? `<div class="queue-indicator" title="In review queue">★</div>` : ""}
          ${frontHtml}
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="face-corner">Back</div>
          ${backHtml}
        </div>
      </div>
    </div>
    ${editMode ? `
      <div class="flashcard-controls">
        <button data-act="flip">Show ${flipped ? "front" : "back"}</button>
        <button data-act="del" class="danger">Delete</button>
      </div>` : ""}
    <div class="card-foot${editMode ? " always-show" : ""}">
      <button class="ask-claude-btn" data-act="queue">${inQueue ? "★ In queue" : "+ Queue"}</button>
      <button class="ask-claude-btn" data-act="ask">Ask Claude →</button>
    </div>
  `;

  const flashcardEl = wrap.querySelector(".flashcard");

  if (editMode) {
    const frontEdit = wrap.querySelector('[data-side="front"]');
    const backEdit = wrap.querySelector('[data-side="back"]');
    frontEdit.value = card.front;
    backEdit.value = card.back;
    frontEdit.addEventListener("change", () => { card.front = frontEdit.value; saveState(); });
    backEdit.addEventListener("change", () => { card.back = backEdit.value; saveState(); });
    // Prevent flip when clicking inside textarea
    [frontEdit, backEdit].forEach(t => t.addEventListener("click", e => e.stopPropagation()));

    wrap.querySelector('[data-act="flip"]').onclick = e => {
      e.stopPropagation();
      cardFlippedState[card.id] = !cardFlippedState[card.id];
      flashcardEl.classList.toggle("flipped");
      e.currentTarget.textContent = `Show ${flashcardEl.classList.contains("flipped") ? "front" : "back"}`;
    };
    wrap.querySelector('[data-act="del"]').onclick = e => {
      e.stopPropagation();
      if (confirm("Delete this card?")) {
        state.cards = state.cards.filter(c => c.id !== card.id);
        state.reviewQueue = (state.reviewQueue || []).filter(id => id !== card.id);
        delete cardFlippedState[card.id];
        saveState();
        renderCardsBody();
        renderCategories();
      }
    };
  } else {
    setFaceContent(wrap.querySelector(".flashcard-front .face-content"), card.front);
    setFaceContent(wrap.querySelector(".flashcard-back .face-content"), card.back);
    flashcardEl.addEventListener("click", () => {
      cardFlippedState[card.id] = !cardFlippedState[card.id];
      flashcardEl.classList.toggle("flipped");
    });
    attachDrag(flashcardEl, "card");
  }

  wrap.querySelector('[data-act="queue"]').onclick = e => {
    e.stopPropagation();
    state.reviewQueue = state.reviewQueue || [];
    const idx = state.reviewQueue.indexOf(card.id);
    if (idx >= 0) {
      state.reviewQueue.splice(idx, 1);
      toast("Removed from review queue");
    } else {
      state.reviewQueue.push(card.id);
      toast("Added to review queue");
    }
    saveState();
    renderCardsBody();
    renderCategories();
  };

  wrap.querySelector('[data-act="ask"]').onclick = e => {
    e.stopPropagation();
    const cat = state.categories.find(c => c.id === card.categoryId);
    openAskClaude(`flashcard from "${cat ? cat.name : 'category'}"`, [
      `Front: ${card.front}`,
      `Back: ${card.back || '(empty)'}`
    ]);
  };

  return wrap;
}

function quickAddCard() {
  if (!activeCategoryId) { toast("Pick a category first"); return; }
  const front = document.getElementById("qaFront").value.trim();
  const back = document.getElementById("qaBack").value.trim();
  if (!front) { toast("Front required"); return; }
  const order = state.cards.filter(c => c.categoryId === activeCategoryId).length;
  state.cards.push({ id: uid(), categoryId: activeCategoryId, front, back, order });
  saveState();
  document.getElementById("qaFront").value = "";
  document.getElementById("qaBack").value = "";
  renderCardsBody();
  renderCategories();
  setTimeout(() => { const f = document.getElementById("qaFront"); if (f) f.focus(); }, 0);
}

    "c-set-add":     { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-q2" },
    "c-set-dedup":   { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-q3" },
    "c-amortized":   { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-q6" },
    "c-ll-remove":   { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-e4" },
    "c-listnode":    { type: "lesson-section", lessonId: "lesson-1.4", section: "intro" },
    "c-bigo-map":    { type: "lesson-section", lessonId: "lesson-1.1", section: "intro" }
  };

  // Card ID -> concept (topic-based). These can match across many sources.
  const conceptMap = {
    "c-neg-idx":      "negative-indexing",
    "c-slicing":      "slicing-rules",
    "c-insert-0":     "list-insert-front-cost",
    "c-join":         "string-join",
    "c-str-immut":    "string-immutability-on-loop",
    "c-enumerate":    "enumerate-idiom",
    "c-range-rev":    "range-reverse-traversal",
    "c-range-lazy":   "range-lazy",
    "c-floor":        "floor-division",
    "c-is-none":      "is-none-check",
    "c-dict-basics":  "dict-basics",
    "c-del-d":        "dict-del",
    "c-pop":          "dict-pop",
    "c-get":          "dict-get",
    "c-counter":      "dict-counter-idiom",
    "c-setdefault":   "dict-setdefault-grouping",
    "c-dict-keys":    "dict-keys-hashable",
    "c-set-add":      "set-add-vs-append",
    "c-set-dedup":    "set-dedup-duplicates",
    "c-set-ops":      "set-operators",
    "c-listnode":     "ll-listnode-class",
    "c-ll-traverse":  "ll-canonical-traversal",
    "c-ll-reverse":   "ll-3pointer-reverse",
    "c-ll-3ptr-why":  "ll-3pointer-why",
    "c-ll-remove":    "ll-remove-node",
    "c-hash-int":     "hash-internals",
    "c-hash-coll":    "hash-collisions-probing",
    "c-hash-resize":  "hash-resize-load",
    "c-amortized":    "amortized-O1",
    "c-dict-vs-set":  "dict-vs-set-rule",
    "c-two-sum":      "two-sum-dict-design",
    "c-cont-dup":     "contains-duplicate-pattern",
    "c-count-scan":   "count-then-scan-pattern",
    "c-grouping":     "grouping-pattern",
    "c-bigo-map":     "bigo-hierarchy",
    "c-bigo-rules":   "bigo-rules",
    "c-recursion":    "recursion-bigo",
    "c-n-plus-m":     "bigo-n-plus-m",
    "c-early-exit":   "early-exit-bigo",
    "c-h-brute":      "habit-brute-force-first",
    "c-h-dryrun":     "habit-dry-run",
    "c-h-bool":       "habit-trace-booleans",
    "c-h-diagram":    "habit-draw-diagrams",
    "c-g-iter-mod":   "gotcha-modify-while-iter",
    "c-g-slice-cop":  "gotcha-slice-copy",
    "c-g-del-as-yg":  "gotcha-delete-as-you-go"
  };

  const linkedSources = [];
  const linkedConcepts = [];
  const conflicts = [];

  state.cards.forEach(card => {
    // Add sourceRef if missing and we have a mapping
    if (!card.sourceRef) {
      const m = sourceMap[card.id];
      if (m && !state.cards.some(c => c !== card && sourceRefMatches(c.sourceRef, m))) {
        card.sourceRef = m;
        linkedSources.push(card.id);
      } else if (m) {
        conflicts.push(card.id);
      }
    }
    // Add concept if missing
    if (!card.concept) {
      const c = conceptMap[card.id];
      if (c) {
        card.concept = c;
        linkedConcepts.push(card.id);
      }
    }
  });

  if (linkedSources.length || linkedConcepts.length) {
    saveState();
    console.log(`[migration] sourceRef added to ${linkedSources.length} cards, concepts added to ${linkedConcepts.length}`);
    if (conflicts.length) console.log(`[migration] sourceRef skipped (conflict):`, conflicts);
    if (linkedSources.length || linkedConcepts.length) {
      const parts = [];
      if (linkedSources.length) parts.push(`${linkedSources.length} sources`);
      if (linkedConcepts.length) parts.push(`${linkedConcepts.length} concepts`);
      toast(`Linked ${parts.join(", ")}`);
    }
  }
  return { linkedSources: linkedSources.length, linkedConcepts: linkedConcepts.length };
}

function sourceRefMatches(a, b) {
  if (!a || !b) return false;
  if (a.type !== b.type) return false;
  if (a.quizId !== b.quizId) return false;
  if (a.lessonId !== b.lessonId) return false;
  if (a.exerciseId !== b.exerciseId) return false;
  if (a.section !== b.section) return false;
  if (a.questionIdx !== b.questionIdx) return false;
  return true;
}

function findCardBySource(sourceRef, concept) {
  // Prefer exact source match; fall back to concept match.
  if (sourceRef) {
    const byRef = state.cards.find(c => sourceRefMatches(c.sourceRef, sourceRef));
    if (byRef) return { card: byRef, matchedBy: "source" };
  }
  if (concept) {
    const byConcept = state.cards.find(c => c.concept && c.concept === concept);
    if (byConcept) return { card: byConcept, matchedBy: "concept" };
  }
  return null;
}

function makeFlashcardFromSource(sourceRef, prefill, concept) {
  const match = findCardBySource(sourceRef, concept);
  if (!match) {
    openQuickCardModal({ ...prefill, sourceRef, concept });
    return;
  }
  openSourceConflictModal(match.card, sourceRef, prefill, concept, match.matchedBy);
}

function editCard(id) {
  const card = state.cards.find(c => c.id === id);
  if (!card) { toast("Card not found"); return; }
  modal(`
    <h2>Edit flashcard</h2>

    root.querySelector("#ec-back").value = card.back || "";

    root.querySelector('[data-act="save"]').onclick = () => {

      else delete card.concept;
      saveState();

    };
  });
}

function openSourceConflictModal(existing, sourceRef, prefill, concept, matchedBy) {
  const matchLabel = matchedBy === "concept"
    ? `Matched by shared concept "${concept}" — this card was created from a different source but covers the same topic.`
    : `This is the same source as the card.`;
  modal(`
    <h2>A flashcard already covers this</h2>
    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">${matchLabel}</p>
    <label>Existing card</label>
    <div class="context-preview" id="sc-existing"></div>
    <label>New content from source</label>
    <div class="context-preview" id="sc-new"></div>
    <div class="modal-actions" style="flex-wrap: wrap; gap: 6px;">
      <button class="ghost" data-act="cancel">Cancel</button>
      <button data-act="new">Create new (unlinked)</button>
      <button data-act="edit">Edit existing</button>
      <button class="primary" data-act="replace">Replace existing with new</button>
    </div>
  `, root => {
    root.querySelector("#sc-existing").textContent =
      `Front: ${existing.front}\nBack:  ${existing.back || "(empty)"}`;
    root.querySelector("#sc-new").textContent =
      `Front: ${prefill.front || ""}\nBack:  ${prefill.back || "(empty)"}`;
    root.querySelector('[data-act="cancel"]').onclick = () => root.remove();
    root.querySelector('[data-act="new"]').onclick = () => {
      // Create without a sourceRef or concept so it doesn't conflict next time
      root.remove();
      openQuickCardModal({ ...prefill });
    };
    root.querySelector('[data-act="edit"]').onclick = () => {
      root.remove();
      editCard(existing.id);
    };
    root.querySelector('[data-act="replace"]').onclick = () => {
      existing.front = prefill.front || existing.front;
      existing.back = prefill.back !== undefined ? prefill.back : existing.back;
      // If matched by concept, ensure the card carries it (in case it didn't)
      if (concept && !existing.concept) existing.concept = concept;
      saveState();
      root.remove();
      renderCardsBody();
      renderCategories();
      toast("Card updated");
    };
  });
}

function openQuickCardModal({ front = "", back = "", sourceRef = null, concept = null } = {}) {
  modal(`
    <h2>Quick card</h2>
    <div class="field"><label>Category</label><select id="qc-cat"></select></div>
    <div class="field"><label>Front</label><input id="qc-front" placeholder="Concept"></div>
    <div class="field"><label>Back</label><textarea id="qc-back" rows="6"></textarea></div>
    <div class="row" style="margin-top: 8px; gap: 16px;">
      <label class="row" style="margin: 0;">
