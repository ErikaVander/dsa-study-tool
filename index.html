<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DSA Study</title>
<meta name="description" content="Free DSA interview-prep study tool — lessons, quizzes, spaced-repetition flashcards, and in-browser Python.">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DSA Study">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }

  :root {
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --bg-softer: #f5f5f5;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-dim: #9a9a9a;
    --border: #ececec;
    --border-strong: #d4d4d4;
    --accent: #1a1a1a;
    --accent-soft: #f3f3f3;
    --danger: #b91c1c;
    --good: #15803d;
    --radius: 8px;
    --radius-sm: 4px;
    --radius-lg: 14px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  button {
    font: inherit;
    color: inherit;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  button:hover { background: var(--bg-soft); border-color: var(--border-strong); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:disabled:hover { background: transparent; border-color: var(--border); }
  button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  button.primary:hover { background: #000; }
  button.ghost { border-color: transparent; color: var(--text-muted); }
  button.ghost:hover { background: var(--bg-soft); color: var(--text); }
  button.danger { color: var(--danger); }
  button.danger:hover { background: #fef2f2; border-color: var(--danger); }
  button.icon { padding: 4px 8px; font-size: 14px; }
  button.toggle.active { background: var(--accent-soft); border-color: var(--border-strong); color: var(--text); }

  input, textarea, select {
    font: inherit;
    color: inherit;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    width: 100%;
    transition: border-color 0.12s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--text); }
  textarea { resize: vertical; min-height: 80px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }

  body { display: flex; flex-direction: column; }
  .topbar {
    display: flex;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    gap: 32px;
    background: var(--bg);
  }
  .title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .tabs { display: flex; gap: 4px; }
  .tab { border: none; padding: 6px 12px; color: var(--text-muted); border-radius: var(--radius-sm); }
  .tab.active { color: var(--text); background: var(--accent-soft); }
  /* Curriculum progress — connected dots (one per chapter, larger at each phase start) */
  .syllabus-progress { flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0; }
  .sp-dots { position: relative; flex: 1; display: flex; align-items: center; justify-content: space-between; min-width: 160px; height: 16px; }
  .sp-dots::before, .sp-dots::after { content: ""; position: absolute; top: 50%; transform: translateY(-50%); height: 2px; border-radius: 2px; }
  .sp-dots::before { left: 5px; right: 5px; background: var(--border); }                         /* full track */
  .sp-dots::after  { left: 5px; width: var(--sp-fill, 0px); background: var(--good); }            /* filled track */
  .sp-dot { position: relative; z-index: 1; width: 7px; height: 7px; flex: 0 0 auto; border-radius: 50%; background: var(--bg); border: 1.5px solid var(--border); box-sizing: border-box; }
  .sp-dot.done { background: var(--good); border-color: var(--good); }
  .sp-dot.learning { background: #f59e0b; border-color: #f59e0b; }
  .sp-dot.major { width: 12px; height: 12px; border-width: 2px; }
  .sp-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn { font-size: 15px; line-height: 1; padding: 7px 9px; }
  .settings-wrap { position: relative; }
  .settings-menu { position: absolute; top: 100%; right: 0; margin-top: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: 0 6px 20px rgba(0,0,0,0.14); min-width: 220px; padding: 6px; z-index: 150; }
  .settings-item { display: block; width: 100%; text-align: left; padding: 8px 10px; border: none; background: transparent; color: var(--text); font-size: 13px; border-radius: 5px; cursor: pointer; }
  .settings-item:hover { background: rgba(127,127,127,0.10); }
  .settings-sep { height: 1px; background: var(--border); margin: 5px 4px; }
  .avatar-btn { padding: 0; width: 32px; height: 32px; border-radius: 50%; overflow: hidden; border: 1px solid var(--border); background-size: cover; background-position: center; background-repeat: no-repeat; font-size: 13px; font-weight: 600; color: var(--text-muted); flex: 0 0 auto; }
  @media (min-width: 761px) { .mobile-only { display: none; } }
  /* Narrow screens (phones): let the header wrap instead of overflowing, and drop the
     progress bar onto its own full-width row below the title/tabs/actions. */
  @media (max-width: 760px) {
    .topbar { flex-wrap: wrap; gap: 10px 14px; padding: 12px 16px; }
    .topbar-actions { gap: 6px; flex-wrap: wrap; justify-content: flex-end; margin-left: auto; }
    .syllabus-progress { order: 5; flex-basis: 100%; }
    .tab { padding: 6px 10px; }
  }

  /* Plan / Job Search Roadmap page */
  .plan-intro { font-size: 13px; color: var(--text-muted); margin: 0 0 20px; max-width: 720px; }
  .plan-tier { margin-bottom: 24px; max-width: 720px; }
  .plan-tier-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 4px; }
  .plan-tier-head h2 { font-size: 16px; font-weight: 600; }
  .plan-ready { font-size: 12px; font-weight: 600; color: var(--good); white-space: nowrap; }
  .plan-brief { font-size: 13px; color: var(--text-muted); margin: 0 0 10px; }
  .plan-jobs { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .plan-jobs li { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; font-size: 14px; }
  .plan-jobs .pj-title { color: var(--text); }
  .plan-jobs .pj-title em { color: var(--text-muted); font-style: normal; font-size: 12px; }
  .plan-jobs .pj-pay { color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .plan-notes { margin: 4px 0 0; padding-left: 18px; font-size: 14px; color: var(--text); }
  .plan-notes li { margin-bottom: 4px; }

  main { flex: 1; display: flex; overflow: hidden; }
  .view { flex: 1; display: none; overflow: hidden; }
  .view.active { display: flex; }

  .pane {
    border-right: 1px solid var(--border);
    background: var(--bg-soft);
    width: 280px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .pane-header h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; }
  .pane-list { flex: 1; overflow-y: auto; padding: 8px; list-style: none; }
  .pane-list li {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    user-select: none;
  }
  .pane-list li:hover { background: var(--bg); }
  .pane-list li.active { background: var(--bg); border: 1px solid var(--border); }
  .pane-list li[draggable="true"] { cursor: grab; }
  .pane-list li.dragging { opacity: 0.4; }
  .pane-list .name { flex: 1; }
  .pane-list .count { font-size: 12px; color: var(--text-dim); }
  .pane-list .pin-btn {
    border: none;
    background: transparent;
    padding: 2px 6px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
    cursor: pointer;
    line-height: 1;
  }
  .pane-list li:hover .pin-btn,
  .pane-list li.pinned .pin-btn { opacity: 1; }
  .pane-list li.pinned .pin-btn { color: var(--text); }
  .pane-list .pin-btn:hover { color: var(--text); }

  .main-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .main-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .main-controls { display: flex; gap: 8px; align-items: center; }
  .main-body { flex: 1; overflow-y: auto; padding: 24px 32px; }

  .placeholder { color: var(--text-dim); text-align: center; padding: 64px 16px; font-size: 14px; }
  .empty-state { color: var(--text-dim); text-align: center; padding: 32px 16px; font-size: 14px; }

  /* Collapsible overview / quick add */
  details.collapsible {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-soft);
    margin-bottom: 24px;
    overflow: hidden;
  }
  details.collapsible[open] { background: var(--bg); }
  details.collapsible > summary {
    list-style: none;
    cursor: pointer;
    padding: 12px 16px;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  details.collapsible > summary::-webkit-details-marker { display: none; }
  details.collapsible > summary::before {
    content: "›";
    display: inline-block;
    transition: transform 0.15s;
    color: var(--text-dim);
    font-size: 16px;
  }
  details.collapsible[open] > summary::before { transform: rotate(90deg); }
  details.collapsible > .collapsible-content { padding: 0 16px 16px; }
  .quick-add-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .quick-add-row:last-child { margin-bottom: 0; }
  .quick-add-row label { margin: 0; flex-shrink: 0; min-width: 80px; }

  /* Flashcards */
  .flashcards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 16px;
  }
  .flashcards-single {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 16px 0;
  }
  .flashcards-single .flashcard-wrap { max-width: 960px; width: 100%; }
  .single-nav {
    display: flex;
    gap: 16px;
    align-items: center;
    color: var(--text-muted);
    font-size: 14px;
  }
  .single-nav .index-label { min-width: 80px; text-align: center; }

  .flashcard-wrap { position: relative; }
  .flashcard {
    perspective: 1400px;
    width: 100%;
    aspect-ratio: 3 / 2;
    cursor: pointer;
    user-select: none;
  }
  .flashcard.editing { cursor: default; }
  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flashcard-face {
    position: absolute;
    inset: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg);
    box-shadow: var(--shadow-card);
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    white-space: pre-wrap;
    overflow: hidden;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .flashcard-front .face-content { font-weight: 500; font-size: 16px; }
  .flashcard-back .face-content { font-size: 14px; color: var(--text-muted); }
  .face-content { width: 100%; word-break: break-word; }
  .face-content code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg-soft);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 0.9em;
  }
  /* Multi-line code / diagram box: left-aligned, real indentation, scrolls instead of jumbling */
  .flashcard-face:has(.card-code) { align-items: stretch; justify-content: flex-start; text-align: left; }
  .face-content.has-code { width: 100%; display: flex; flex-direction: column; gap: 8px; align-items: stretch; text-align: left; }
  .face-content .face-text { text-align: left; white-space: pre-wrap; line-height: 1.4; }
  .face-content .card-code {
    margin: 0;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
    white-space: pre;
    overflow-x: auto;
    overflow-y: hidden;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px;
    line-height: 1.45;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text);
    -webkit-overflow-scrolling: touch;
  }
  .flashcard-back { transform: rotateY(180deg); background: var(--bg-softer); }
  .flashcard:not(.editing):hover .flashcard-face { box-shadow: var(--shadow-card-hover); border-color: var(--border-strong); }

  /* tiny corner label */
  .face-corner {
    position: absolute;
    top: 10px;
    left: 14px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .queue-indicator {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 14px;
    color: var(--text);
    pointer-events: none;
    line-height: 1;
  }

  /* Edit mode */
  .flashcard.editing .flashcard-face { background: var(--bg); }
  .flashcard.editing .flashcard-back { background: var(--bg-softer); }
  .flashcard.editing .face-edit {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    resize: none;
    text-align: center;
    font: inherit;
    color: inherit;
    padding: 8px;
    outline: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .flashcard.editing .flashcard-front .face-edit { font-weight: 500; font-size: 16px; }
  .flashcard.editing .flashcard-back .face-edit { font-size: 14px; color: var(--text-muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .flashcard-controls {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
  }
  .flashcard-controls button { font-size: 12px; padding: 4px 10px; }

  /* Ask Claude integration */
  .card-foot {
    display: flex;
    justify-content: center;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .flashcard-wrap:hover .card-foot,
  .flashcards-single .card-foot,
  .card-foot.always-show { opacity: 1; pointer-events: auto; }
  .ask-claude-btn {
    font-size: 12px;
    padding: 4px 10px;
    color: var(--text-dim);
    border-color: transparent;
  }
  .ask-claude-btn:hover {
    color: var(--text);
    background: var(--bg-soft);
    border-color: var(--border);
  }
  .context-preview {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    max-height: 220px;
    overflow-y: auto;
    margin-bottom: 12px;
  }

  /* Quizzes (unchanged) */
  .quiz-question {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .q-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .q-prompt { font-size: 16px; margin-bottom: 16px; white-space: pre-wrap; }
  .q-options { display: flex; flex-direction: column; gap: 8px; }
  .q-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .q-option:hover { border-color: var(--border-strong); }
  .q-option.selected { border-color: var(--text); background: var(--accent-soft); }
  .q-option input { width: auto; }
  .q-result { margin-top: 12px; padding: 12px 14px; border-radius: var(--radius-sm); font-size: 14px; }
  .q-result.correct { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--good); }
  .q-result.incorrect { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); }
  .q-result.recorded { background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-muted); }
  .q-override { margin-top: 8px; }
  .q-override-btn { font-size: 12px; padding: 4px 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); border-radius: var(--radius-sm); cursor: pointer; }
  .q-override-btn:hover { border-color: var(--border-strong); }
  .q-override-btn.active { background: #f0fdf4; border-color: #bbf7d0; color: var(--good); }
  .q-actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .q-answer {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--bg-soft);
    border: 1px solid var(--border);
    font-size: 14px;
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .q-answer-label {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .q-answer-label.spaced { margin-top: 14px; }
  .q-why {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    white-space: pre-wrap;
    color: var(--text);
  }
  .q-visual {
    margin: 12px 0 0;
    padding: 0;
    background: none;
    border: 0;
    white-space: pre;
    overflow-x: auto;
    line-height: 1.4;
  }
  .q-rate {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .q-rate-buttons { display: flex; gap: 4px; }
  .q-rate button {
    min-width: 36px;
    padding: 4px 8px;
    font-size: 13px;
  }
  .q-rate button.selected {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .q-rate-scale {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
  }
  .q-note { margin-top: 10px; }
  .q-note label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .q-note textarea {
    min-height: 60px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
  }

  /* Lessons */
  .lesson-meta-inline {
    font-size: 13px;
    color: var(--text-muted);
  }
  .lesson-section { margin-bottom: 28px; }
  .lesson-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .section-header .lesson-section-label { margin-bottom: 0; }
  .flashcard-from-btn {
    font-size: 11px;
    padding: 3px 8px;
    color: var(--text-dim);
    border-color: transparent;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
  }
  .lesson-section:hover .flashcard-from-btn,
  .exercise:hover .flashcard-from-btn,
  .flashcard-from-btn:focus {
    opacity: 1;
  }
  .flashcard-from-btn:hover {
    color: var(--text);

<script>
"use strict";

/* ===== state + persistence ===== */
const STORAGE_KEY = "study-tool-state-v1";
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.warn("Failed to load state", e); }
  return { version: 1, categories: [], cards: [], reviewQueue: [], quizzes: [], sessions: [], lessons: [] };
}
let cloud = null;   // cloud-sync module, assigned near bootstrap (declared early so saveState can reference it)
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn("Failed to save state", e); }
  if (cloud && cloud.enabled && !cloud._applying) cloud.scheduleSync();
}
// Persist the active quiz attempt to the cloud (per-user). Disk save stays manual (author mode).
function persistAttempt() {
  if (cloud && cloud.enabled && activeQuizId && activeSession) {
    cloud.scheduleAttemptSave(activeQuizId, activeSession);
  }
}
const state = loadState();

/* ===== per-user PROFILE (Phase 3) =====
   Everything that is per-USER learning data rather than flashcard-deck content:
   lesson answers now, progress / known-unknown / session log later (Stage 3b).
   Persisted locally (offline-first, like state) AND synced to the cloud at
   /users/$uid/profile. Kept separate from `state` so the flashcard sync path is
   untouched. `lessonAnswers[lessonId][exerciseId] = code`. */
const PROFILE_KEY = "study-tool-profile-v1";
function loadProfile() {
  try {
    const raw = localStorage.getItem(PROFILE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (p && typeof p === "object") {
        p.lessonAnswers = p.lessonAnswers || {};
        p.progress = p.progress || {};   // { chapterId: { status } } — curriculum overlay
        p.sessionLog = Array.isArray(p.sessionLog) ? p.sessionLog : [];
        p.notes = (p.notes && typeof p.notes === "object") ? p.notes : {};  // {goal,currentStatus,troubleAreas,strengths}
        p.reviewQueue = Array.isArray(p.reviewQueue) ? p.reviewQueue : [];  // SRS concept queue
        p.currentSession = Number.isFinite(p.currentSession) ? p.currentSession : 1;
        p.treeOverlay = (p.treeOverlay && typeof p.treeOverlay === "object") ? p.treeOverlay : {};  // {added,hidden,renamed,order}
        p.treeMode = p.treeMode === "custom" ? "custom" : "overlay";
        p.customTree = (p.customTree && typeof p.customTree === "object") ? p.customTree : null;
        p.seenCurriculumVersion = Number.isFinite(p.seenCurriculumVersion) ? p.seenCurriculumVersion : 0;
        p.curriculumSnapshot = (p.curriculumSnapshot && typeof p.curriculumSnapshot === "object") ? p.curriculumSnapshot : null;
        p.curriculumUpdatePolicy = ["keep-mine", "take-new", "merge"].includes(p.curriculumUpdatePolicy) ? p.curriculumUpdatePolicy : "ask";
        return p;
      }
    }
  } catch (e) { console.warn("Failed to load profile", e); }
  return { schemaVersion: 1, lessonAnswers: {}, progress: {}, sessionLog: [], notes: {}, reviewQueue: [], currentSession: 1, treeOverlay: {}, treeMode: "overlay", customTree: null, seenCurriculumVersion: 0, curriculumSnapshot: null, curriculumUpdatePolicy: "ask" };
}
const profile = loadProfile();
normalizeProgress();   // migrate legacy {done} overlay entries to {status}
function saveProfile() {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); }
  catch (e) { console.warn("Failed to save profile", e); }
  if (cloud && cloud.enabled && !cloud._applying) cloud.scheduleProfileSync();
}
// Record a lesson-exercise answer and schedule persistence. Called on textarea edit.
function setLessonAnswer(lessonId, exerciseId, code) {
  if (!lessonId || !exerciseId) return;
  (profile.lessonAnswers[lessonId] = profile.lessonAnswers[lessonId] || {})[exerciseId] = code;
  saveProfile();
}
// Fold another device's remote profile into the local one before we overwrite the node,
// preserving remote-only ADDITIONS (new answer keys, chapters, notes fields, session/queue
// entries) so a whole-profile .set() doesn't drop them. LOCAL wins on true key conflicts
// (this device is asserting its just-made change); monotonic counters take the max.
function unionRemoteIntoLocal(remote) {
  if (!remote || typeof remote !== "object") return;
  const parse = (v, d) => { try { return typeof v === "string" ? JSON.parse(v) : (v == null ? d : v); } catch (e) { return d; } };
  const addMissing = (localObj, remoteObj) => {
    Object.keys(remoteObj || {}).forEach((k) => { if (!(k in localObj)) localObj[k] = remoteObj[k]; });
  };
  const unionById = (localArr, remoteArr) => {
    const byId = {};
    (remoteArr || []).forEach((e) => { if (e && e.id) byId[e.id] = e; });
    (localArr || []).forEach((e) => { if (e && e.id) byId[e.id] = e; });   // local wins on id conflict
    return Object.values(byId);
  };
  const ra = parse(remote.lessonAnswers, {});
  Object.keys(ra || {}).forEach((lid) => { addMissing(profile.lessonAnswers[lid] = profile.lessonAnswers[lid] || {}, ra[lid]); });
  addMissing(profile.progress = profile.progress || {}, parse(remote.progress, {}));
  addMissing(profile.notes = profile.notes || {}, parse(remote.notes, {}));
  profile.sessionLog = unionById(profile.sessionLog, parse(remote.sessionLog, []));
  profile.reviewQueue = unionById(profile.reviewQueue, parse(remote.reviewQueue, []));
  if (Number.isFinite(remote.currentSession)) profile.currentSession = Math.max(profile.currentSession || 1, remote.currentSession);
  if (Number.isFinite(remote.seenCurriculumVersion)) profile.seenCurriculumVersion = Math.max(profile.seenCurriculumVersion || 0, remote.seenCurriculumVersion);
  const ro = parse(remote.treeOverlay, {});
  if (ro && typeof ro === "object") {
    const ov = ensureOverlay();
    ov.added = unionById(ov.added, ro.added);
    addMissing(ov.hidden, ro.hidden || {});
    addMissing(ov.renamed, ro.renamed || {});
    addMissing(ov.order, ro.order || {});
  }
  // treeMode/customTree/policy/snapshot: keep local — this device is writing its own intent.
}

// Copy any stored answers onto the in-memory lesson objects so they render.
// Only overwrites when the profile actually has an entry (won't wipe seed answers).
function hydrateLessonAnswers() {
  fs.lessons.forEach((lesson) => {
    const byEx = profile.lessonAnswers[lesson.id];
    if (!byEx || !Array.isArray(lesson.exercises)) return;
    lesson.exercises.forEach((ex) => {
      if (ex && Object.prototype.hasOwnProperty.call(byEx, ex.id)) ex.userAnswer = byEx[ex.id];
    });
  });
}

/* ===== curriculum (Phase 3b/3c) =====
   Global tree skeleton (structure only) fetched from repo-committed curriculum.json.
   Per-user mastery is the overlay profile.progress[chapterId] = { status }, where
   status ∈ "known" | "learning" | "none". The progress bar renders from tree + overlay
   merged, so it works on every device (the old bar read SYLLABUS.md, which is gitignored
   and never deployed). Legacy entries used { done: bool } — normalizeProgress() migrates
   them ({done:true}→known, {done:false}→none). */
const CHAPTER_STATUSES = ["none", "learning", "known"];
let curriculum = null;
async function loadCurriculum() {
  try {
    const res = await fetch("curriculum.json", { cache: "no-cache" });
    if (res.ok) curriculum = await res.json();
  } catch (e) { console.warn("No curriculum.json — progress bar falls back to SYLLABUS.md if present:", e); }
}

// Migrate legacy { done: bool } overlay entries to { status }. Idempotent.
function normalizeProgress() {
  const prog = profile.progress;
  if (!prog || typeof prog !== "object") return;
  Object.keys(prog).forEach((id) => {
    const e = prog[id];
    if (e && typeof e === "object" && !e.status && Object.prototype.hasOwnProperty.call(e, "done")) {
      prog[id] = { status: e.done ? "known" : "none" };
    }
  });
}

function chapterStatus(id) {
  const e = profile.progress && profile.progress[id];
  return (e && e.status) || "none";
}

/* ===== overlay+patch tree (Phase 3c) =====
   The effective curriculum = global curriculum.json + the per-user STRUCTURAL overlay
   profile.treeOverlay = { added:[{id,title,phaseId,afterId}], hidden:{id:true},
   renamed:{id:title}, order:{phaseId:[ids]} }. If the user forks (treeMode==="custom"),
   profile.customTree holds a standalone copy and the global tree is no longer merged. */
// Base tree = custom snapshot (if forked) else global; the overlay applies on top in
// BOTH modes. includeHidden keeps skipped chapters in the list (marked) for the editor.
function resolveCurriculumPhases(includeHidden) {
  const base = (profile.treeMode === "custom" && profile.customTree && Array.isArray(profile.customTree.phases))
    ? profile.customTree.phases
    : (curriculum && Array.isArray(curriculum.phases) ? curriculum.phases : null);
  if (!base) return null;
  const ov = profile.treeOverlay || {};
  const hidden = ov.hidden || {}, renamed = ov.renamed || {}, added = ov.added || [], order = ov.order || {};
  return base.map((ph) => {
    let chapters = (ph.chapters || [])
      .map((ch) => ({ id: ch.id, title: renamed[ch.id] || ch.title || ch.id, custom: false, hidden: !!hidden[ch.id] }));
    (added || []).filter((a) => a.phaseId === ph.id).forEach((a) => {
      const node = { id: a.id, title: renamed[a.id] || a.title || a.id, custom: true, hidden: !!hidden[a.id] };
      const idx = a.afterId ? chapters.findIndex((c) => c.id === a.afterId) : -1;
      if (idx >= 0) chapters.splice(idx + 1, 0, node); else chapters.push(node);
    });
    if (Array.isArray(order[ph.id]) && order[ph.id].length) {
      const pos = {}; order[ph.id].forEach((id, i) => { pos[id] = i; });
      chapters.sort((a, b) => (pos[a.id] ?? 999) - (pos[b.id] ?? 999));
    }
    if (!includeHidden) chapters = chapters.filter((c) => !c.hidden);
    return { id: ph.id, phase: ph.phase, title: ph.title, chapters };
  });
}

// Merge the effective tree with the per-user MASTERY overlay into the flat item list the
// progress bar renders. Returns null if no curriculum is loaded (bar then falls back to
// the SYLLABUS.md-derived list, for local author mode offline).
function buildCurriculumItems() {
  const phases = resolveCurriculumPhases();
  if (!phases) return null;
  const items = [];
  phases.forEach((ph) => {
    (ph.chapters || []).forEach((ch, i) => {
      const status = chapterStatus(ch.id);
      items.push({
        id: ch.id,
        status,
        done: status === "known",   // "done" = mastered; kept for the fill/count logic
        phase: ph.phase || ph.title || "",
        title: ch.title || ch.id,
        phaseStart: i === 0,
      });
    });
  });
  return items;
}

/* ----- structural overlay mutators (all sync via saveProfile) ----- */
function ensureOverlay() {
  const ov = profile.treeOverlay = profile.treeOverlay || {};
  ov.added = ov.added || []; ov.hidden = ov.hidden || {}; ov.renamed = ov.renamed || {}; ov.order = ov.order || {};
  return ov;
}
function addCustomChapter(phaseId, afterId, title) {
  if (!phaseId || !title) return;
  const ov = ensureOverlay();
  ov.added.push({ id: "cust-" + uid(), title: title, phaseId, afterId: afterId || null });
  saveProfile(); renderSyllabusProgress();
}
function deleteCustomChapter(id) {
  const ov = ensureOverlay();
  ov.added = ov.added.filter((a) => a.id !== id);
  delete ov.renamed[id];
  Object.keys(ov.order).forEach((p) => { ov.order[p] = (ov.order[p] || []).filter((x) => x !== id); });
  saveProfile(); renderSyllabusProgress();
}
function setChapterHidden(id, hidden) {
  const ov = ensureOverlay();
  if (hidden) ov.hidden[id] = true; else delete ov.hidden[id];
  saveProfile(); renderSyllabusProgress();
}
function renameChapter(id, title) {
  const ov = ensureOverlay();
  if (title && title.trim()) ov.renamed[id] = title.trim(); else delete ov.renamed[id];
  saveProfile(); renderSyllabusProgress();
}
// Move a chapter up/down within its phase by writing an explicit order for that phase.
function moveChapter(phaseId, id, dir) {
  const phases = resolveCurriculumPhases(true);
  const ph = (phases || []).find((p) => p.id === phaseId);
  if (!ph) return;
  const ids = ph.chapters.map((c) => c.id);
  const i = ids.indexOf(id), j = i + dir;
  if (i < 0 || j < 0 || j >= ids.length) return;
  ids.splice(i, 1); ids.splice(j, 0, id);
  const ov = ensureOverlay();
  ov.order[phaseId] = ids;
  saveProfile(); renderSyllabusProgress();
}
// Fork to a standalone custom tree: snapshot the current resolved tree, then clear the
// overlay (its effect is now baked into customTree). Stops merging global for structure.
function forkCurriculumToCustom() {
  const phases = resolveCurriculumPhases();   // hidden already dropped → baked out
  if (!phases) return;
  profile.customTree = { phases: phases.map((ph) => ({
    id: ph.id, phase: ph.phase, title: ph.title,
    chapters: (ph.chapters || []).map((c) => ({ id: c.id, title: c.title })),
  })) };
  profile.treeOverlay = {};   // baked into the snapshot; start fresh on top of it
  profile.treeMode = "custom";
  saveProfile(); renderSyllabusProgress();
}
// Discard customizations and return to the standard global curriculum.
function revertCurriculumToStandard() {
  profile.treeMode = "overlay";
  profile.customTree = null;
  profile.treeOverlay = {};
  saveProfile(); renderSyllabusProgress();
}

/* ===== versioned global-update review (Phase 3c) =====
   curriculum.json carries a `version`. When it increases, users with NO structural
   customization auto-inherit silently. Users who customized the tree (or forked) get a
   scoped review of only the changes that touch their customizations, with take-new /
   keep-mine / merge and an "always do this" standing policy (profile.curriculumUpdatePolicy). */
let curriculumUpdateHandled = false;

function curriculumChapterMap() {
  const map = {};
  ((curriculum && curriculum.phases) || []).forEach((ph) => (ph.chapters || []).forEach((ch) => { map[ch.id] = ch.title || ch.id; }));
  return map;
}
function snapshotCurriculum() {
  return { version: (curriculum && curriculum.version) || 0, chapters: curriculumChapterMap() };
}
function userHasTreeCustomizations() {
  if (profile.treeMode === "custom") return true;
  const ov = profile.treeOverlay || {};
  return (ov.added && ov.added.length) || Object.keys(ov.hidden || {}).length ||
    Object.keys(ov.renamed || {}).length || Object.keys(ov.order || {}).length;
}
function diffCurriculum(oldMap, newMap) {
  oldMap = oldMap || {}; newMap = newMap || {};
  const added = Object.keys(newMap).filter((id) => !(id in oldMap));
  const removed = Object.keys(oldMap).filter((id) => !(id in newMap));
  const renamed = Object.keys(newMap).filter((id) => id in oldMap && oldMap[id] !== newMap[id])
    .map((id) => ({ id, from: oldMap[id], to: newMap[id] }));
  return { added, removed, renamed };
}
// Which of the user's customizations does this diff actually touch?
function affectedCustomizations(diff) {
  const out = [];
  if (profile.treeMode === "custom") {
    if (diff.added.length || diff.removed.length || diff.renamed.length) out.push({ type: "custom-fork" });
    return out;
  }
  const ov = profile.treeOverlay || {};
  const removedSet = new Set(diff.removed);
  diff.renamed.forEach((r) => {
    if (ov.renamed && Object.prototype.hasOwnProperty.call(ov.renamed, r.id)) {
      out.push({ type: "rename-conflict", id: r.id, from: r.from, to: r.to, yours: ov.renamed[r.id] });
    }
  });
  const touchesRemoved = (id) => removedSet.has(id);
  Object.keys(ov.hidden || {}).forEach((id) => { if (touchesRemoved(id)) out.push({ type: "orphan-hidden", id }); });
  (ov.added || []).forEach((a) => { if (a.afterId && touchesRemoved(a.afterId)) out.push({ type: "orphan-anchor", id: a.id, afterId: a.afterId }); });
  return out;
}
function acceptCurriculumVersion() {
  profile.seenCurriculumVersion = (curriculum && curriculum.version) || 0;
  profile.curriculumSnapshot = snapshotCurriculum();
  saveProfile();
}
function applyCurriculumUpdate(choice, always) {
  if (choice === "take-new") {
    profile.treeOverlay = {}; profile.treeMode = "overlay"; profile.customTree = null;
  } else if (choice === "merge" && profile.treeMode !== "custom") {
    // Keep the user's overlay but let global win where it changed the same thing, and
    // drop entries pointing at chapters the global removed.
    const ov = profile.treeOverlay || {};
    const newMap = curriculumChapterMap();
    const oldMap = (profile.curriculumSnapshot && profile.curriculumSnapshot.chapters) || {};
    diffCurriculum(oldMap, newMap).renamed.forEach((r) => { if (ov.renamed) delete ov.renamed[r.id]; });
    const removed = new Set(diffCurriculum(oldMap, newMap).removed);
    Object.keys(ov.hidden || {}).forEach((id) => { if (removed.has(id)) delete ov.hidden[id]; });
    Object.keys(ov.order || {}).forEach((p) => { ov.order[p] = (ov.order[p] || []).filter((id) => !removed.has(id)); });
  }
  // 'keep-mine' (and 'merge' in custom mode) leave the customizations untouched.
  if (always) profile.curriculumUpdatePolicy = choice;
  acceptCurriculumVersion();
  renderSyllabusProgress();
}
function checkCurriculumUpdate() {
  if (curriculumUpdateHandled) return;
  if (!curriculum || !curriculum.version) return;
  const v = curriculum.version, seen = profile.seenCurriculumVersion || 0;
  if (v <= seen) { if (!profile.curriculumSnapshot) { profile.curriculumSnapshot = snapshotCurriculum(); saveProfile(); } return; }
  const hasSnap = profile.curriculumSnapshot && profile.curriculumSnapshot.chapters;
  // First-ever baseline, or no customizations → auto-inherit silently.
  if (!hasSnap || !userHasTreeCustomizations()) { curriculumUpdateHandled = true; acceptCurriculumVersion(); return; }
  const diff = diffCurriculum(profile.curriculumSnapshot.chapters, curriculumChapterMap());
  const affected = affectedCustomizations(diff);
  if (!affected.length) { curriculumUpdateHandled = true; acceptCurriculumVersion(); return; }   // change didn't touch their customizations
  if (profile.curriculumUpdatePolicy !== "ask") { curriculumUpdateHandled = true; applyCurriculumUpdate(profile.curriculumUpdatePolicy, false); return; }
  curriculumUpdateHandled = true;
  openCurriculumUpdateReview(diff, affected);
}

function openCurriculumUpdateReview(diff, affected) {
  const backdrop = modal(`
    <h2>Curriculum updated</h2>
    <p class="cp-sub">The standard curriculum changed, and some of your customizations are affected. Choose how to reconcile them.</p>
    <div id="cuChanges"></div>
    <div id="cuAffected"></div>
    <label class="cu-always"><input type="checkbox" id="cuAlways"> Always do this without asking</label>
    <div class="modal-actions">
      <button class="ghost" id="cuKeep">Keep mine</button>
      <button class="ghost" id="cuMerge">Merge</button>
      <button class="primary" id="cuTake">Take new</button>
    </div>
  `, (bd) => {
    const changes = bd.querySelector("#cuChanges");
    const addLine = (parent, cls, text) => { const d = document.createElement("div"); d.className = cls; d.textContent = text; parent.appendChild(d); };
    if (diff.added.length) addLine(changes, "cu-change add", `Added: ${diff.added.join(", ")}`);
    if (diff.removed.length) addLine(changes, "cu-change remove", `Removed: ${diff.removed.join(", ")}`);
    diff.renamed.forEach((r) => addLine(changes, "cu-change rename", `Renamed ${r.id}: “${r.from}” → “${r.to}”`));

    const aff = bd.querySelector("#cuAffected");
    const h = document.createElement("div"); h.className = "cp-phase-head"; h.textContent = "Your affected customizations"; aff.appendChild(h);
    affected.forEach((a) => {
      let msg = "";
      if (a.type === "rename-conflict") msg = `You renamed ${a.id} to “${a.yours}”; the standard is now “${a.to}”.`;
      else if (a.type === "orphan-hidden") msg = `You hid ${a.id}, which no longer exists in the standard curriculum.`;
      else if (a.type === "orphan-anchor") msg = `Your added chapter sits after ${a.afterId}, which was removed.`;
      else if (a.type === "custom-fork") msg = `You're on a fully custom curriculum, so it won't receive these changes automatically.`;
      addLine(aff, "cu-affected-item", msg);
    });

    const always = bd.querySelector("#cuAlways");
    const finish = (choice) => { applyCurriculumUpdate(choice, always.checked); backdrop.remove(); toast("Curriculum updated"); };
    bd.querySelector("#cuKeep").addEventListener("click", () => finish("keep-mine"));
    bd.querySelector("#cuMerge").addEventListener("click", () => finish("merge"));
    bd.querySelector("#cuTake").addEventListener("click", () => finish("take-new"));
  });
}

// Set a chapter's mastery status in the per-user overlay (syncs via saveProfile).
// Always stores an explicit entry (even "none") so the author-mode seed won't
// re-add a status the user deliberately cleared.
function setChapterStatus(id, status) {
  if (!id) return;
  if (!CHAPTER_STATUSES.includes(status)) status = "none";
  profile.progress = profile.progress || {};
  profile.progress[id] = { status };
  saveProfile();
  renderSyllabusProgress();
}

// Author-mode bridge: fold SYLLABUS.md checkbox state (creator's editing surface,
// local folder only) into the synced per-user overlay so it reaches all devices.
// A checked box seeds "known". Non-destructive: seeds ONLY chapters not already in
// the overlay, so it migrates initial state once but never clobbers an in-app change.
function seedProgressFromSyllabus(items) {
  if (!Array.isArray(items)) return;
  profile.progress = profile.progress || {};
  let changed = false;
  items.forEach((it) => {
    if (!it.id || !it.done) return;   // only seed completed chapters as "known"
    if (!Object.prototype.hasOwnProperty.call(profile.progress, it.id)) {
      profile.progress[it.id] = { status: "known" };
      changed = true;
    }
  });
  if (changed) saveProfile();
}

/* ===== study log & notes (Phase 3c) =====
   profile.sessionLog: [{ id, date, lesson, topics, notes }] — a synced study history.
   profile.notes: { goal, currentStatus, troubleAreas, strengths } — free-text markdown.
   Both are authored either in-app or seeded (non-destructively) from private/SYLLABUS.md
   in author mode. Surfaced via the "Log" header button on every device. */
const NOTE_FIELDS = [
  { key: "currentStatus", label: "Current status" },
  { key: "goal",          label: "Goal" },
  { key: "troubleAreas",  label: "Trouble areas" },
  { key: "strengths",     label: "Strengths" },
];

function setNote(key, value) {
  profile.notes = profile.notes || {};
  profile.notes[key] = value;
  saveProfile();
}
function addSessionEntry(entry) {
  profile.sessionLog = profile.sessionLog || [];
  profile.sessionLog.push({ id: uid(), ...entry });
  saveProfile();
}
function deleteSessionEntry(id) {
  profile.sessionLog = (profile.sessionLog || []).filter((e) => e.id !== id);
  saveProfile();
}

// Parse the Session Log table + prose sections (Goal / Current Status / Trouble Areas /
// Strengths) from SYLLABUS.md. Returns { sessionLog, notes } for author-mode seeding.
function parseSyllabusNotesAndLog(md) {
  const lines = md.split("\n");
  const notes = {};
  const sectionMap = {
    "Goal": "goal", "Current Status": "currentStatus",
    "Trouble Areas": "troubleAreas", "Strengths": "strengths",
  };
  let curKey = null, buf = [];
  const flush = () => { if (curKey) notes[curKey] = buf.join("\n").trim(); curKey = null; buf = []; };
  for (const line of lines) {
    const h2 = line.match(/^##\s+(.*?)\s*$/);
    if (h2) {
      flush();
      const name = h2[1].replace(/[:*]/g, "").trim();
      if (sectionMap[name]) curKey = sectionMap[name];
      continue;
    }
    if (curKey) { if (line.trim() !== "---") buf.push(line); }
  }
  flush();

  // Session Log table: rows "| Date | Lesson | Topics | Problems | Notes |".
  // Seeded ids are STABLE ("syl-N" by row order) so re-seeding on another author-mode
  // device produces the same ids and the cloud merge dedupes instead of duplicating.
  const sessionLog = [];
  let inLog = false;
  for (const line of lines) {
    const h2 = line.match(/^##\s+(.*)$/);
    if (h2) { inLog = /Session Log/i.test(h2[1]); continue; }
    if (!inLog) continue;
    const t = line.trim();
    if (!t.startsWith("|")) continue;
    const cells = t.split("|").slice(1, -1).map((c) => c.trim());
    if (cells.length < 5) continue;
    if (/^-+$/.test(cells[0].replace(/\s/g, "")) || /^date$/i.test(cells[0])) continue;  // separator/header
    sessionLog.push({ id: "syl-" + sessionLog.length, date: cells[0], lesson: cells[1], topics: cells[2], problems: cells[3], notes: cells[4] });
  }
  return { sessionLog, notes };
}

// Non-destructive seed: fill a notes field only if empty; seed the session log only if
// it's currently empty (so in-app entries are never duplicated or clobbered).
function seedNotesFromSyllabus(parsed) {
  if (!parsed) return;
  let changed = false;
  profile.notes = profile.notes || {};
  Object.keys(parsed.notes || {}).forEach((k) => {
    if (!profile.notes[k] && parsed.notes[k]) { profile.notes[k] = parsed.notes[k]; changed = true; }
  });
  if ((!profile.sessionLog || !profile.sessionLog.length) && (parsed.sessionLog || []).length) {
    profile.sessionLog = parsed.sessionLog;
    changed = true;
  }
  if (changed) saveProfile();
}

/* ===== spaced-repetition concept queue (Phase 3c) =====
   profile.reviewQueue: [{ id, concept, added, lastReviewed, interval, nextReview, status }]
   where interval/lastReviewed/nextReview are SESSION numbers. SRS: nail → interval doubles
   (cap 16 = "locked in"), struggle → reset to 1; nextReview = currentSession + interval.
   profile.currentSession tracks which session you're on (drives what's "due"). */
const SRS_INTERVALS = [1, 2, 4, 8, 16];
function srsNextInterval(interval, outcome) {
  const cur = Number(interval) || 1;
  if (outcome === "struggled") return 1;
  const doubled = cur * 2;
  return doubled > 16 ? 16 : doubled;   // cap at 16 (locked in)
}
function reviewItem(id, outcome) {
  const item = (profile.reviewQueue || []).find((r) => r.id === id);
  if (!item) return;
  const s = profile.currentSession || 1;
  item.interval = srsNextInterval(item.interval, outcome);
  item.lastReviewed = s;
  item.nextReview = s + item.interval;
  item.status = (outcome === "nailed" ? "Nailed" : "Reset") + " at session " + s + " → interval " + item.interval;
  saveProfile();
}
function setCurrentSession(n) {
  profile.currentSession = Math.max(1, Math.round(Number(n) || 1));
  saveProfile();
}
function addReviewConcept(concept) {
  if (!concept) return;
  const s = profile.currentSession || 1;
  profile.reviewQueue = profile.reviewQueue || [];
  profile.reviewQueue.push({ id: uid(), concept, added: s, lastReviewed: null, interval: 1, nextReview: s + 1, status: "new" });
  saveProfile();
}
function deleteReviewConcept(id) {
  profile.reviewQueue = (profile.reviewQueue || []).filter((r) => r.id !== id);
  saveProfile();
}

// Parse the "Spaced Repetition Review Queue" table from SYLLABUS.md. Columns:
// Concept | Added | Last Reviewed | Interval | Next Review (Session #) | Status.
// Session cells look like "Session 8" / "—"; stable ids ("rq-N") for dedupe on re-seed.
function parseSyllabusReviewQueue(md) {
  const sessNum = (c) => { const m = (c || "").match(/(\d+)/); return m ? Number(m[1]) : null; };
  const out = [];
  let inQ = false;
  for (const line of md.split("\n")) {
    const h2 = line.match(/^##\s+(.*)$/);
    if (h2) { inQ = /Review Queue/i.test(h2[1]); continue; }
    if (!inQ) continue;
    const t = line.trim();
    if (!t.startsWith("|")) continue;
    const cells = t.split("|").slice(1, -1).map((c) => c.trim());
    if (cells.length < 6) continue;
    if (/^concept$/i.test(cells[0]) || /^-+$/.test(cells[0].replace(/\s/g, ""))) continue;  // header/sep
    out.push({
      id: "rq-" + out.length,
      concept: cells[0].replace(/`/g, ""),   // drop markdown code ticks for plain display
      added: sessNum(cells[1]),
      lastReviewed: sessNum(cells[2]),
      interval: Number(cells[3]) || 1,
      nextReview: sessNum(cells[4]),
      status: cells[5],
    });
  }
  return out;
}

// Non-destructive: seed the review queue only if it's currently empty. Also seed
// currentSession to (max lastReviewed) + 1 if we still have the default.
function seedReviewQueueFromSyllabus(items) {
  if (!Array.isArray(items) || !items.length) return;
  let changed = false;
  if (!profile.reviewQueue || !profile.reviewQueue.length) {
    profile.reviewQueue = items;
    changed = true;
    if (!profile.currentSession || profile.currentSession <= 1) {
      const maxSeen = items.reduce((m, r) => Math.max(m, r.lastReviewed || 0, r.added || 0), 0);
      if (maxSeen > 0) { profile.currentSession = maxSeen + 1; }
    }
  }
  if (changed) saveProfile();
}

/* =====================================================================
   File System Access API — sync lessons + quizzes to JSON files on disk
   ===================================================================== */

const fs = {
  dirHandle: null,
  connected: false,
  readonly: false,          // true when content came from fetch() (deployed/any device)
  manifestLoaded: false,
  lessons: new Map(),       // id -> lesson data
  quizzes: new Map(),       // id -> quiz definition
  quizDirs: new Map(),      // quizId -> directory handle
  attempts: new Map(),      // quizId -> [attempt, ...]
};

const fsm = {
  IDB_NAME: "study-tool-fs",
  IDB_STORE: "handles",
  IDB_KEY: "rootDir",

  openIDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.IDB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(this.IDB_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },

  async saveHandle(handle) {
    const db = await this.openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.IDB_STORE, "readwrite");
      tx.objectStore(this.IDB_STORE).put(handle, this.IDB_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },

  async loadHandle() {
    const db = await this.openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.IDB_STORE, "readonly");
      const req = tx.objectStore(this.IDB_STORE).get(this.IDB_KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },

  async clearHandle() {
    const db = await this.openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.IDB_STORE, "readwrite");
      tx.objectStore(this.IDB_STORE).delete(this.IDB_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },

  async verifyPermission(handle, requestIfNeeded = true) {
    const opts = { mode: "readwrite" };
    if ((await handle.queryPermission(opts)) === "granted") return true;
    if (requestIfNeeded && (await handle.requestPermission(opts)) === "granted") return true;
    return false;
  },

  async connect() {
    if (!window.showDirectoryPicker) {
      alert("Your browser doesn't support the File System Access API. Use Chrome, Edge, or another Chromium-based browser.");
      return false;
    }
    try {
      const handle = await window.showDirectoryPicker({ mode: "readwrite", startIn: "documents" });
      const ok = await this.verifyPermission(handle, true);
      if (!ok) { toast("Permission denied"); return false; }
      await this.saveHandle(handle);
      fs.dirHandle = handle;
      fs.connected = true;
      await this.loadAll();
      updateConnectionUI();
      toast(`Connected to "${handle.name}"`);
      return true;
    } catch (e) {
      if (e.name !== "AbortError") console.error(e);
      return false;
    }
  },

  async tryReconnect() {
    try {
      const handle = await this.loadHandle();
      if (!handle) return false;
      // Without requesting, just check — silent reconnect is best-effort.
      const granted = await this.verifyPermission(handle, false);
      if (!granted) {
        // We have a remembered handle but need user gesture for permission.
        // Mark as "remembered but locked" — user must click Connect.
        fs.dirHandle = handle;
        fs.connected = false;
        return false;
      }
      fs.dirHandle = handle;
      fs.connected = true;
      await this.loadAll();
      return true;
    } catch (e) {
      console.warn("Reconnect failed:", e);
      return false;
    }
  },

  async loadAll() {
    fs.readonly = false;   // connected to a real folder → author mode (read + write)
    fs.lessons.clear();
    fs.quizzes.clear();
    fs.quizDirs.clear();
    fs.attempts.clear();

    // Lessons
    try {
      const lessonsDir = await fs.dirHandle.getDirectoryHandle("lessons", { create: true });
      for await (const [name, handle] of lessonsDir.entries()) {
        if (handle.kind === "file" && name.endsWith(".json")) {
          try {
            const file = await handle.getFile();
            const data = JSON.parse(await file.text());
            data._filename = name;
            fs.lessons.set(data.id, data);
          } catch (e) { console.warn("Bad lesson file:", name, e); }
        }
      }
    } catch (e) { console.warn("Lessons dir error:", e); }

    // Quizzes (each quiz is its own subdirectory)
    try {
      const quizzesDir = await fs.dirHandle.getDirectoryHandle("quizzes", { create: true });
      for await (const [name, handle] of quizzesDir.entries()) {
        if (handle.kind !== "directory") continue;
        try {
          const defHandle = await handle.getFileHandle("definition.json");
          const file = await defHandle.getFile();
          const def = JSON.parse(await file.text());
          def._dirName = name;
          fs.quizzes.set(def.id, def);
          fs.quizDirs.set(def.id, handle);

          const attempts = [];
          for await (const [fname, fhandle] of handle.entries()) {
            if (fhandle.kind === "file" && fname.startsWith("attempt_") && fname.endsWith(".json")) {
              try {
                const af = await fhandle.getFile();
                const at = JSON.parse(await af.text());
                at._filename = fname;
                attempts.push(at);
              } catch (e) { console.warn("Bad attempt file:", fname, e); }
            }
          }
          attempts.sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
          fs.attempts.set(def.id, attempts);
        } catch (e) { console.warn("Bad quiz dir:", name, e); }
      }
    } catch (e) { console.warn("Quizzes dir error:", e); }

    // Syllabus progress (author mode): SYLLABUS.md is the creator's local editing
    // surface. Parse its checkboxes and fold them into the synced per-user overlay
    // (profile.progress) so completion reaches all devices — the deployed bar renders
    // from curriculum.json + that overlay, not from this file (which isn't deployed).
    // SYLLABUS.md lives in private/ (personal data, gitignored); older layouts had it
    // at the folder root. Try private/ first, then root.
    fs.syllabusProgress = null;
    try {
      let sh;
      try {
        const priv = await fs.dirHandle.getDirectoryHandle("private");
        sh = await priv.getFileHandle("SYLLABUS.md");
      } catch (e) {
        sh = await fs.dirHandle.getFileHandle("SYLLABUS.md");   // root fallback
      }
      const text = await (await sh.getFile()).text();
      fs.syllabusProgress = parseSyllabusChapters(text);
      seedProgressFromSyllabus(fs.syllabusProgress);
      seedNotesFromSyllabus(parseSyllabusNotesAndLog(text));   // seed study log + notes (non-destructive)
      seedReviewQueueFromSyllabus(parseSyllabusReviewQueue(text));   // seed SRS concept queue
    } catch (e) { /* no SYLLABUS.md — leave null */ }
    renderSyllabusProgress();
  },

  // Read-only content load over HTTP — works on every device (no File System Access API).
  // The browser can't list a directory over HTTP, so we read manifest.json first.
  async loadFromManifest() {
    fs.lessons.clear();
    fs.quizzes.clear();
    fs.quizDirs.clear();
    fs.attempts.clear();

    let manifest;
    try {
      const res = await fetch("manifest.json", { cache: "no-cache" });
      if (!res.ok) throw new Error(`manifest ${res.status}`);
      manifest = await res.json();
    } catch (e) {
      console.warn("No content manifest available:", e);
      return false;
    }

    const fetchJSON = async (path) => (await (await fetch(path)).json());

    await Promise.all((manifest.lessons || []).map(async (path) => {
      try {
        const data = await fetchJSON(path);
        data._filename = path.split("/").pop();
        data._readonly = true;
        fs.lessons.set(data.id, data);
      } catch (e) { console.warn("Bad lesson:", path, e); }
    }));

    // Quiz definitions only — attempt history is per-user (Firebase, a later phase).
    await Promise.all((manifest.quizzes || []).map(async (path) => {
      try {
        const def = await fetchJSON(path);
        def._dirName = path.split("/").slice(-2, -1)[0];
        def._readonly = true;
        fs.quizzes.set(def.id, def);
        fs.attempts.set(def.id, []);
      } catch (e) { console.warn("Bad quiz:", path, e); }
    }));

    // Auto-load flashcard decks on a fresh device (don't clobber local edits/progress).
    if (!(state.cards && state.cards.length)) {
      for (const deck of (manifest.flashcardDecks || [])) {
        try { mergeFlashcardDeck(await fetchJSON(deck)); }
        catch (e) { console.warn("Bad deck:", deck, e); }
      }
    }

    fs.readonly = true;
    fs.manifestLoaded = true;
    renderSyllabusProgress();
    return true;
  },

  lessonFilename(lesson) {
    if (lesson._filename) return lesson._filename;
    const m = (lesson.title || "").match(/^([\d.]+)/);
    const num = m ? m[1] : (lesson.id || "untitled").replace(/[^\w.]/g, "_");
    return `Lesson_${num}.json`;
  },

  async writeLesson(lesson) {
    if (!fs.connected) throw new Error("Not connected");
    const lessonsDir = await fs.dirHandle.getDirectoryHandle("lessons", { create: true });
    const filename = this.lessonFilename(lesson);
    const fh = await lessonsDir.getFileHandle(filename, { create: true });
    const w = await fh.createWritable();
    const toWrite = { ...lesson };
    delete toWrite._filename;
    await w.write(JSON.stringify(toWrite, null, 2) + "\n");
    await w.close();
    lesson._filename = filename;
  },

  async reloadLesson(lessonId) {
    if (!fs.connected) return null;
    const lessonsDir = await fs.dirHandle.getDirectoryHandle("lessons");
    const lesson = fs.lessons.get(lessonId);
    const filename = lesson ? this.lessonFilename(lesson) : null;
    if (!filename) return null;
    try {
      const fh = await lessonsDir.getFileHandle(filename);
      const file = await fh.getFile();
      const data = JSON.parse(await file.text());
      data._filename = filename;
      fs.lessons.set(data.id, data);
      return data;
    } catch (e) {
      console.warn("Reload lesson failed:", e);
      return null;
    }
  },

  async writeQuiz(quiz) {
    if (!fs.connected) throw new Error("Not connected");
    const quizzesDir = await fs.dirHandle.getDirectoryHandle("quizzes", { create: true });
    const dirName = quiz._dirName || quiz.id.replace(/^quiz-/, "").replace(/[^\w-]/g, "-");
    const quizDir = await quizzesDir.getDirectoryHandle(dirName, { create: true });
    const fh = await quizDir.getFileHandle("definition.json", { create: true });
    const w = await fh.createWritable();
    const toWrite = { ...quiz };
    delete toWrite._dirName;
    await w.write(JSON.stringify(toWrite, null, 2) + "\n");
    await w.close();
    quiz._dirName = dirName;
    fs.quizDirs.set(quiz.id, quizDir);
  },

  async writeAttempt(quizId, attempt) {
    if (!fs.connected) throw new Error("Not connected");
    const quizDir = fs.quizDirs.get(quizId);
    if (!quizDir) throw new Error("Quiz directory not loaded");
    const filename = attempt._filename || `attempt_${(attempt.timestamp || "").slice(0, 10)}_${attempt.id.slice(0, 6)}.json`;
    const fh = await quizDir.getFileHandle(filename, { create: true });
    const w = await fh.createWritable();
    const toWrite = { ...attempt };
    delete toWrite._filename;
    await w.write(JSON.stringify(toWrite, null, 2) + "\n");
    await w.close();
    attempt._filename = filename;
  },

  async reloadAttempt(quizId, attemptId) {
    if (!fs.connected) return null;
    const quizDir = fs.quizDirs.get(quizId);
    if (!quizDir) return null;
    const attempts = fs.attempts.get(quizId) || [];
    const att = attempts.find(a => a.id === attemptId);
    if (!att || !att._filename) return null;
    try {
      const fh = await quizDir.getFileHandle(att._filename);
      const file = await fh.getFile();
      const data = JSON.parse(await file.text());
      data._filename = att._filename;
      const idx = attempts.findIndex(a => a.id === attemptId);
      if (idx >= 0) attempts[idx] = data;
      return data;
    } catch (e) {
      console.warn("Reload attempt failed:", e);
      return null;
    }
  },

  async deleteAttempt(quizId, attemptId) {
    if (!fs.connected) return false;
    const quizDir = fs.quizDirs.get(quizId);
    if (!quizDir) return false;
    const attempts = fs.attempts.get(quizId) || [];
    const att = attempts.find(a => a.id === attemptId);
    if (!att || !att._filename) return false;
    try {
      await quizDir.removeEntry(att._filename);
      fs.attempts.set(quizId, attempts.filter(a => a.id !== attemptId));
      return true;
    } catch (e) { console.warn("Delete attempt failed:", e); return false; }
  },

  async deleteQuiz(quizId) {
    if (!fs.connected) return false;
    const quizzesDir = await fs.dirHandle.getDirectoryHandle("quizzes");
    const def = fs.quizzes.get(quizId);
    if (!def) return false;
    const dirName = def._dirName;
    if (!dirName) return false;
    try {
      await quizzesDir.removeEntry(dirName, { recursive: true });
      fs.quizzes.delete(quizId);
      fs.quizDirs.delete(quizId);
      fs.attempts.delete(quizId);
      return true;
    } catch (e) { console.warn("Delete quiz failed:", e); return false; }
  },
};

/* =====================================================================
   Pyodide — lazy-loaded Python execution in the browser
   ===================================================================== */

let pyodide = null;
let pyodideLoadPromise = null;

function pyodideAvailable() { return true; }  // we always offer the UI; loading happens on click

async function loadPyodideIfNeeded(statusEl) {
  if (pyodide) return pyodide;
  if (pyodideLoadPromise) return pyodideLoadPromise;
  if (statusEl) statusEl.textContent = "Loading Python… (~10 MB, first time only)";
  pyodideLoadPromise = (async () => {
    if (!window.loadPyodide) {
      await new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js";
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }
    pyodide = await window.loadPyodide({
      indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.0/full/"
    });
    return pyodide;
  })();
  return pyodideLoadPromise;
}

async function runPython(code) {
  const py = await loadPyodideIfNeeded();
  py.runPython(`
import sys, io
_stdout_buf = io.StringIO()
_stderr_buf = io.StringIO()
sys.stdout = _stdout_buf
sys.stderr = _stderr_buf
  `);
  let error = null, value;
  try {
    value = py.runPython(code);
  } catch (e) {
    error = (e && e.message) || String(e);
  }
  py.runPython(`
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
  `);
  const stdout = py.runPython("_stdout_buf.getvalue()");
  const stderr = py.runPython("_stderr_buf.getvalue()");
  return { stdout, stderr, value, error };
}

// Reset interpreter state between runs to avoid stale definitions
async function resetPythonNamespace() {
  const py = await loadPyodideIfNeeded();
  py.runPython(`
import sys
_keep = {"__name__", "__doc__", "__builtins__", "__loader__", "__spec__",
         "__package__", "sys", "io"}
for _k in list(globals().keys()):
    if _k not in _keep and not _k.startswith("_"):
        del globals()[_k]
  `);
}

/**
 * Attach a code runner UI (buttons + output panel) below a parent element.
 *   parentEl: where to append
 *   getCode: () => string — the user's code to run
 *   getTests: () => string[] | null — array of test assertion snippets (optional)
 *   setupCode: string | null — code to run BEFORE user code (e.g., _build helpers)
 *   runnerId: unique identifier
 */
// Make Tab insert spaces (and Shift+Tab dedent) inside a code textarea, instead of
// moving focus. Handles multi-line selections; preserves native undo for the common case.
function enableTabIndent(ta) {
  const INDENT = "    "; // 4 spaces (Python)
  ta.addEventListener("keydown", e => {
    if (e.key !== "Tab") return;
    e.preventDefault();
    const start = ta.selectionStart, end = ta.selectionEnd, val = ta.value;
    if (start === end && !e.shiftKey) {
      // Simple cursor insert — use execCommand so Ctrl/Cmd+Z still works.
      if (document.execCommand && document.execCommand("insertText", false, INDENT)) return;
      ta.value = val.slice(0, start) + INDENT + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + INDENT.length;
      ta.dispatchEvent(new Event("input", { bubbles: true }));
      return;
    }
    // Indent/dedent every line touched by the selection.
    const lineStart = val.lastIndexOf("\n", start - 1) + 1;
    const lines = val.slice(lineStart, end).split("\n");
    let newStart, newEnd, newBlock;
    if (e.shiftKey) {
      let removedFirst = 0, removedTotal = 0;
      newBlock = lines.map((ln, idx) => {
        const m = ln.match(/^( {1,4}|\t)/);
        const rem = m ? m[0].length : 0;
        if (idx === 0) removedFirst = rem;
        removedTotal += rem;
        return ln.slice(rem);
      }).join("\n");
      newStart = Math.max(lineStart, start - removedFirst);
      newEnd = end - removedTotal;
    } else {
      newBlock = lines.map(ln => INDENT + ln).join("\n");
      newStart = start + INDENT.length;
      newEnd = end + INDENT.length * lines.length;
    }
    ta.value = val.slice(0, lineStart) + newBlock + val.slice(end);
    ta.selectionStart = newStart;
    ta.selectionEnd = newEnd;
    ta.dispatchEvent(new Event("input", { bubbles: true }));
  });
}

function attachCodeRunner(parentEl, getCode, getTests, runnerId, setupCode) {
  const panel = document.createElement("div");
  panel.className = "code-runner";
  panel.dataset.runnerId = runnerId;
  const hasTests = typeof getTests === "function" && (getTests() || []).length > 0;
  panel.innerHTML = `
    <div class="code-runner-controls">
      <button data-act="run">▶ Run</button>
      ${hasTests ? `<button data-act="test">✓ Run tests</button>` : ""}
      <span class="code-runner-status"></span>
    </div>
    <div class="code-runner-output" hidden></div>
  `;
  parentEl.appendChild(panel);

  const status = panel.querySelector(".code-runner-status");
  const output = panel.querySelector(".code-runner-output");

  const showOutput = (text, kind) => {
    output.textContent = text;
    output.className = "code-runner-output" + (kind ? " " + kind : "");
    output.hidden = false;
  };

  panel.querySelector('[data-act="run"]').onclick = async () => {
    status.textContent = "Running…";
    output.hidden = true;
    try {
      await loadPyodideIfNeeded(status);
      await resetPythonNamespace();
      const setup = setupCode || "";
      const full = setup + "\n" + getCode();
      const result = await runPython(full);
      status.textContent = "";
      if (result.error) {
        showOutput(result.stdout + result.stderr + "\n" + result.error, "error");
      } else {
        const body = (result.stdout || "") + (result.stderr || "");
        showOutput(body || "(no output)", body ? null : null);
      }
    } catch (e) {
      status.textContent = "";
      showOutput("Loader error: " + e.message, "error");
    }
  };

  const testBtn = panel.querySelector('[data-act="test"]');
  if (testBtn) {
    testBtn.onclick = async () => {
      status.textContent = "Running tests…";
      output.hidden = true;
      try {
        await loadPyodideIfNeeded(status);
        await resetPythonNamespace();
        const setup = setupCode || "";
        // Run setup + user code first
        const setupResult = await runPython(setup + "\n" + getCode());
        if (setupResult.error) {
          status.textContent = "";
          showOutput("Setup / your code failed:\n" + setupResult.stderr + "\n" + setupResult.error, "error");
          return;
        }
        // Run each test independently and collect results
        const tests = getTests();
        const lines = [];
        let passed = 0, failed = 0;
        for (let i = 0; i < tests.length; i++) {
          const t = tests[i];
          const result = await runPython(t);
          if (result.error) {
            failed++;
            lines.push(`FAIL  ${shortTestLabel(t)}`);
            lines.push(`      ${result.error.split("\n").pop()}`);
          } else {
            passed++;
            lines.push(`pass  ${shortTestLabel(t)}`);
          }
        }
        status.textContent = "";
        const summary = `${passed} passed, ${failed} failed\n\n` + lines.join("\n");
        showOutput(summary, failed === 0 ? "success" : "error");
      } catch (e) {
        status.textContent = "";
        showOutput("Loader error: " + e.message, "error");
      }
    };
  }
  return panel;
}

function shortTestLabel(testCode) {
  const firstLine = testCode.trim().split("\n")[0];
  return firstLine.length > 60 ? firstLine.slice(0, 57) + "…" : firstLine;
}

// Collect every chapter across all phases in document order, in syllabus checkbox lines
// like "- [x] 1.1 ..." / "- [ ] 6.3 ...". Marks the first chapter of each phase (phaseStart).
function parseSyllabusChapters(md) {
  const items = [];
  let curPhase = null, firstInPhase = false;
  for (const line of md.split("\n")) {
    const h2 = line.match(/^##\s+(.*)$/);
    if (h2) {
      const ph = h2[1].match(/^(Phase \d+)\b/);
      if (ph) { curPhase = ph[1]; firstInPhase = true; }
      else { curPhase = null; } // left the phases region (Session Log, etc.)
      continue;
    }
    if (!curPhase) continue;
    const m = line.match(/^\s*-\s+\[([ xX])\]\s*(.*)$/);
    if (m) {
      const rest = (m[2] || "").trim();
      const idm = rest.match(/^(\d+(?:\.\d+)*)\s+(.*)$/);   // split leading "1.3.5" id from title
      items.push({
        done: m[1].toLowerCase() === "x",
        phase: curPhase,
        id: idm ? idm[1] : null,
        title: idm ? idm[2].trim() : rest,
        phaseStart: firstInPhase,
      });
      firstInPhase = false;
    }
  }
  return items.length ? items : null;
}

function renderSyllabusProgress() {
  const dots = document.getElementById("spDots");
  const label = document.getElementById("spLabel");
  // Primary: global curriculum.json + per-user overlay (works on every device).
  // Fallback: SYLLABUS.md-derived list (local author mode when curriculum.json absent).
  const items = buildCurriculumItems() || fs.syllabusProgress;
  if (!items || !items.length) { dots.hidden = true; label.hidden = true; return; }
  const statusOf = (x) => x.status || (x.done ? "known" : "none");   // fallback items lack status
  const total = items.length;
  const known = items.filter(x => statusOf(x) === "known").length;
  const learning = items.filter(x => statusOf(x) === "learning").length;
  let lastKnown = -1;
  items.forEach((x, i) => { if (statusOf(x) === "known") lastKnown = i; });
  const fillPct = (lastKnown >= 0 && total > 1) ? (lastKnown / (total - 1)) * 100 : 0;

  dots.innerHTML = "";
  items.forEach(x => {
    const st = statusOf(x);
    const d = document.createElement("div");
    d.className = "sp-dot" + (st === "known" ? " done" : st === "learning" ? " learning" : "") + (x.phaseStart ? " major" : "");
    const mark = st === "known" ? " ✓" : st === "learning" ? " …" : "";
    d.title = `${x.phase} · ${x.title}${mark}`;
    dots.appendChild(d);
  });
  dots.style.setProperty("--sp-fill", fillPct + "%");

  const pct = Math.round((known / total) * 100);
  label.textContent = `${known}/${total} · ${pct}%`;
  const learningNote = learning ? `, ${learning} learning` : "";
  document.getElementById("syllabusProgress").title = `Curriculum progress — ${known} of ${total} chapters known${learningNote} (click to update)`;
  dots.hidden = false;
  label.hidden = false;
}

// "Review" header button → spaced-repetition concept queue. Items due at or before the
// current session float to the top; Nailed doubles the interval, Struggled resets it.
function openReviewQueue() {
  const backdrop = modal(`
    <h2>Review queue</h2>
    <div class="rq-bar">
      <div class="rq-session">Session <button class="rq-step" id="rqDown">−</button><span id="rqSess"></span><button class="rq-step" id="rqUp">+</button></div>
      <span class="cp-sub" id="rqDueCount"></span>
    </div>
    <div class="rq-add">
      <input id="rqNew" placeholder="Add a concept to track…">
      <button class="ghost" id="rqAdd">Add</button>
    </div>
    <div id="rqList"></div>
    <div class="modal-actions"><button class="primary" id="rqDone">Done</button></div>
  `, (bd) => {
    const listEl = bd.querySelector("#rqList");
    const sessEl = bd.querySelector("#rqSess");
    const dueEl = bd.querySelector("#rqDueCount");

    const render = () => {
      const s = profile.currentSession || 1;
      sessEl.textContent = " " + s + " ";
      const q = (profile.reviewQueue || []).slice();
      // due (soonest nextReview) first; locked-in (interval>=16) last
      q.sort((a, b) => {
        const lockedA = (a.interval || 1) >= 16, lockedB = (b.interval || 1) >= 16;
        if (lockedA !== lockedB) return lockedA ? 1 : -1;
        return (a.nextReview || 999) - (b.nextReview || 999);
      });
      const dueCount = q.filter((r) => (r.interval || 1) < 16 && (r.nextReview || 0) <= s).length;
      dueEl.textContent = q.length ? `${dueCount} due · ${q.length} tracked` : "";
      listEl.innerHTML = "";
      if (!q.length) {
        const p = document.createElement("p"); p.className = "cp-sub"; p.textContent = "No concepts tracked yet."; listEl.appendChild(p); return;
      }
      q.forEach((r) => {
        const locked = (r.interval || 1) >= 16;
        const due = !locked && (r.nextReview || 0) <= s;
        const row = document.createElement("div");
        row.className = "rq-item" + (due ? " due" : "") + (locked ? " locked" : "");
        const head = document.createElement("div");
        head.className = "rq-item-head";
        const name = document.createElement("span");
        name.className = "rq-concept";
        name.textContent = r.concept || "";
        const badge = document.createElement("span");
        badge.className = "rq-badge";
        badge.textContent = locked ? "locked in" : due ? "due" : `next: S${r.nextReview ?? "?"}`;
        const del = document.createElement("button");
        del.className = "sl-entry-del"; del.textContent = "×"; del.title = "Stop tracking";
        del.addEventListener("click", () => { if (confirm("Remove this concept from the queue?")) { deleteReviewConcept(r.id); render(); } });
        head.appendChild(name); head.appendChild(badge); head.appendChild(del);
        row.appendChild(head);

        const meta = document.createElement("div");
        meta.className = "rq-meta";
        meta.textContent = `interval ${r.interval || 1} · last reviewed ${r.lastReviewed ? "S" + r.lastReviewed : "—"}`;
        row.appendChild(meta);

        if (r.status) {
          const st = document.createElement("div"); st.className = "rq-status"; st.textContent = r.status; row.appendChild(st);
        }
        if (!locked) {
          const acts = document.createElement("div");
          acts.className = "rq-acts";
          const nailed = document.createElement("button");
          nailed.className = "rq-act nailed"; nailed.textContent = "Nailed";
          nailed.addEventListener("click", () => { reviewItem(r.id, "nailed"); render(); });
          const struggled = document.createElement("button");
          struggled.className = "rq-act struggled"; struggled.textContent = "Struggled";
          struggled.addEventListener("click", () => { reviewItem(r.id, "struggled"); render(); });
          acts.appendChild(nailed); acts.appendChild(struggled);
          row.appendChild(acts);
        }
        listEl.appendChild(row);
      });
    };

    bd.querySelector("#rqDown").addEventListener("click", () => { setCurrentSession((profile.currentSession || 1) - 1); render(); });
    bd.querySelector("#rqUp").addEventListener("click", () => { setCurrentSession((profile.currentSession || 1) + 1); render(); });
    const addConcept = () => {
      const inp = bd.querySelector("#rqNew");
      const v = inp.value.trim();
      if (!v) return;
      addReviewConcept(v); inp.value = ""; render();
    };
    bd.querySelector("#rqAdd").addEventListener("click", addConcept);
    bd.querySelector("#rqNew").addEventListener("keydown", (e) => { if (e.key === "Enter") addConcept(); });
    bd.querySelector("#rqDone").addEventListener("click", () => backdrop.remove());
    render();
  });
}

/* ===== clipboard + Ask Claude ===== */
async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); ta.remove(); return true; }
    catch (err) { ta.remove(); return false; }
  }
}
