document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
// Apply a parsed import in one of two modes:
//   "append"  — merge by id (keep existing, update matches, add new; union review queue)
//   "replace" — wipe the deck and use only the file's contents
// Merge a flashcard deck into state by id, without re-rendering (used during boot).
function mergeFlashcardDeck(data) {
  if (Array.isArray(data.categories)) {
    const byId = new Map((state.categories || []).map(c => [c.id, c]));
    data.categories.forEach(c => byId.set(c.id, c));
    state.categories = Array.from(byId.values());
  }
  if (Array.isArray(data.cards)) {
    const byId = new Map((state.cards || []).map(c => [c.id, c]));
    data.cards.forEach(c => byId.set(c.id, c));
    state.cards = Array.from(byId.values());
  }
  if (Array.isArray(data.reviewQueue)) {
    const q = state.reviewQueue || [];
    data.reviewQueue.forEach(id => { if (!q.includes(id)) q.push(id); });
    state.reviewQueue = q;
  }
  saveState();
}

function applyImport(data, mode) {
  const hasCats = Array.isArray(data.categories);
  const hasCards = Array.isArray(data.cards);
  if (mode === "replace") {
    if (hasCats) state.categories = data.categories;
    if (hasCards) state.cards = data.cards;
    state.reviewQueue = Array.isArray(data.reviewQueue) ? data.reviewQueue : [];
  } else {
    if (hasCats) {
      const byId = new Map((state.categories || []).map(c => [c.id, c]));
      data.categories.forEach(c => byId.set(c.id, c));
      state.categories = Array.from(byId.values());
    }
    if (hasCards) {
      const byId = new Map((state.cards || []).map(c => [c.id, c]));
      data.cards.forEach(c => byId.set(c.id, c));
      state.cards = Array.from(byId.values());
    }
    if (Array.isArray(data.reviewQueue)) {
      const q = state.reviewQueue || [];
      data.reviewQueue.forEach(id => { if (!q.includes(id)) q.push(id); });
      state.reviewQueue = q;
    }
  }
  saveState();
  activeCategoryId = null;
  cardFlippedState = {};
  bootstrap();
  toast(mode === "replace" ? "Deck replaced" : "Imported");
}

document.getElementById("importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const ignored = [];
      if (Array.isArray(data.quizzes)) ignored.push("quizzes");
      if (Array.isArray(data.lessons)) ignored.push("lessons");
      if (Array.isArray(data.sessions)) ignored.push("sessions");
      const hasCats = Array.isArray(data.categories);
      const hasCards = Array.isArray(data.cards);
      if (!hasCats && !hasCards) {
        alert(ignored.length
          ? `This file only contains ${ignored.join(", ")}. Those are now file-based — connect to a study-tool folder instead.`
          : "Nothing recognizable in this file.");
        return;
      }

      const cardIds = new Set((state.cards || []).map(c => c.id));
      const inCards = hasCards ? data.cards.length : 0;
      const inCats = hasCats ? data.categories.length : 0;
      const newCards = hasCards ? data.cards.filter(c => !cardIds.has(c.id)).length : 0;
      const updCards = inCards - newCards;
      const haveCards = (state.cards || []).length;
      const haveCats = (state.categories || []).length;
      const fileBits = [];
      if (hasCards) fileBits.push(`${inCards} card${inCards === 1 ? "" : "s"}`);
      if (hasCats) fileBits.push(`${inCats} categor${inCats === 1 ? "y" : "ies"}`);
      const fileSummary = fileBits.join(" · ");
      const ignoredNote = ignored.length
        ? `<p style="font-size:12px;color:var(--text-dim);margin:0 0 10px;">Ignored: ${ignored.join(", ")} — those are file-based now.</p>` : "";

      modal(`
        <h2>Import flashcards</h2>
        <p style="font-size:13px;color:var(--text-muted);margin:0 0 10px;">
          This file contains <strong>${fileSummary}</strong>. You currently have <strong>${haveCards} cards</strong> in ${haveCats} categories.
        </p>
        ${ignoredNote}
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;font-size:13px;">
          <div style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);"><strong>Append / merge</strong> — keep your deck; add ${newCards} new card${newCards === 1 ? "" : "s"}${updCards ? `, update ${updCards} matching` : ""}.</div>
          <div style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);"><strong>Replace</strong> — delete your current deck and use only this file.</div>
        </div>
        <div class="modal-actions" style="flex-wrap:wrap;gap:6px;">
          <button class="ghost" data-act="cancel">Cancel</button>
          <button class="danger" data-act="replace">Replace…</button>
          <button class="primary" data-act="append">Append / merge</button>
        </div>
      `, root => {
        root.querySelector('[data-act="cancel"]').onclick = () => root.remove();
        root.querySelector('[data-act="append"]').onclick = () => { root.remove(); applyImport(data, "append"); };
        root.querySelector('[data-act="replace"]').onclick = () => {
          root.remove();
          modal(`
            <h2>Replace entire deck?</h2>
            <p style="font-size:13px;color:var(--text-muted);margin:0 0 12px;">
              This permanently deletes your existing <strong>${haveCards} cards</strong> and <strong>${haveCats} categories</strong>, replacing them with this file's ${fileSummary}. <strong>This cannot be undone.</strong>
            </p>
            <div class="modal-actions">
              <button class="ghost" data-act="cancel">Cancel</button>
              <button class="danger" data-act="confirm">Replace everything</button>
            </div>
          `, root2 => {
            root2.querySelector('[data-act="cancel"]').onclick = () => root2.remove();
            root2.querySelector('[data-act="confirm"]').onclick = () => { root2.remove(); applyImport(data, "replace"); };
          });
        };
      });
    } catch (err) {
      alert("Failed to import: " + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

/* ===== init ===== */
function applyDeviceCapabilities() {
  // Content (lessons, quizzes, flashcards) loads read-only via fetch on EVERY device.
  // Only authoring/saving needs the File System Access API (Chromium desktop), so the
  // only thing we hide where it's unavailable is the "Connect" (author mode) button.
  const hasFSA = typeof window.showDirectoryPicker === "function";
  if (hasFSA) return;
  const connectBtn = document.getElementById("connectBtn");
  if (connectBtn) connectBtn.hidden = true;
}

/* =====================================================================
   Cloud sync (Phase 2) — anonymous auth + per-user flashcard state in
   Firebase Realtime Database at /users/$uid/state (gated by security rules).
   Anonymous auth = a stable per-DEVICE identity (cloud-backed, survives
   reloads). True cross-device sync arrives with Google sign-in (next step),
   which links devices to one uid. Degrades silently if Firebase is absent.
   ===================================================================== */
cloud = {
  enabled: false,
  uid: null,
  db: null,
  ref: null,
  _timer: null,
  _applying: false,    // true while merging REMOTE data in (suppresses re-push)
  SCHEMA_VERSION: 1,

  setStatus(text, kind) {
    const el = document.getElementById("cloudStatus");
    if (!el) return;
    el.hidden = false;
    el.textContent = text;
    const color = { ok: "#16a34a", pending: "#999", warn: "#b45309" }[kind] || "#999";
    el.style.cssText = `font-size:12px;color:${color};padding:0 8px;white-space:nowrap;`;
  },

  init() {
    if (this._inited) return;   // bootstrap() re-runs on deck import; don't double-register auth listeners
    if (!window.firebase || !window.FIREBASE_CONFIG) {
      console.info("Firebase unavailable — running local-only (no cloud sync).");
      return;
    }
    this._inited = true;
    try {
      firebase.initializeApp(window.FIREBASE_CONFIG);
      this.db = firebase.database();
      this.writerId = uid();   // per-session id → lets the live listener ignore our own writes
    } catch (e) { console.warn("Firebase init failed:", e); return; }

    this.setStatus("Signing in…", "pending");
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        // No signed-in user (fresh load with no saved session, or just signed out)
        // → sign in anonymously as the default. CRITICAL: this is the ONLY place we
        // call signInAnonymously(). Calling it unconditionally at startup races with
        // Firebase restoring a persisted Google session and clobbers it — which drops
        // the user back to anonymous (a new uid) on every reload.
        this.enabled = false;
        this.updateAuthUI(null);
        firebase.auth().signInAnonymously().catch((e) => {
          if (e && e.code === "auth/operation-not-allowed") {
            this.setStatus("Cloud off", "warn");
            console.warn("Anonymous auth is not enabled in the Firebase console.");
          } else {
            this.setStatus("Offline", "warn");
            console.warn("Anonymous sign-in failed:", e);
          }
        });
        return;
      }
      if (this.ref) this.ref.off();   // detach any listener from a previous account
      if (this.uid && this.uid !== user.uid) curriculumUpdateHandled = false;  // re-check on account switch
      this.uid = user.uid;
      this.ref = this.db.ref("users/" + user.uid + "/state");
      this.enabled = true;
      this.updateAuthUI(user);
      await this.loadAndMerge();
      await this.loadContent();   // clone/merge per-user lesson+quiz content (seed-clone)
      await this.loadAttempts();
      await this.loadProfile();
      this.subscribeLive();
      // Surface past attempts: default to the latest for the active quiz, then re-render.
      if (activeQuizId && !activeSession) {
        const arr = fs.attempts.get(activeQuizId) || [];
        if (arr.length) activeSession = arr[arr.length - 1];
      }
      renderQuizzes();
      renderQuizBody();
      this.setStatus(user.isAnonymous ? "Synced · this device" : "Synced ✓", "ok");
    });
    // NOTE: anonymous sign-in is triggered from inside onAuthStateChanged above (the
    // !user branch) — deliberately NOT called here, to avoid clobbering a restored session.
  },

  async loadAndMerge() {
    try {
      const remote = (await this.ref.once("value")).val();
      if (remote && (Array.isArray(remote.cards) || Array.isArray(remote.categories))) {
        this._applying = true;
        mergeFlashcardDeck(remote);     // union remote into local by id
        this._applying = false;
        renderCategories();
        renderCardsBody();
      }
      // Seed a new doc, or push the merged union back up.
      this.push();
    } catch (e) { console.warn("Cloud load failed:", e); }
  },

  scheduleSync() {
    if (!this.enabled) return;
    clearTimeout(this._timer);
    this._timer = setTimeout(() => this.push(), 800);
  },

  push() {
    if (!this.enabled || !this.ref) return;
    const payload = {
      schemaVersion: this.SCHEMA_VERSION,
      updatedAt: firebase.database.ServerValue.TIMESTAMP,
      writerId: this.writerId,
      categories: state.categories || [],
      cards: state.cards || [],
      reviewQueue: state.reviewQueue || [],
    };
    this.ref.set(payload)
      .then(() => this.setStatus(this.uid ? "Synced · this device" : "Synced", "ok"))
      .catch((e) => { console.warn("Cloud push failed:", e); this.setStatus("Sync error", "warn"); });
  },

  updateAuthUI(user) {
    const btn = document.getElementById("authBtn");
    if (!btn) return;
    btn.hidden = false;
    if (user && !user.isAnonymous) {
      btn.classList.add("avatar-btn"); btn.classList.remove("ghost");
      if (user.photoURL) { btn.textContent = ""; btn.style.backgroundImage = `url("${user.photoURL}")`; }
      else { btn.style.backgroundImage = ""; btn.textContent = ((user.email || "?").trim()[0] || "?").toUpperCase(); }
      btn.title = "Signed in as " + (user.email || "") + " — click to sign out";
      btn.dataset.mode = "out";
    } else {
      btn.classList.remove("avatar-btn"); btn.classList.add("ghost");
      btn.style.backgroundImage = ""; btn.textContent = "Sign in";
      btn.title = "Sign in with Google to sync across all your devices";
      btn.dataset.mode = "in";
    }
  },

  // Sign in with Google. If currently anonymous, LINK (preserves uid + data).
  // If that Google account already exists (another device), sign into it — the
  // subsequent loadAndMerge unions this device's local cards into that account.
  async signInWithGoogle() {
    if (!window.firebase) return;
    const provider = new firebase.auth.GoogleAuthProvider();
    const current = firebase.auth().currentUser;
    try {
      if (current && current.isAnonymous) {
        await current.linkWithPopup(provider);
      } else {
        await firebase.auth().signInWithPopup(provider);
      }
      toast("Signed in — your data now syncs across devices");
    } catch (e) {
      if (e.code === "auth/credential-already-in-use" && e.credential) {
        try {
          await firebase.auth().signInWithCredential(e.credential);
          toast("Signed in — this device's data merged into your account");
        } catch (e2) { console.warn("Sign-in after link conflict failed:", e2); toast("Sign-in failed"); }
      } else if (e.code === "auth/popup-closed-by-user" || e.code === "auth/cancelled-popup-request") {
        /* user cancelled — ignore */
      } else if (e.code === "auth/unauthorized-domain") {
        toast("This domain isn't authorized for sign-in yet");
        console.warn("Add this domain in Firebase Auth → Settings → Authorized domains.");
      } else {
        console.warn("Google sign-in failed:", e);
        toast("Sign-in failed");
      }
    }
  },

  async signOut() {
    try { await firebase.auth().signOut(); toast("Signed out"); }
    catch (e) { console.warn("Sign-out failed:", e); }
  },

  // Quiz attempts live at /users/$uid/attempts/$quizId/$attemptId. Stored as a JSON
  // string to sidestep RTDB's array/null quirks (responses arrays contain nulls).
  scheduleAttemptSave(quizId, attempt) {
    if (!this.enabled || !attempt) return;
    this._attemptTimers = this._attemptTimers || {};
    clearTimeout(this._attemptTimers[attempt.id]);
    this._attemptTimers[attempt.id] = setTimeout(() => this.saveAttempt(quizId, attempt), 800);
  },

  saveAttempt(quizId, attempt) {
    if (!this.enabled || !this.uid || !attempt) return;
    const clean = { ...attempt };
    delete clean._filename;
    this.db.ref(`users/${this.uid}/attempts/${quizId}/${attempt.id}`)
      .set({ json: JSON.stringify(clean), updatedAt: firebase.database.ServerValue.TIMESTAMP })
      .catch((e) => console.warn("Attempt save failed:", e));
  },

  async loadAttempts() {
    if (!this.enabled || !this.uid) return;
    try {
      const byQuiz = (await this.db.ref(`users/${this.uid}/attempts`).once("value")).val() || {};
      Object.keys(byQuiz).forEach((quizId) => {
        const attempts = Object.values(byQuiz[quizId] || {})
          .map((rec) => { try { return JSON.parse(rec.json); } catch (e) { return null; } })
          .filter(Boolean)
          .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
        if (attempts.length) fs.attempts.set(quizId, attempts);
      });
    } catch (e) { console.warn("Load attempts failed:", e); }
  },

  // Per-user profile (lesson answers now; progress later) lives at
  // /users/$uid/profile. Synced on sign-in + debounced push, like attempts —
  // deliberately NOT a live listener, so a remote change can't re-render a lesson
  // out from under someone typing an answer.
  async loadProfile() {
    if (!this.enabled || !this.uid) return;
    try {
      const remote = (await this.db.ref(`users/${this.uid}/profile`).once("value")).val();
      if (remote) {
        // lessonAnswers is stored as a JSON STRING: lesson/exercise ids contain '.'
        // which RTDB forbids in keys (same reason quiz attempts are stringified).
        let remoteAnswers = {};
        try {
          remoteAnswers = typeof remote.lessonAnswers === "string"
            ? JSON.parse(remote.lessonAnswers)
            : (remote.lessonAnswers || {});
        } catch (e) { console.warn("Bad remote lessonAnswers:", e); }
        if (remoteAnswers && typeof remoteAnswers === "object") {
          // Union remote answers into local: remote wins per (lesson, exercise) key,
          // but local-only entries (edited offline before this load) are preserved.
          this._applying = true;
          Object.keys(remoteAnswers).forEach((lessonId) => {
            const local = profile.lessonAnswers[lessonId] = profile.lessonAnswers[lessonId] || {};
            Object.assign(local, remoteAnswers[lessonId]);
          });
          if (remote.schemaVersion) profile.schemaVersion = remote.schemaVersion;
          saveProfile();          // persist merged result locally
          this._applying = false;
        }
        // Merge the curriculum-progress overlay (also stringified; remote wins per chapter).
        let remoteProgress = {};
        try {
          remoteProgress = typeof remote.progress === "string"
            ? JSON.parse(remote.progress)
            : (remote.progress || {});
        } catch (e) { console.warn("Bad remote progress:", e); }
        if (remoteProgress && typeof remoteProgress === "object") {
          this._applying = true;
          Object.assign(profile.progress = profile.progress || {}, remoteProgress);
          normalizeProgress();   // migrate any legacy {done} entries a device pushed
          saveProfile();
          this._applying = false;
        }
        // Merge free-text notes (remote wins per field) and the session log (union by id).
        this._applying = true;
        try {
          const rn = typeof remote.notes === "string" ? JSON.parse(remote.notes) : (remote.notes || null);
          if (rn && typeof rn === "object") profile.notes = Object.assign(profile.notes || {}, rn);
        } catch (e) { console.warn("Bad remote notes:", e); }
        try {
          const rl = typeof remote.sessionLog === "string" ? JSON.parse(remote.sessionLog) : remote.sessionLog;
          if (Array.isArray(rl)) {
            const byId = {};
            (profile.sessionLog || []).forEach((en) => { if (en && en.id) byId[en.id] = en; });
            rl.forEach((en) => { if (en && en.id) byId[en.id] = en; });   // remote wins per id
            profile.sessionLog = Object.values(byId);
          }
        } catch (e) { console.warn("Bad remote sessionLog:", e); }
        try {
          const rq = typeof remote.reviewQueue === "string" ? JSON.parse(remote.reviewQueue) : remote.reviewQueue;
          if (Array.isArray(rq)) {
            const byId = {};
            (profile.reviewQueue || []).forEach((en) => { if (en && en.id) byId[en.id] = en; });
            rq.forEach((en) => { if (en && en.id) byId[en.id] = en; });   // remote wins per id
            profile.reviewQueue = Object.values(byId);
          }
        } catch (e) { console.warn("Bad remote reviewQueue:", e); }
        if (Number.isFinite(remote.currentSession)) {
          profile.currentSession = Math.max(profile.currentSession || 1, remote.currentSession);
        }
        // Structural curriculum overlay: merge sub-objects (added unioned by id).
        try {
          const ro = typeof remote.treeOverlay === "string" ? JSON.parse(remote.treeOverlay) : remote.treeOverlay;
          if (ro && typeof ro === "object") {
            const lov = ensureOverlay();
            const byId = {};
            (lov.added || []).forEach((a) => { if (a && a.id) byId[a.id] = a; });
            (ro.added || []).forEach((a) => { if (a && a.id) byId[a.id] = a; });
            lov.added = Object.values(byId);
            Object.assign(lov.hidden, ro.hidden || {});
            Object.assign(lov.renamed, ro.renamed || {});
            Object.assign(lov.order, ro.order || {});
          }
        } catch (e) { console.warn("Bad remote treeOverlay:", e); }
        if (remote.treeMode === "custom" || remote.treeMode === "overlay") profile.treeMode = remote.treeMode;
        try {
          const ct = typeof remote.customTree === "string" ? JSON.parse(remote.customTree) : remote.customTree;
          if (ct && typeof ct === "object") profile.customTree = ct;
        } catch (e) { console.warn("Bad remote customTree:", e); }
        // Curriculum-update bookkeeping: highest seen version wins; policy/snapshot remote-wins.
        if (Number.isFinite(remote.seenCurriculumVersion)) {
          profile.seenCurriculumVersion = Math.max(profile.seenCurriculumVersion || 0, remote.seenCurriculumVersion);
        }
        if (["keep-mine", "take-new", "merge", "ask"].includes(remote.curriculumUpdatePolicy)) profile.curriculumUpdatePolicy = remote.curriculumUpdatePolicy;
        try {
          const cs = typeof remote.curriculumSnapshot === "string" ? JSON.parse(remote.curriculumSnapshot) : remote.curriculumSnapshot;
          if (cs && typeof cs === "object") profile.curriculumSnapshot = cs;
        } catch (e) { console.warn("Bad remote curriculumSnapshot:", e); }
        saveProfile();
        this._applying = false;
      }
      hydrateLessonAnswers();
      renderLessonBody();
      renderSyllabusProgress();   // reflect the synced progress overlay
      checkCurriculumUpdate();    // review global curriculum changes now that cloud state is merged
      this.pushProfile();       // seed a new doc, or push the merged union back up
    } catch (e) {
      console.warn("Profile load failed:", e);
    } finally {
      // _applying is a SHARED sync guard (flashcards + profile). Guarantee it clears even
      // if a merge step threw, so we never silently disable all future syncs.
      this._applying = false;
    }
  },

  // Seed-clone (Phase 3): each user gets their OWN copy of lesson/quiz CONTENT in
  // /users/$uid/content (design: "content = clone", not shared). On a fresh account we clone
  // the currently-loaded content (the repo seed) into the user's space; thereafter their copy
  // is merged over the repo baseline so it renders. Fail-safe: any error leaves the repo
  // content in place. Skipped in author mode (fs.connected) where local folder files are the
  // source of truth. (Flashcards already live per-user via /state; only lessons+quizzes here.)
  async loadContent() {
    if (!this.enabled || !this.uid || fs.connected) return;
    try {
      const ref = this.db.ref(`users/${this.uid}/content`);
      const remote = (await ref.once("value")).val();
      if (!remote) {
        if (fs.lessons.size || fs.quizzes.size) await ref.set(this._contentPayload());  // clone seed
        return;   // fs already holds this content — nothing to merge
      }
      // Phase 5 — global-update auto-inherit: normally the user's clone wins per id, BUT if the
      // shipped seed carries a NEWER `version` than the clone and the user hasn't edited their
      // copy (no `_userEdited`), keep the newer global content (seamless auto-inherit — the
      // "no patch → take the update" majority case). When in-app content editing lands, an
      // edited copy would instead route to a take-new/keep-mine prompt (see curriculum flow).
      let contentUpdated = false;
      const mergeInto = (mapStr, targetMap) => {
        let obj = {};
        try { obj = typeof mapStr === "string" ? JSON.parse(mapStr) : (mapStr || {}); } catch (e) { obj = {}; }
        Object.values(obj).forEach((clone) => {
          if (!clone || !clone.id) return;
          const seed = targetMap.get(clone.id);   // the shipped seed for this id, if any
          if (seed && Number(seed.version || 1) > Number(clone.version || 1) && !clone._userEdited) {
            contentUpdated = true;   // leave the newer seed (already in targetMap) in place
          } else {
            targetMap.set(clone.id, clone);        // user's own copy wins
          }
        });
      };
      mergeInto(remote.lessons, fs.lessons);
      mergeInto(remote.quizzes, fs.quizzes);
      if (contentUpdated) await ref.set(this._contentPayload());   // persist the inherited updates back to the clone
      fs.manifestLoaded = true;
      // Keep active selections valid, re-apply answers onto merged lesson objects, re-render.
      const lessons = getLessonsSorted();
      if (!activeLessonId || !fs.lessons.get(activeLessonId)) activeLessonId = lessons.length ? lessons[lessons.length - 1].id : null;
      const quizzes = getQuizzesSorted();
      if (!activeQuizId || !fs.quizzes.get(activeQuizId)) activeQuizId = quizzes.length ? quizzes[0].id : null;
      hydrateLessonAnswers();
      renderLessons(); renderLessonBody(); renderQuizzes(); renderQuizBody();
    } catch (e) { console.warn("Content clone/load failed (keeping repo content):", e); }
  },
  _contentPayload() {
    const toMap = (m) => { const o = {}; m.forEach((v, k) => { o[k] = v; }); return JSON.stringify(o); };
    return {
      schemaVersion: 1,
      updatedAt: firebase.database.ServerValue.TIMESTAMP,
      lessons: toMap(fs.lessons),
      quizzes: toMap(fs.quizzes),
    };
  },

  scheduleProfileSync() {
    if (!this.enabled) return;
    clearTimeout(this._profileTimer);
    this._profileTimer = setTimeout(() => this.pushProfile(), 800);
  },

  _profilePayload() {
    return {
      schemaVersion: profile.schemaVersion || 1,
      updatedAt: firebase.database.ServerValue.TIMESTAMP,
      writerId: this.writerId,
      lessonAnswers: JSON.stringify(profile.lessonAnswers || {}),   // stringified: ids contain '.'
      progress: JSON.stringify(profile.progress || {}),             // stringified: chapter ids contain '.'
      sessionLog: JSON.stringify(profile.sessionLog || []),         // stringified array
      notes: JSON.stringify(profile.notes || {}),                   // stringified free-text notes
      reviewQueue: JSON.stringify(profile.reviewQueue || []),       // stringified SRS queue
      currentSession: profile.currentSession || 1,
      treeOverlay: JSON.stringify(profile.treeOverlay || {}),       // structural curriculum overlay
      treeMode: profile.treeMode || "overlay",
      customTree: JSON.stringify(profile.customTree || null),       // standalone tree when forked
      seenCurriculumVersion: profile.seenCurriculumVersion || 0,
      curriculumUpdatePolicy: profile.curriculumUpdatePolicy || "ask",
      curriculumSnapshot: JSON.stringify(profile.curriculumSnapshot || null),
    };
  },

  // The whole profile is one node written with .set(), so a naive push would clobber
  // additions another device made since our last read. Re-read first and fold in any
  // remote-only additions (union by id / add missing keys, LOCAL wins on true conflicts)
  // so concurrent writers don't lose each other's data. Not a transaction — the residual
  // race is the ms between read and write, vs. an entire session before.
  pushProfile() {
    if (!this.enabled || !this.uid) return;
    const ref = this.db.ref(`users/${this.uid}/profile`);
    ref.once("value")
      .then((snap) => {
        unionRemoteIntoLocal(snap.val());
        return ref.set(this._profilePayload());
      })
      .catch((e) => console.warn("Profile push failed:", e));
  },

  // Live flashcard sync: apply changes pushed from OTHER devices/sessions in real
  // time. Own writes are tagged with writerId and skipped. Won't re-render while a
  // card editor is open (editMode), to avoid clobbering an in-progress edit.
  subscribeLive() {
    if (!this.ref) return;
    this.ref.on("value", (snap) => {
      const remote = snap.val();
      if (!remote || remote.writerId === this.writerId) return;   // ignore our own echoes
      if (!(Array.isArray(remote.cards) || Array.isArray(remote.categories))) return;
      this._applying = true;
      mergeFlashcardDeck(remote);
      this._applying = false;
      if (!editMode) { renderCategories(); renderCardsBody(); }
      this.setStatus(this.uid ? "Synced ✓" : "Synced", "ok");
    });
  },
};

async function bootstrap() {
  // Run any pending data migrations
  migrateCardSourceRefs();

  // Strip quiz/lessons UI on browsers that can't reach the file system
  applyDeviceCapabilities();

  // Restore tab
  const validTabs = ["cards", "quiz", "lessons", "plan"];
  const tab = validTabs.includes(prefs.lastTab) ? prefs.lastTab : "cards";
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === tab + "View"));
  renderPlan();

  // Pick active category: pinned > lastCategory > first. Queue is special.
  const cats = getCategorySorted();
  if (prefs.pinnedCategoryId === "__queue__") {
    activeCategoryId = "__queue__";
  } else if (prefs.pinnedCategoryId && cats.find(c => c.id === prefs.pinnedCategoryId)) {
    activeCategoryId = prefs.pinnedCategoryId;
  } else if (prefs.lastCategoryId === "__queue__") {
    activeCategoryId = "__queue__";
  } else if (prefs.lastCategoryId && cats.find(c => c.id === prefs.lastCategoryId)) {
    activeCategoryId = prefs.lastCategoryId;
  } else if (cats.length > 0) {
    activeCategoryId = cats[0].id;
  }

  // Try a silent reconnect to a local study-tool folder (enables authoring on a
  // Chromium desktop). If that doesn't connect, load content read-only over HTTP
  // via the manifest so lessons/quizzes/flashcards work on every device.
  await fsm.tryReconnect();
  if (!fs.connected) await fsm.loadFromManifest();
  await loadCurriculum();   // global curriculum tree for the progress bar (+ per-user overlay)
  // Local-only mode (no cloud): check for curriculum updates now. Signed-in users are
  // checked after cloud.loadProfile so the decision reflects synced state across devices.
  if (!window.firebase || !window.FIREBASE_CONFIG) checkCurriculumUpdate();
  updateConnectionUI();

  // Now that lessons/quizzes may have loaded from disk, pick defaults
  const quizzes = getQuizzesSorted();
  if (prefs.lastQuizId && quizzes.find(q => q.id === prefs.lastQuizId)) {
    activeQuizId = prefs.lastQuizId;
  } else if (quizzes.length > 0) {
    activeQuizId = quizzes[0].id;
  }
  // Default attempt = latest
  if (activeQuizId) {
    const attempts = fs.attempts.get(activeQuizId) || [];
    activeSession = attempts.length > 0 ? attempts[attempts.length - 1] : null;
  }

  const lessons = getLessonsSorted();
  if (prefs.lastLessonId && lessons.find(l => l.id === prefs.lastLessonId)) {
    activeLessonId = prefs.lastLessonId;
  } else if (lessons.length > 0) {
    activeLessonId = lessons[lessons.length - 1].id;
  }

  hydrateLessonAnswers();   // apply locally-persisted lesson answers before first render
  renderSyllabusProgress(); // now that curriculum.json + local overlay are loaded
  renderCategories();
  renderCardsBody();
  renderQuizzes();
  renderQuizBody();
  renderLessons();
  renderLessonBody();

  // Start cloud sync (anonymous auth → load/merge per-user state). Fire-and-forget.
  cloud.init();

  // Warm up Python in the background so the first code-run is instant.
  // Skip on mobile / data-saver to avoid the ~10 MB download until it's needed.
  if (!isLikelyMobile()) {
    setTimeout(() => { loadPyodideIfNeeded().catch(() => {}); }, 1200);
  }
}

// Service worker → offline support + installability (PWA). Only over http(s).
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .catch(e => console.warn("Service worker registration failed:", e));
  });
}

bootstrap();
</script>
</body>
</html>
