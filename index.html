function buildReviewPy() {
  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) return "";
  const date = new Date(activeSession ? activeSession.timestamp : Date.now());
  const lines = [];

  lines.push(`"""`);
  lines.push(`Quiz Review — ${quiz.title}`);
  lines.push(`Date: ${date.toISOString().slice(0, 10)}`);
  lines.push(`Generated: ${date.toLocaleString()}`);
  lines.push(`Source: study-tool (auto-exported)`);
  lines.push(``);
  lines.push(`Mirrors the website layout per question:`);
  lines.push(`  prompt → my answer → auto-grade → self-rate → note → expected answer`);
  lines.push(`"""`);
  lines.push(``);
  lines.push(`# =============================================================================`);
  lines.push(`# ${quiz.title}`);
  lines.push(`# =============================================================================`);
  lines.push(``);

  quiz.questions.forEach((q, i) => {
    const r = activeSession ? activeSession.responses[i] : null;
    const typeName = q.type === "mc" ? "multiple choice" : q.type === "text" ? "text" : "code";

    lines.push(`# -----------------------------------------------------------------------------`);
    lines.push(`# Q${i + 1}. ${q.prompt}`);
    lines.push(`# Type: ${typeName}`);
    lines.push(`# -----------------------------------------------------------------------------`);
    lines.push(``);

    if (q.type === "mc") {
      lines.push(`# Options:`);
      (q.options || []).forEach((opt, oi) => {
        const marker = q.correct === oi ? "   <- correct" : "";
        lines.push(`#   [${oi}] ${opt}${marker}`);
      });
      lines.push(``);
    }

    if (r === null || r === undefined) {
      lines.push(`# MY ANSWER: (not submitted)`);
    } else if (q.type === "mc") {
      const mark = r.correct === true ? "   [correct]" : r.correct === false ? "   [incorrect]" : "";
      const val = r.value !== null && r.value !== undefined
        ? `[${r.value}] ${q.options[r.value]}`
        : "(none chosen)";
      lines.push(`# MY ANSWER: ${val}${mark}`);
    } else if (q.type === "text") {
      const mark = r.correct === true ? (r.override ? "   [self-marked correct]" : "   [correct]") : r.correct === false ? "   [incorrect]" : "";
      lines.push(`# MY ANSWER: ${r.value || "(empty)"}${mark}`);
    } else if (q.type === "code") {
      lines.push(`# MY ANSWER:`);
      const codeLines = (r.value || "").split("\n");
      if (codeLines.length === 0 || (codeLines.length === 1 && !codeLines[0])) {
        lines.push(`#   (empty)`);
      } else {
        codeLines.forEach(cl => lines.push(`#   ${cl}`));
      }
    }

    if (r && r.correct === true) lines.push(`# AUTO-GRADE: correct${r.override ? " (self-marked)" : ""}`);
    else if (r && r.correct === false) lines.push(`# AUTO-GRADE: incorrect`);
    else if (r && r.correct === null && (q.type === "mc" || (q.type === "text" && q.answer))) {
      // null in a normally-graded type means not yet submitted via the grader path
    }

    lines.push(`# SELF-RATE: ${r && r.selfRating ? r.selfRating + "/5" : "—"}`);

    if (r && r.note) {
      lines.push(`# NOTE:`);
      r.note.split("\n").forEach(nl => lines.push(`#   ${nl}`));
    } else {
      lines.push(`# NOTE: —`);
    }

    lines.push(``);

    const expected = q.type === "mc"
      ? (typeof q.correct === "number" ? `[${q.correct}] ${q.options[q.correct]}` : "(no correct option set)")
      : (q.answer || "(no reference answer set)");
    lines.push(`# +-- EXPECTED ANSWER ----------------------------------------------------------`);
    expected.split("\n").forEach(el => lines.push(`# | ${el}`));
    lines.push(`# +-----------------------------------------------------------------------------`);
    lines.push(``);
    lines.push(``);
  });

  return lines.join("\n");
}

function downloadReviewPy() {
  if (!activeQuizId) return;
  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) return;
  const content = buildReviewPy();
  const date = new Date(activeSession ? activeSession.timestamp : Date.now()).toISOString().slice(0, 10);
  const filename = `Review_${date}_${shortQuizSlug(quiz.title)}.py`;
  const blob = new Blob([content], { type: "text/x-python" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Saved ${filename}`);
}

async function sendSessionToClaude() {
  if (!activeQuizId || !activeSession) return;
  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) return;
  const lines = [
    `Please review my quiz session for "${quiz.title}" (${new Date(activeSession.timestamp).toLocaleString()}):`,
    ""
  ];
  quiz.questions.forEach((q, i) => {
    lines.push(`--- Q${i + 1} (${q.type}) ---`);
    lines.push(`Prompt: ${q.prompt}`);
    if (q.type === "mc") {
      q.options.forEach((opt, oi) => lines.push(`  ${oi}: ${opt}${q.correct === oi ? "  [correct]" : ""}`));
    } else if (q.answer) {
      lines.push(`Expected: ${q.answer}`);
    }
    const r = activeSession.responses[i];
    if (r === null || r === undefined) {
      lines.push(`My answer: (skipped)`);
    } else if (q.type === "mc") {
      const mark = r.correct === true ? " [✓]" : r.correct === false ? " [✗]" : "";
      lines.push(`My answer: ${r.value !== null && r.value !== undefined ? q.options[r.value] : "(none chosen)"}${mark}`);
    } else {
      lines.push(`My answer:`);
      lines.push((r.value || "").split("\n").map(l => "  " + l).join("\n"));
      if (r.correct === true) lines.push(r.override ? `Self-marked: correct` : `Auto-graded: correct`);
      else if (r.correct === false) lines.push(`Auto-graded: incorrect`);
    }
    if (r && r.selfRating) lines.push(`Self-rate: ${r.selfRating}/5`);
    if (r && r.note) lines.push(`Note: ${r.note}`);
    lines.push("");
  });
  lines.push("Please go through each one and tell me what I got right, what to revisit, and any patterns in my misses.");
  const ok = await copyToClipboard(lines.join("\n"));
  if (ok) toast("Session copied. Paste in Claude Code chat.");
  else toast("Copy failed — see console");
}

/* ===== modal helper ===== */
function modal(contentHtml, onMount) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `<div class="modal">${contentHtml}</div>`;
  document.body.appendChild(backdrop);
  backdrop.addEventListener("click", e => { if (e.target === backdrop) backdrop.remove(); });
  if (onMount) onMount(backdrop);
  const firstInput = backdrop.querySelector("input, textarea, select");
  if (firstInput) firstInput.focus();
  return backdrop;
}

/* ===== flashcard face rendering ===== */
function escapeHtml(s) {
  return (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
// Multi-line content (code / diagrams) → left-aligned monospace box with real
// indentation. Single-line content → centered prose, with `inline code` styled.
function appendProse(el, t) {
  t = t.replace(/^\n+|\n+$/g, "");
  if (!t) return;
  const div = document.createElement("div");
  div.className = "face-text";
  div.innerHTML = escapeHtml(t).replace(/`([^`]+)`/g, "<code>$1</code>");
  el.appendChild(div);
}
function appendCode(el, code) {
  code = code.replace(/^\n+/, "").replace(/\n+$/, "");
  if (!code) return;
  const pre = document.createElement("pre");
  pre.className = "card-code";
  pre.textContent = code;
  el.appendChild(pre);
}
function setFaceContent(el, text) {
  text = text || "";
  el.classList.remove("has-code");
  if (text.includes("```")) {
    // Fenced: ``` blocks → left-aligned code boxes; everything else → prose.
    el.classList.add("has-code");
    el.innerHTML = "";
    text.split("```").forEach((part, i) => (i % 2 === 1 ? appendCode(el, part) : appendProse(el, part)));
  } else {
    // No fences → prose (line breaks preserved by the face's pre-wrap). Only fenced
    // ``` blocks become monospace code boxes.
    el.innerHTML = escapeHtml(text).replace(/`([^`]+)`/g, "<code>$1</code>");
  }
}

function renderFlashcard(card) {
  const wrap = document.createElement("div");
  wrap.className = "flashcard-wrap";

  const flipped = !!cardFlippedState[card.id];
  const cls = "flashcard" + (flipped ? " flipped" : "") + (editMode ? " editing" : "");

  const frontHtml = editMode
    ? `<textarea class="face-edit" data-side="front" placeholder="Front"></textarea>`
    : `<div class="face-content"></div>`;
  const backHtml = editMode
    ? `<textarea class="face-edit" data-side="back" placeholder="Back"></textarea>`
    : `<div class="face-content"></div>`;

  const inQueue = (state.reviewQueue || []).includes(card.id);

  wrap.innerHTML = `
    <div class="${cls}" data-id="${card.id}" draggable="${!editMode}">
      <div class="flashcard-inner">
        <div class="flashcard-face flashcard-front">
          <div class="face-corner">Front</div>
          ${inQueue ? `<div class="queue-indicator" title="In review queue">★</div>` : ""}
          ${frontHtml}
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="face-corner">Back</div>
          ${backHtml}
        </div>
      </div>
    </div>
    ${editMode ? `
      <div class="flashcard-controls">
        <button data-act="flip">Show ${flipped ? "front" : "back"}</button>
        <button data-act="del" class="danger">Delete</button>
      </div>` : ""}
    <div class="card-foot${editMode ? " always-show" : ""}">
      <button class="ask-claude-btn" data-act="queue">${inQueue ? "★ In queue" : "+ Queue"}</button>
      <button class="ask-claude-btn" data-act="ask">Ask Claude →</button>
    </div>
  `;

  const flashcardEl = wrap.querySelector(".flashcard");

  if (editMode) {
    const frontEdit = wrap.querySelector('[data-side="front"]');
    const backEdit = wrap.querySelector('[data-side="back"]');
    frontEdit.value = card.front;
    backEdit.value = card.back;
    frontEdit.addEventListener("change", () => { card.front = frontEdit.value; saveState(); });
    backEdit.addEventListener("change", () => { card.back = backEdit.value; saveState(); });
    // Prevent flip when clicking inside textarea
    [frontEdit, backEdit].forEach(t => t.addEventListener("click", e => e.stopPropagation()));

    wrap.querySelector('[data-act="flip"]').onclick = e => {
      e.stopPropagation();
      cardFlippedState[card.id] = !cardFlippedState[card.id];
      flashcardEl.classList.toggle("flipped");
      e.currentTarget.textContent = `Show ${flashcardEl.classList.contains("flipped") ? "front" : "back"}`;
    };
    wrap.querySelector('[data-act="del"]').onclick = e => {
      e.stopPropagation();
      if (confirm("Delete this card?")) {
        state.cards = state.cards.filter(c => c.id !== card.id);
        state.reviewQueue = (state.reviewQueue || []).filter(id => id !== card.id);
        delete cardFlippedState[card.id];
        saveState();
        renderCardsBody();
        renderCategories();
      }
    };
  } else {
    setFaceContent(wrap.querySelector(".flashcard-front .face-content"), card.front);
    setFaceContent(wrap.querySelector(".flashcard-back .face-content"), card.back);
    flashcardEl.addEventListener("click", () => {
      cardFlippedState[card.id] = !cardFlippedState[card.id];
      flashcardEl.classList.toggle("flipped");
    });
    attachDrag(flashcardEl, "card");
  }

  wrap.querySelector('[data-act="queue"]').onclick = e => {
    e.stopPropagation();
    state.reviewQueue = state.reviewQueue || [];
    const idx = state.reviewQueue.indexOf(card.id);
    if (idx >= 0) {
      state.reviewQueue.splice(idx, 1);
      toast("Removed from review queue");
    } else {
      state.reviewQueue.push(card.id);
      toast("Added to review queue");
    }
    saveState();
    renderCardsBody();
    renderCategories();
  };

  wrap.querySelector('[data-act="ask"]').onclick = e => {
    e.stopPropagation();
    const cat = state.categories.find(c => c.id === card.categoryId);
    openAskClaude(`flashcard from "${cat ? cat.name : 'category'}"`, [
      `Front: ${card.front}`,
      `Back: ${card.back || '(empty)'}`
    ]);
  };

  return wrap;
}

/* ===== source-linked flashcards =====
   A card created from a quiz question / lesson exercise / lesson section
   stores a sourceRef so we can detect duplicates on later "+ Flashcard" clicks.
*/

// Idempotent migration: link seed cards to sources + add concept tags.
// Runs every load — only writes fields that are missing.
function migrateCardSourceRefs() {
  // Card ID -> source ref (location-based).
  const sourceMap = {
    "c-str-immut":   { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 0 },
    "c-counter":     { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 2 },
    "c-set-ops":     { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 4 },
    "c-cont-dup":    { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 6 },
    "c-is-none":     { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 7 },
    "c-dict-keys":   { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 8 },
    "c-hash-coll":   { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 9 },
    "c-hash-resize": { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 10 },
    "c-n-plus-m":    { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 11 },
    "c-early-exit":  { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 12 },
    "c-ll-traverse": { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 14 },
    "c-two-sum":     { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 15 },
    "c-count-scan":  { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 16 },
    "c-ll-reverse":  { type: "quiz-question", quizId: "quiz-breadth", questionIdx: 17 },
    "c-floor":       { type: "lesson-exercise", lessonId: "lesson-1.3", exerciseId: "1.3-q1" },
    "c-range-rev":   { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-q4" },
    "c-get":         { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-q1" },
    "c-set-add":     { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-q2" },
    "c-set-dedup":   { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-q3" },
    "c-amortized":   { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-q6" },
    "c-ll-remove":   { type: "lesson-exercise", lessonId: "lesson-1.4", exerciseId: "1.4-e4" },
    "c-listnode":    { type: "lesson-section", lessonId: "lesson-1.4", section: "intro" },
    "c-bigo-map":    { type: "lesson-section", lessonId: "lesson-1.1", section: "intro" }
  };

  // Card ID -> concept (topic-based). These can match across many sources.
  const conceptMap = {
    "c-neg-idx":      "negative-indexing",
    "c-slicing":      "slicing-rules",
    "c-insert-0":     "list-insert-front-cost",
    "c-join":         "string-join",
    "c-str-immut":    "string-immutability-on-loop",
    "c-enumerate":    "enumerate-idiom",
    "c-range-rev":    "range-reverse-traversal",
    "c-range-lazy":   "range-lazy",
    "c-floor":        "floor-division",
    "c-is-none":      "is-none-check",
    "c-dict-basics":  "dict-basics",
    "c-del-d":        "dict-del",
    "c-pop":          "dict-pop",
    "c-get":          "dict-get",
    "c-counter":      "dict-counter-idiom",
    "c-setdefault":   "dict-setdefault-grouping",
    "c-dict-keys":    "dict-keys-hashable",
    "c-set-add":      "set-add-vs-append",
    "c-set-dedup":    "set-dedup-duplicates",
    "c-set-ops":      "set-operators",
    "c-listnode":     "ll-listnode-class",
    "c-ll-traverse":  "ll-canonical-traversal",
    "c-ll-reverse":   "ll-3pointer-reverse",
    "c-ll-3ptr-why":  "ll-3pointer-why",
    "c-ll-remove":    "ll-remove-node",
    "c-hash-int":     "hash-internals",
    "c-hash-coll":    "hash-collisions-probing",
    "c-hash-resize":  "hash-resize-load",
    "c-amortized":    "amortized-O1",
    "c-dict-vs-set":  "dict-vs-set-rule",
    "c-two-sum":      "two-sum-dict-design",
    "c-cont-dup":     "contains-duplicate-pattern",
    "c-count-scan":   "count-then-scan-pattern",
    "c-grouping":     "grouping-pattern",
    "c-bigo-map":     "bigo-hierarchy",
    "c-bigo-rules":   "bigo-rules",
    "c-recursion":    "recursion-bigo",
    "c-n-plus-m":     "bigo-n-plus-m",
    "c-early-exit":   "early-exit-bigo",
    "c-h-brute":      "habit-brute-force-first",
    "c-h-dryrun":     "habit-dry-run",
    "c-h-bool":       "habit-trace-booleans",
    "c-h-diagram":    "habit-draw-diagrams",
    "c-g-iter-mod":   "gotcha-modify-while-iter",
    "c-g-slice-cop":  "gotcha-slice-copy",
    "c-g-del-as-yg":  "gotcha-delete-as-you-go"
  };

  const linkedSources = [];
  const linkedConcepts = [];
  const conflicts = [];

  state.cards.forEach(card => {
    // Add sourceRef if missing and we have a mapping
    if (!card.sourceRef) {
      const m = sourceMap[card.id];
      if (m && !state.cards.some(c => c !== card && sourceRefMatches(c.sourceRef, m))) {
        card.sourceRef = m;
        linkedSources.push(card.id);
      } else if (m) {
        conflicts.push(card.id);
      }
    }
    // Add concept if missing
    if (!card.concept) {
      const c = conceptMap[card.id];
      if (c) {
        card.concept = c;
        linkedConcepts.push(card.id);
      }
    }
  });

  if (linkedSources.length || linkedConcepts.length) {
    saveState();
    console.log(`[migration] sourceRef added to ${linkedSources.length} cards, concepts added to ${linkedConcepts.length}`);
    if (conflicts.length) console.log(`[migration] sourceRef skipped (conflict):`, conflicts);
    if (linkedSources.length || linkedConcepts.length) {
      const parts = [];
      if (linkedSources.length) parts.push(`${linkedSources.length} sources`);
      if (linkedConcepts.length) parts.push(`${linkedConcepts.length} concepts`);
      toast(`Linked ${parts.join(", ")}`);
    }
  }
  return { linkedSources: linkedSources.length, linkedConcepts: linkedConcepts.length };
}

function sourceRefMatches(a, b) {
  if (!a || !b) return false;
  if (a.type !== b.type) return false;
  if (a.quizId !== b.quizId) return false;
  if (a.lessonId !== b.lessonId) return false;
  if (a.exerciseId !== b.exerciseId) return false;
  if (a.section !== b.section) return false;
  if (a.questionIdx !== b.questionIdx) return false;
  return true;
}

function findCardBySource(sourceRef, concept) {
  // Prefer exact source match; fall back to concept match.
  if (sourceRef) {
    const byRef = state.cards.find(c => sourceRefMatches(c.sourceRef, sourceRef));
    if (byRef) return { card: byRef, matchedBy: "source" };
  }
  if (concept) {
    const byConcept = state.cards.find(c => c.concept && c.concept === concept);
    if (byConcept) return { card: byConcept, matchedBy: "concept" };
  }
  return null;
}

function makeFlashcardFromSource(sourceRef, prefill, concept) {
  const match = findCardBySource(sourceRef, concept);
  if (!match) {
    openQuickCardModal({ ...prefill, sourceRef, concept });
    return;
  }
  openSourceConflictModal(match.card, sourceRef, prefill, concept, match.matchedBy);
}

      renderCategories();
      if (activeCategoryId === catId || !activeCategoryId || activeCategoryId === "__queue__") {

/* ===== drag/drop ===== */
let dragKind = null;
let draggingId = null;
function attachDrag(el, kind) {
  el.addEventListener("dragstart", e => {
    dragKind = kind;
    draggingId = el.dataset.id;
    el.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  });
  el.addEventListener("dragend", () => {
    el.classList.remove("dragging");
    document.querySelectorAll(".drop-target").forEach(d => d.classList.remove("drop-target"));
    dragKind = null;
    draggingId = null;
  });
  el.addEventListener("dragover", e => {
    if (dragKind !== kind) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
  });
  el.addEventListener("drop", e => {
    if (dragKind !== kind || !draggingId || draggingId === el.dataset.id) return;
    e.preventDefault();
    reorder(kind, draggingId, el.dataset.id);
  });
}
function reorder(kind, fromId, toId) {
  if (kind === "category") {
    const cats = getCategorySorted();
    const fromIdx = cats.findIndex(c => c.id === fromId);
    const toIdx = cats.findIndex(c => c.id === toId);
    if (fromIdx === -1 || toIdx === -1) return;
    const [moved] = cats.splice(fromIdx, 1);
    cats.splice(toIdx, 0, moved);
    cats.forEach((c, i) => c.order = i);
    saveState();
    renderCategories();
  } else if (kind === "card") {
    if (activeCategoryId === "__queue__") {
      const q = state.reviewQueue || [];
      const fromIdx = q.indexOf(fromId);
      const toIdx = q.indexOf(toId);
      if (fromIdx === -1 || toIdx === -1) return;
      const [moved] = q.splice(fromIdx, 1);
      q.splice(toIdx, 0, moved);
      state.reviewQueue = q;
      saveState();
      renderCardsBody();
      return;
    }
    const cards = getCardsForCategory(activeCategoryId);
    const fromIdx = cards.findIndex(c => c.id === fromId);
    const toIdx = cards.findIndex(c => c.id === toId);
    if (fromIdx === -1 || toIdx === -1) return;
    const [moved] = cards.splice(fromIdx, 1);
    cards.splice(toIdx, 0, moved);
    cards.forEach((c, i) => c.order = i);
    saveState();
    renderCardsBody();
  } else if (kind === "quiz") {
    const quizzes = getQuizzesSorted();
    const fromIdx = quizzes.findIndex(q => q.id === fromId);
    const toIdx = quizzes.findIndex(q => q.id === toId);
    if (fromIdx === -1 || toIdx === -1) return;
    const [moved] = quizzes.splice(fromIdx, 1);
    quizzes.splice(toIdx, 0, moved);
    quizzes.forEach((q, i) => q.order = i);
    saveState();
    renderQuizzes();
  }
}

/* ===== quizzes (file-based) ===== */
function getQuizzesSorted() {
  return [...fs.quizzes.values()].sort((a, b) => (a.title || "").localeCompare(b.title || ""));
}
function renderQuizzes() {
  const list = document.getElementById("quizzesList");
  list.innerHTML = "";
  if (!fs.connected && !fs.manifestLoaded) {
    list.innerHTML = `<div class="empty-state">Click <strong>Connect</strong> to load quizzes from disk.</div>`;
    return;
  }
  const quizzes = getQuizzesSorted();
  if (quizzes.length === 0) {
    list.innerHTML = `<div class="empty-state">No quizzes found in <code>quizzes/</code>.<br>Click + to create one.</div>`;
    return;
  }
  quizzes.forEach(q => {
    const li = document.createElement("li");
    li.dataset.id = q.id;
    li.classList.toggle("active", q.id === activeQuizId);
    const attempts = fs.attempts.get(q.id) || [];
    li.innerHTML = `<span class="name"></span><span class="count">${(q.questions || []).length}q · ${attempts.length}a</span>`;
    li.querySelector(".name").textContent = q.title;
    li.addEventListener("click", () => selectQuiz(q.id));
    list.appendChild(li);
  });
}
function selectQuiz(id) {
  activeQuizId = id;
  // Pick the latest attempt by default
  const attempts = fs.attempts.get(id) || [];
  activeSession = attempts.length > 0 ? attempts[attempts.length - 1] : null;
  prefs.lastQuizId = id;
  savePrefs();
  renderQuizzes();
  renderQuizBody();
}
function renderQuizBody() {
  const body = document.getElementById("quizBody");
  const title = document.getElementById("currentQuizTitle");
  const editBtn = document.getElementById("editQuizBtn");
  const delBtn = document.getElementById("deleteQuizBtn");
  const dlBtn = document.getElementById("downloadReviewBtn");
  const updateBtn = document.getElementById("quizUpdateBtn");
  const reloadBtn = document.getElementById("quizReloadBtn");
  const newAttemptBtn = document.getElementById("newAttemptBtn");
  const attemptSelect = document.getElementById("attemptSelect");

  const hideAll = () => [editBtn, delBtn, dlBtn, updateBtn, reloadBtn, newAttemptBtn, attemptSelect].forEach(b => b.hidden = true);

  if (!fs.connected && !fs.manifestLoaded) {
    title.textContent = "—";
    hideAll();
    body.innerHTML = `<div class="connect-prompt">
      <h3>Not connected</h3>
      <p>Click <strong>Connect</strong> in the top bar and pick your <code>study-tool/</code> folder to load quizzes from disk.</p>
    </div>`;
    return;
  }

  if (!activeQuizId) {
    title.textContent = "—";
    hideAll();
    body.innerHTML = `<div class="placeholder">Pick or create a quiz to begin.</div>`;
    return;
  }

  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) { activeQuizId = null; renderQuizBody(); return; }
  title.textContent = quiz.title;
  editBtn.hidden = !fs.connected;   // editing/deleting writes to disk → author mode only
  delBtn.hidden = !fs.connected;
  dlBtn.hidden = false;
  newAttemptBtn.hidden = false;

  const attempts = fs.attempts.get(quiz.id) || [];
  renderAttemptSelect();

  body.innerHTML = "";
  if (!quiz.questions || quiz.questions.length === 0) {
    body.innerHTML = `<div class="empty-state">This quiz has no questions yet. Click Edit to add some.</div>`;
    updateBtn.hidden = true;
    reloadBtn.hidden = true;
    return;
  }

  if (!activeSession) {
    // No attempt selected — show a prompt to start one
    body.innerHTML = `<div class="connect-prompt">
      <h3>No attempts yet</h3>
      <p>Click <strong>+ New attempt</strong> in the header to start.</p>
    </div>`;
    updateBtn.hidden = true;
    reloadBtn.hidden = true;
    return;
  }

  updateBtn.hidden = !fs.connected;   // save/reload attempt to disk → author mode only
  reloadBtn.hidden = !fs.connected;

  quiz.questions.forEach((q, i) => body.appendChild(renderQuestion(quiz, q, i)));

  // Post-attempt Q&A
  const qaSection = document.createElement("div");
  qaSection.className = "qa-section";
  qaSection.innerHTML = `<div class="lesson-section-label">Post-attempt Q&amp;A</div>`;
  if (activeSession.qa && activeSession.qa.length) {
    activeSession.qa.forEach(item => {
      const entry = document.createElement("div");
      entry.className = "qa-entry";
      entry.innerHTML = `<div class="qa-meta"></div><div class="qa-q"></div><div class="qa-a"></div>`;
      entry.querySelector(".qa-meta").textContent = item.timestamp || "";
      entry.querySelector(".qa-q").textContent = "Q: " + (item.q || "");
      entry.querySelector(".qa-a").textContent = "A: " + (item.a || "");
      qaSection.appendChild(entry);
    });
  } else {
    const empty = document.createElement("div");
    empty.className = "qa-empty";
    empty.textContent = "No Q&A yet. Update local copy, ask Claude in chat — answers get appended here when you Reload from local.";
    qaSection.appendChild(empty);
  }
  body.appendChild(qaSection);

  // Bottom action row
  const footer = document.createElement("div");
  footer.style.marginTop = "16px";
  footer.style.display = "flex";
  footer.style.gap = "8px";
  footer.innerHTML = `<button id="sendToClaudeBtn">Send all answers to Claude</button>`;
  body.appendChild(footer);
  document.getElementById("sendToClaudeBtn").onclick = sendSessionToClaude;
}
function renderQuestion(quiz, q, i) {
  const wrap = document.createElement("div");
  wrap.className = "quiz-question";
  let inner = `<div class="q-meta">Question ${i + 1} · ${q.type === "mc" ? "Multiple choice" : q.type === "text" ? "Text input" : "Code"}</div>`;
  inner += `<div class="q-prompt"></div>`;
  if (q.type === "mc") {
    inner += `<div class="q-options">`;
    (q.options || []).forEach((opt, oi) => {
      inner += `<label class="q-option"><input type="radio" name="q${i}" value="${oi}"><span></span></label>`;
    });
    inner += `</div>`;
  } else if (q.type === "text") {
    inner += `<input type="text" data-input placeholder="Your answer">`;
  } else if (q.type === "code") {
    inner += `<textarea data-input rows="8" placeholder="# your code here"></textarea>`;
  }
  inner += `<div class="q-actions">
    <button class="primary" data-act="submit">Submit</button>
    <button data-act="reveal">Show answer</button>
    <button class="ask-claude-btn" data-act="ask">Ask Claude →</button>
    <button class="ask-claude-btn" data-act="flashcard">+ Flashcard</button>
  </div>`;
  inner += `<div class="q-answer" hidden></div>`;
  inner += `<div class="q-rate" hidden>
    <span>Self-rate:</span>
    <div class="q-rate-buttons">
      <button data-rate="1" title="Blank — no recall">1</button>
      <button data-rate="2" title="Wrong / partial">2</button>
      <button data-rate="3" title="Correct with effort">3</button>
      <button data-rate="4" title="Recalled fast">4</button>
      <button data-rate="5" title="Instant — locked in">5</button>
    </div>
    <span class="q-rate-scale">1 blank · 5 instant</span>
  </div>`;
  inner += `<div class="q-note" hidden>
    <label>Note</label>
    <textarea data-note placeholder="Optional — anything to remember about this one"></textarea>
  </div>`;
  inner += `<div class="q-result" hidden></div>`;
  inner += `<div class="q-override" hidden></div>`;
  wrap.innerHTML = inner;
  wrap.querySelector(".q-prompt").textContent = q.prompt || "";

  // Tab indents in the code editor instead of moving focus.
  if (q.type === "code") enableTabIndent(wrap.querySelector("[data-input]"));

  // Attach Pyodide runner for code questions
  if (q.type === "code" && pyodideAvailable()) {
    const ta = wrap.querySelector("[data-input]");
    const insertBefore = wrap.querySelector(".q-actions");
    const runnerHost = document.createElement("div");
    insertBefore.parentNode.insertBefore(runnerHost, insertBefore);
    attachCodeRunner(
      runnerHost,
      () => ta.value,
      () => q.tests || [],
      `quiz-${activeQuizId}-${i}`,
      q.testSetup || ""
    );
  }

  if (q.type === "mc") {
    wrap.querySelectorAll(".q-option").forEach((labEl, oi) => {
      labEl.querySelector("span").textContent = q.options[oi];
      labEl.querySelector("input").addEventListener("change", () => {
        wrap.querySelectorAll(".q-option").forEach(o => o.classList.remove("selected"));
        labEl.classList.add("selected");
      });
    });
  }
  const prior = activeSession.responses[i];
  if (prior !== null && prior !== undefined) {
    if (q.type === "mc") {
      const inputs = wrap.querySelectorAll('input[type="radio"]');
      if (inputs[prior.value] !== undefined) {
        inputs[prior.value].checked = true;
        inputs[prior.value].closest(".q-option").classList.add("selected");
      }
    } else if (q.type === "text" || q.type === "code") {
      wrap.querySelector("[data-input]").value = prior.value || "";
    }
    if (prior.selfRating) {
      // Pre-select the rating button — but keep the row hidden until the answer is revealed
      const rateRow = wrap.querySelector(".q-rate");
      rateRow.querySelector(`[data-rate="${prior.selfRating}"]`).classList.add("selected");
    }
    if (prior.note) {
      wrap.querySelector("[data-note]").value = prior.note;
    }
  } else if (q.type === "code" && q.starter) {
    // No prior answer yet — seed the editor with the function stub to fill in.
    wrap.querySelector("[data-input]").value = q.starter;
  }

  wrap.querySelector("[data-note]").addEventListener("blur", e => {
    const noteVal = e.target.value;
    if (!activeSession.responses[i]) {
      activeSession.responses[i] = { type: q.type, value: null, correct: null, selfRating: null, note: noteVal };
    } else {
      activeSession.responses[i].note = noteVal;
    }
    saveState();
    persistAttempt();
  });

  function getExpectedAnswerText() {
    if (q.type === "mc") {
      if (typeof q.correct === "number") return `${q.correct}: ${q.options[q.correct]}`;
      return "(no correct option set)";
    }
    return q.answer || "(no reference answer set)";
  }

  wrap.querySelector('[data-act="reveal"]').addEventListener("click", () => {
    const ans = wrap.querySelector(".q-answer");
    const rate = wrap.querySelector(".q-rate");
    const note = wrap.querySelector(".q-note");
    const btn = wrap.querySelector('[data-act="reveal"]');
    if (ans.hidden) {
      if (!ans.innerHTML) {
        ans.innerHTML = `<div class="q-answer-label">Answer</div>`;
        const body = document.createElement("div");
        body.textContent = getExpectedAnswerText();
        ans.appendChild(body);
        if (q.explanation) {
          const whyLabel = document.createElement("div");
          whyLabel.className = "q-answer-label spaced";
          whyLabel.textContent = "Why";
          ans.appendChild(whyLabel);
          const why = document.createElement("div");
          why.className = "q-why";
          why.textContent = q.explanation;
          ans.appendChild(why);
        }
        if (q.visual) {
          const vis = document.createElement("pre");
          vis.className = "q-visual";
          vis.textContent = q.visual;
          ans.appendChild(vis);
        }
      }
      ans.hidden = false;
      rate.hidden = false;
      note.hidden = false;
      btn.textContent = "Hide answer";
    } else {
      ans.hidden = true;
      rate.hidden = true;
      note.hidden = true;
      btn.textContent = "Show answer";
    }
  });

  wrap.querySelectorAll('.q-rate [data-rate]').forEach(btn => {
    btn.addEventListener("click", () => {
      const rating = Number(btn.dataset.rate);
      wrap.querySelectorAll('.q-rate [data-rate]').forEach(b => b.classList.toggle("selected", b === btn));
      if (!activeSession.responses[i]) {
        let value = null;
        if (q.type === "mc") {
          const chosen = wrap.querySelector('input[type="radio"]:checked');
          value = chosen ? Number(chosen.value) : null;
        } else {
          const live = wrap.querySelector("[data-input]");
          value = live ? live.value : null;
        }
        activeSession.responses[i] = { type: q.type, value, correct: null, selfRating: rating };
      } else {
        activeSession.responses[i].selfRating = rating;
      }
      saveState();
      persistAttempt();
    });
  });
  wrap.querySelector('[data-act="flashcard"]').addEventListener("click", () => {
    // Build a self-contained back: the answer, a concise why, and the visual.
    const answerText = q.type === "mc"
      ? (typeof q.correct === "number" ? q.options[q.correct] : "")
      : (q.answer || "");
    const concise = q.cardBack || q.explanation || "";
    let backVal = answerText;
    if (concise) backVal += (backVal ? "\n\n" : "") + concise;
    // Fence the ASCII visual so it renders in a left-aligned monospace box, separate from prose.
    if (q.visual) backVal += (backVal ? "\n\n" : "") + "```\n" + q.visual + "\n```";
    makeFlashcardFromSource(
      { type: "quiz-question", quizId: activeQuizId, questionIdx: i },
      { front: q.prompt || "", back: backVal },
      q.concept || null
    );
  });

  wrap.querySelector('[data-act="ask"]').addEventListener("click", () => {
    const quiz2 = fs.quizzes.get(activeQuizId);
    const lines = [
      `Quiz: ${quiz2 ? quiz2.title : ""}`,
      `Question ${i + 1} (${q.type === "mc" ? "multiple choice" : q.type === "text" ? "text" : "code"})`,
      `Prompt: ${q.prompt}`
    ];
    if (q.type === "mc") {
      lines.push("Options:");
      (q.options || []).forEach((opt, oi) => lines.push(`  ${oi}: ${opt}${q.correct === oi ? "  [correct]" : ""}`));
    } else if (q.answer) {
      lines.push(`Expected: ${q.answer}`);
    }
    const r = activeSession.responses[i];
    if (r === null || r === undefined) {
      lines.push(`My answer: (not yet submitted)`);
      const liveInput = wrap.querySelector("[data-input]");
      if (liveInput && liveInput.value) {
        lines.push(`Current draft:`);
        lines.push((liveInput.value || "").split("\n").map(l => "  " + l).join("\n"));
      }
    } else if (q.type === "mc") {
      lines.push(`My answer: ${q.options[r.value]}`);
    } else {
      lines.push(`My answer:`);
      lines.push((r.value || "").split("\n").map(l => "  " + l).join("\n"));
    }
    openAskClaude(`quiz question`, lines);
  });

  // Auto-grade a submitted value. Returns true/false, or null when we can't judge
  // (code questions, or text/MC with no reference answer).
  function autoGrade(value) {
    if (q.type === "mc") return typeof q.correct === "number" ? value === q.correct : null;
    if (q.type === "text") return q.answer ? value.trim().toLowerCase() === String(q.answer).trim().toLowerCase() : null;
    return null; // code — graded by running tests, not string match
  }

  const result = wrap.querySelector(".q-result");
  const overrideWrap = wrap.querySelector(".q-override");

  // Paint the result banner + (for text/code) the self-mark-correct toggle.
  function showResult() {
    const r = activeSession.responses[i];
    if (!r) { result.hidden = true; overrideWrap.hidden = true; return; }
    if (r.correct === true) {
      result.className = "q-result correct";
      result.textContent = r.override ? "Marked correct (self-graded)." : "Correct.";
    } else if (r.correct === false) {
      result.className = "q-result incorrect";
      const ans = q.type === "mc" ? q.options[q.correct] : q.answer;
      result.textContent = `Not quite. Expected: ${ans}`;
    } else {
      result.className = "q-result recorded";
      result.textContent = "Recorded.";
    }
    result.hidden = false;

    // Exact-match / no-grade is unreliable for text & code — let the user override.
    if (q.type === "text" || q.type === "code") {
      overrideWrap.hidden = false;
      overrideWrap.innerHTML = "";
      const btn = document.createElement("button");
      btn.className = "q-override-btn" + (r.correct === true ? " active" : "");
      btn.textContent = r.correct === true ? "✓ Marked correct — undo" : "Mark correct";
      btn.onclick = () => {
        if (r.correct === true) {
          r.correct = autoGrade(r.value);   // revert to the auto verdict
          delete r.override;
        } else {
          r.correct = true;
          r.override = true;
        }
        saveState();
        showResult();
      };
      overrideWrap.appendChild(btn);
    } else {
      overrideWrap.hidden = true;
    }
  }

  // On load, if this question was already answered (e.g. reviewing a past attempt), show its result.
  if (prior && (prior.correct !== null || (typeof prior.value === "number") || (typeof prior.value === "string" && prior.value.trim() !== ""))) {
    showResult();
  }

  wrap.querySelector('[data-act="submit"]').addEventListener("click", () => {
    let value;
    if (q.type === "mc") {
      const chosen = wrap.querySelector('input[type="radio"]:checked');
      if (!chosen) { toast("Pick an option"); return; }
      value = Number(chosen.value);
    } else {
      value = wrap.querySelector("[data-input]").value;
    }
    const existing = activeSession.responses[i];
    activeSession.responses[i] = {
      type: q.type,
      value,
      correct: autoGrade(value),
      selfRating: existing ? existing.selfRating : null,
      note: existing ? existing.note : undefined
    };
    saveState();
    persistAttempt();
    showResult();
  });
  return wrap;
}
// saveSession removed — replaced by Update local copy (file-based)

document.getElementById("deleteQuizBtn").addEventListener("click", async () => {
  if (!activeQuizId || !fs.connected) return;
  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) return;
  const attemptCount = (fs.attempts.get(activeQuizId) || []).length;
  if (!confirm(`Delete quiz "${quiz.title}" and its ${attemptCount} attempt${attemptCount === 1 ? "" : "s"}? This removes the folder from disk.`)) return;
  const ok = await fsm.deleteQuiz(activeQuizId);
  if (ok) {
    activeQuizId = null;
    activeSession = null;
    renderQuizzes();
    renderQuizBody();
    toast("Quiz deleted");
  } else {
    alert("Delete failed.");
  }
});
document.getElementById("editQuizBtn").addEventListener("click", () => editQuiz(activeQuizId));
document.getElementById("addQuizBtn").addEventListener("click", () => editQuiz(null));
document.getElementById("downloadReviewBtn").addEventListener("click", downloadReviewPy);
function editQuiz(id) {
  if (!fs.connected) { toast("Connect to a study-tool folder first"); return; }
  const editing = id ? fs.quizzes.get(id) : null;
  const draft = editing
    ? JSON.parse(JSON.stringify(editing))
    : { id: "quiz-" + uid(), title: "", questions: [] };
  modal(`
    <h2>${editing ? "Edit quiz" : "New quiz"}</h2>
    <div class="field"><label>Title</label><input id="eq-title"></div>
    <div id="eq-questions"></div>
    <div class="row" style="gap: 6px; margin-top: 8px;">
      <button data-add="mc">+ Multiple choice</button>
      <button data-add="text">+ Text</button>
      <button data-add="code">+ Code</button>
    </div>
    <div class="modal-actions">
      <button class="ghost" data-act="cancel">Cancel</button>
      <button class="primary" data-act="save">${editing ? "Save" : "Create"}</button>
    </div>
  `, root => {
    const titleInput = root.querySelector("#eq-title");
    titleInput.value = draft.title;
    titleInput.addEventListener("input", e => { draft.title = e.target.value; });
    const renderQs = () => {
      const wrap = root.querySelector("#eq-questions");
      wrap.innerHTML = "";
      draft.questions.forEach((q, i) => {
        const card = document.createElement("div");
        card.className = "quiz-question";
        card.style.padding = "12px";
        let html = `<div class="q-meta">Q${i + 1} · ${q.type}</div>`;
        html += `<div class="field"><label>Prompt</label><textarea data-bind="prompt" rows="2"></textarea></div>`;
        if (q.type === "mc") {
          html += `<div class="field"><label>Options (one per line)</label><textarea data-bind="options" rows="4"></textarea></div>`;
          html += `<div class="field"><label>Correct index (0-based)</label><input data-bind="correct" type="number" min="0"></div>`;
        } else if (q.type === "text") {
          html += `<div class="field"><label>Expected answer (optional)</label><input data-bind="answer"></div>`;
        } else if (q.type === "code") {
          html += `<div class="field"><label>Reference answer (optional)</label><textarea data-bind="answer" rows="4"></textarea></div>`;
        }
        html += `<div class="row"><button data-act="del" class="danger ghost">Remove question</button></div>`;
        card.innerHTML = html;
        const bindings = card.querySelectorAll("[data-bind]");
        bindings.forEach(b => {
          const key = b.dataset.bind;
          if (key === "options") b.value = (q.options || []).join("\n");
          else b.value = q[key] ?? "";
          b.addEventListener("input", () => {
            if (key === "options") q.options = b.value.split("\n").map(s => s.trim()).filter(Boolean);
            else if (key === "correct") q.correct = b.value === "" ? null : Number(b.value);
            else q[key] = b.value;
          });
        });
        card.querySelector('[data-act="del"]').onclick = () => {
          draft.questions.splice(i, 1);
          renderQs();
        };
        wrap.appendChild(card);
      });
    };
    root.querySelectorAll("[data-add]").forEach(btn => {
      btn.onclick = () => {
        const type = btn.dataset.add;
        const newQ = { type, prompt: "" };
        if (type === "mc") { newQ.options = []; newQ.correct = null; }
        if (type === "text") newQ.answer = "";
        if (type === "code") newQ.answer = "";
        draft.questions.push(newQ);
        renderQs();
      };
    });
    renderQs();
    root.querySelector('[data-act="cancel"]').onclick = () => root.remove();
    root.querySelector('[data-act="save"]').onclick = async () => {
      if (!draft.title.trim()) { toast("Title required"); return; }
      try {
        if (editing) {
          Object.assign(editing, draft);
          await fsm.writeQuiz(editing);
        } else {
          fs.quizzes.set(draft.id, draft);
          fs.attempts.set(draft.id, []);
          await fsm.writeQuiz(draft);
        }
        activeQuizId = draft.id;
        activeSession = null;
        root.remove();
        renderQuizzes();
        renderQuizBody();
        toast(editing ? "Quiz saved" : "Quiz created");
      } catch (e) {
        alert("Save failed: " + e.message);
      }
    };
  });
}

/* ===== lessons (file-based) ===== */
function getLessonsSorted() {
  return [...fs.lessons.values()].sort((a, b) => {
    const da = a.date || "";
    const db = b.date || "";
    return da.localeCompare(db);
  });
}

function renderLessons() {
  const list = document.getElementById("lessonsList");
  list.innerHTML = "";
  if (!fs.connected && !fs.manifestLoaded) {
    list.innerHTML = `<div class="empty-state">Click <strong>Connect</strong> to load lessons from disk.</div>`;
    return;
  }
  const lessons = getLessonsSorted();
  if (lessons.length === 0) {
    list.innerHTML = `<div class="empty-state">No lessons found in <code>lessons/</code>.</div>`;
    return;
  }
  lessons.forEach(lesson => {
    const li = document.createElement("li");
    li.dataset.id = lesson.id;
    li.classList.toggle("active", lesson.id === activeLessonId);
    li.innerHTML = `<span class="name"></span><span class="count">${(lesson.exercises || []).length}</span>`;
    li.querySelector(".name").textContent = lesson.title;
    li.addEventListener("click", () => selectLesson(lesson.id));
    list.appendChild(li);
  });
}

function selectLesson(id) {
  activeLessonId = id;
  prefs.lastLessonId = id;
  savePrefs();
  renderLessons();
  renderLessonBody();
}

// Render one teaching block. `collapsible` blocks hold sub-blocks inside a <details>
// (collapsed by default — used for borderline-known syntax recaps and worked examples).
function renderBodyBlock(block, idKey) {
  if (block.type === "collapsible") {
    const det = document.createElement("details");
    det.className = "lesson-collapsible";
    if (block.open) det.open = true;
    const sum = document.createElement("summary");
    sum.textContent = block.heading || "Show details";
    det.appendChild(sum);
    (block.blocks || []).forEach((sub, i) => {
      det.appendChild(renderBodyBlock(sub, `${idKey}-${i}`));
    });
    return det;
  }
  const el = document.createElement("div");
  el.className = `body-block ${block.type || "prose"}`;
  if (block.heading) {
    const hdr = document.createElement("div");
    hdr.className = "body-block-header";
    hdr.innerHTML = `<span class="heading"></span>`;
    hdr.querySelector(".heading").textContent = block.heading;
    el.appendChild(hdr);
  }
  const content = document.createElement("div");
  content.textContent = block.content || "";
  if (block.type === "code" || block.type === "diagram") content.style.whiteSpace = "pre";
  el.appendChild(content);
  // If this is runnable code, attach a Run button
  if (block.type === "code" && block.runnable && pyodideAvailable()) {
    attachCodeRunner(el, () => block.content, null, `lesson-body-${idKey}`);
  }
  return el;
}

function renderLessonBody() {
  const body = document.getElementById("lessonBody");
  const title = document.getElementById("currentLessonTitle");
  const meta = document.getElementById("currentLessonMeta");
  const updateBtn = document.getElementById("lessonUpdateBtn");
  const reloadBtn = document.getElementById("lessonReloadBtn");

  if (!fs.connected && !fs.manifestLoaded) {
    title.textContent = "—";
    meta.textContent = "";
    updateBtn.hidden = true;
    reloadBtn.hidden = true;
    body.innerHTML = `<div class="connect-prompt">
      <h3>Not connected</h3>
      <p>Click <strong>Connect</strong> in the top bar and pick your <code>study-tool/</code> folder to load lessons from disk.</p>
    </div>`;
    return;
  }

  if (!activeLessonId) {
    title.textContent = "—";
    meta.textContent = "";
    updateBtn.hidden = true;
    reloadBtn.hidden = true;
    body.innerHTML = `<div class="placeholder">Pick a lesson to review what you did.</div>`;
    return;
  }

  const lesson = fs.lessons.get(activeLessonId);
  if (!lesson) { activeLessonId = null; renderLessonBody(); return; }
  updateBtn.hidden = !fs.connected;   // save/reload lesson to disk → author mode only
  reloadBtn.hidden = !fs.connected;

  title.textContent = lesson.title;
  const exerciseCount = (lesson.exercises || []).length;
  meta.textContent = `${lesson.date || ""} · ${exerciseCount} item${exerciseCount === 1 ? "" : "s"}`;

  body.innerHTML = "";

  // Helper: build a section header with a "+ Flashcard" button (source-aware)
  const makeSection = (labelText, sectionKey, prefill) => {
    const sec = document.createElement("div");
    sec.className = "lesson-section";
    const header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = `<div class="lesson-section-label"></div><button class="flashcard-from-btn" title="Make a flashcard from this section">+ Flashcard</button>`;
    header.querySelector(".lesson-section-label").textContent = labelText;
    header.querySelector(".flashcard-from-btn").onclick = () => makeFlashcardFromSource(
      { type: "lesson-section", lessonId: lesson.id, section: sectionKey },
      prefill,
      (lesson.sectionConcepts && lesson.sectionConcepts[sectionKey]) || null
    );
    sec.appendChild(header);
    return sec;
  };

  // Summary
  if (lesson.summary) {
    const sec = makeSection("Summary", "summary", {
      front: `${lesson.title} — Summary`,
      back: lesson.summary
    });
    const body2 = document.createElement("div");
    body2.className = "lesson-summary";
    body2.textContent = lesson.summary;
    sec.appendChild(body2);
    body.appendChild(sec);
  }

  // Session notes
  if (lesson.sessionNotes) {
    const sec = makeSection("Session notes", "sessionNotes", {
      front: `${lesson.title} — Session notes`,
      back: lesson.sessionNotes
    });
    const body2 = document.createElement("div");
    body2.className = "session-notes";
    body2.textContent = lesson.sessionNotes;
    sec.appendChild(body2);
    body.appendChild(sec);
  }

  // Intro / key concepts
  if (lesson.intro) {
    const sec = makeSection("Key concepts", "intro", {
      front: `${lesson.title} — Key concepts`,
      back: lesson.intro
    });
    const body2 = document.createElement("div");
    body2.className = "lesson-intro";
    body2.textContent = lesson.intro;
    sec.appendChild(body2);
    body.appendChild(sec);
  }

  // Body — long-form teaching blocks (prose / code / diagram / collapsible)
  if (Array.isArray(lesson.body) && lesson.body.length > 0) {
    const sec = document.createElement("div");
    sec.className = "lesson-section";
    sec.innerHTML = `<div class="lesson-section-label">Teaching content</div>`;
    lesson.body.forEach((block, blockIdx) => {
      sec.appendChild(renderBodyBlock(block, `${lesson.id}-${blockIdx}`));
    });
    body.appendChild(sec);
  }

  // Exercises
  if (exerciseCount > 0) {
    const sec = document.createElement("div");
    sec.className = "lesson-section";
    const header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = `<div class="lesson-section-label">Exercises</div>`;
    sec.appendChild(header);
    lesson.exercises.forEach(ex => {
      const card = document.createElement("div");
      card.className = "exercise";
      const exHeader = document.createElement("div");
      exHeader.className = "exercise-header";
      exHeader.innerHTML = `<h3></h3><button class="flashcard-from-btn" title="Make a flashcard from this exercise">+ Flashcard</button>`;
      exHeader.querySelector("h3").textContent = ex.title || ex.id;
      exHeader.querySelector(".flashcard-from-btn").onclick = () => makeFlashcardFromSource(
        { type: "lesson-exercise", lessonId: lesson.id, exerciseId: ex.id },
        {
          front: ex.title || ex.prompt || "",
          back: ex.critique || ex.prompt || ""
        },
        ex.concept || null
      );
      card.appendChild(exHeader);

      if (ex.prompt) {
        const block = document.createElement("div");
        block.className = "exercise-block";
        block.innerHTML = `<div class="block-label">Prompt</div><div class="block-body prompt"></div>`;
        block.querySelector(".block-body").textContent = ex.prompt;
        card.appendChild(block);
      }
      if (ex.userAnswer !== undefined && ex.userAnswer !== null) {
        const block = document.createElement("div");
        block.className = "exercise-block";
        const rows = Math.max(3, (ex.userAnswer || "").split("\n").length);
        block.innerHTML = `<div class="block-label">My answer</div><textarea class="block-body answer" rows="${rows}"></textarea>`;
        const ta = block.querySelector("textarea");
        ta.value = ex.userAnswer || "";
        ta.addEventListener("blur", () => {
          if (ta.value !== ex.userAnswer) {
            ex.userAnswer = ta.value;
            setLessonAnswer(lesson.id, ex.id, ta.value);   // persist per-user (local + cloud)
          }
        });
        card.appendChild(block);
        // Attach Pyodide runner if this exercise has runnable code
        const hasCode = ex.runnable !== false && /^[\s]*(def|class|import|from|for|while|if|print|return|[a-zA-Z_]\w*\s*=)/m.test(ex.userAnswer || "");
        const hasTests = Array.isArray(ex.tests) && ex.tests.length > 0;
        if (hasCode || hasTests) enableTabIndent(ta);
        if ((hasCode || hasTests) && pyodideAvailable()) {
          attachCodeRunner(
            block,
            () => ta.value,
            () => ex.tests || [],
            `ex-${lesson.id}-${ex.id}`,
            lesson.testSetup || ""
          );
        }
      }
      if (ex.critique) {
        const block = document.createElement("div");
        block.className = "exercise-block";
        block.innerHTML = `<div class="block-label">Notes / critique</div><div class="block-body critique"></div>`;
        block.querySelector(".block-body").textContent = ex.critique;
        card.appendChild(block);
      }
      sec.appendChild(card);
    });
    body.appendChild(sec);
  }

  // Review items added from this session
  if (lesson.reviewItemsAdded && lesson.reviewItemsAdded.length) {
    const sec = document.createElement("div");
    sec.className = "lesson-section";
    sec.innerHTML = `
      <div class="lesson-section-label">Review queue items added</div>
      <div class="review-items-added"><ul></ul></div>
    `;
    const ul = sec.querySelector("ul");
    lesson.reviewItemsAdded.forEach(item => {
      const li = document.createElement("li");
      li.textContent = item;
      ul.appendChild(li);
    });
    body.appendChild(sec);
  }

  // Post-session Q&A (Claude appends here)
  const qaSection = document.createElement("div");
  qaSection.className = "qa-section";
  qaSection.innerHTML = `<div class="lesson-section-label">Post-session Q&amp;A</div>`;
  if (lesson.qa && lesson.qa.length) {
    lesson.qa.forEach(item => {
      const entry = document.createElement("div");
      entry.className = "qa-entry";
      entry.innerHTML = `<div class="qa-meta"></div><div class="qa-q"></div><div class="qa-a"></div>`;
      entry.querySelector(".qa-meta").textContent = item.timestamp || "";
      entry.querySelector(".qa-q").textContent = "Q: " + (item.q || "");
      entry.querySelector(".qa-a").textContent = "A: " + (item.a || "");
      qaSection.appendChild(entry);
    });
  } else {
    const empty = document.createElement("div");
    empty.className = "qa-empty";
    empty.textContent = "No Q&A yet. Save the lesson, then ask Claude in chat — answers get appended here when you Reload from local.";
    qaSection.appendChild(empty);
  }
  body.appendChild(qaSection);
}

document.getElementById("newAttemptBtn").addEventListener("click", async () => {
  if (!activeQuizId || (!fs.connected && !fs.manifestLoaded)) return;
  const quiz = fs.quizzes.get(activeQuizId);
  if (!quiz) return;
  const newAttempt = {
    id: uid(),
    quizId: quiz.id,
    timestamp: new Date().toISOString(),
    responses: (quiz.questions || []).map(() => null),
    qa: []
  };
  try {
    // Author mode → disk; signed-in → cloud; otherwise an in-memory practice attempt.
    if (fs.connected) await fsm.writeAttempt(quiz.id, newAttempt);
    else if (cloud && cloud.enabled) cloud.saveAttempt(quiz.id, newAttempt);
    const arr = fs.attempts.get(quiz.id) || [];
    arr.push(newAttempt);
    fs.attempts.set(quiz.id, arr);
    activeSession = newAttempt;
    renderQuizBody();
    toast(fs.connected ? "New attempt started"
      : (cloud && cloud.enabled) ? "New attempt — saved to your account"
      : "Practice attempt (not saved)");

});

  }

function renderAttemptSelect() {
  const sel = document.getElementById("attemptSelect");
  if (!activeQuizId || !fs.connected) { sel.hidden = true; return; }
  const attempts = fs.attempts.get(activeQuizId) || [];
  sel.innerHTML = "";
  if (attempts.length === 0) {
    sel.hidden = true;
    return;
  }
  attempts.forEach((a, i) => {

    opt.value = a.id;
    const dateStr = (a.timestamp || "").slice(0, 10);

    if (activeSession && activeSession.id === a.id) opt.selected = true;

}

document.getElementById("exportBtn").addEventListener("click", () => {

  const out = {

  };
